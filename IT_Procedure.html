<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAGGAER — Procedure Clienti</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e14; --surface:#111520; --surface2:#161c2d; --border:#1e2a42;
  --accent:#2563eb; --glow:rgba(37,99,235,.15); --accent2:#06b6d4;
  --text:#e2e8f0; --muted:#64748b; --dim:#94a3b8;
  --success:#10b981; --warn:#f59e0b; --error:#ef4444;
  --ububble:#1e3a5f; --abubble:#111827; --tag:#1e2a42; --tagtext:#7dd3fc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* API KEY BANNER */
.api-banner{
  display:flex;align-items:center;gap:10px;padding:8px 20px;
  background:#1a1000;border-bottom:1px solid #3d2600;flex-shrink:0;
  flex-wrap:wrap;
}
.api-banner.hidden{display:none}
.api-banner-label{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--warn);white-space:nowrap;flex-shrink:0}
.api-key-input{
  flex:1;min-width:240px;background:#0d0800;border:1px solid #3d2600;
  color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;
  padding:5px 10px;border-radius:4px;outline:none;
}
.api-key-input:focus{border-color:var(--warn)}
.api-save-btn{
  background:var(--warn);border:none;color:#000;font-size:11px;
  font-family:'IBM Plex Mono',monospace;font-weight:600;padding:5px 14px;
  border-radius:4px;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.api-save-btn:hover{background:#fbbf24}
.api-hint{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);width:100%}
.api-clear-btn{background:transparent;border:1px solid #3d2600;color:var(--muted);font-size:10px;font-family:'IBM Plex Mono',monospace;padding:4px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.api-clear-btn:hover{border-color:var(--warn);color:var(--warn)}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-badge{background:var(--accent);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.header-title{font-size:14px;font-weight:500}
.header-sub{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.session-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.lang-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:5px;overflow:hidden;flex-shrink:0}
.lang-btn{background:transparent;border:none;color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:600;padding:5px 11px;cursor:pointer;transition:all .15s;letter-spacing:.04em;display:flex;align-items:center;gap:5px}
.lang-btn .flag{font-size:14px;line-height:1}
.lang-btn.active{background:var(--accent);color:#fff}
.lang-btn:not(.active):hover{background:var(--glow);color:var(--text)}
.lang-divider{width:1px;background:var(--border);align-self:stretch}
.new-session-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace;padding:5px 11px;border-radius:4px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.new-session-btn:hover{border-color:var(--accent);color:var(--accent2);background:var(--glow)}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;padding:9px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:thin}
.filter-label{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;flex-shrink:0}
.customer-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:5px 10px;border-radius:4px;cursor:pointer;outline:none;min-width:200px}
.customer-select:focus{border-color:var(--accent)}
.filter-divider{width:1px;height:20px;background:var(--border);flex-shrink:0}
.customer-tags{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto}
.ctag{background:var(--tag);color:var(--tagtext);font-size:11px;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:3px;white-space:nowrap;cursor:pointer;border:1px solid transparent;transition:all .12s}
.ctag:hover,.ctag.active{border-color:var(--accent2);color:#fff;background:rgba(6,182,212,.15)}
.ctag.active{background:rgba(37,99,235,.2);color:var(--accent2);border-color:var(--accent)}

/* CHAT */
.chat-wrapper{flex:1;overflow:hidden;display:flex;flex-direction:column}
.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.msg{display:flex;flex-direction:column;gap:6px;max-width:85%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.agent{align-self:flex-start;align-items:flex-start}
.msg-meta{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);display:flex;align-items:center;gap:8px}
.msg-bubble{padding:12px 16px;border-radius:8px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:var(--ububble);border:1px solid rgba(37,99,235,.3);border-radius:8px 2px 8px 8px}
.msg.agent .msg-bubble{background:var(--abubble);border:1px solid var(--border);border-radius:2px 8px 8px 8px}
.msg-bubble strong{color:var(--accent2);font-weight:600}
.source-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--success);background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);padding:2px 8px;border-radius:3px;margin-top:4px}
.typing-indicator{display:flex;align-items:center;gap:12px;padding:0 4px}
.typing-dots{display:flex;gap:5px}
.typing-dots span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:tb 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.typing-text{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted)}

/* WELCOME */
.welcome{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.welcome-icon{width:56px;height:56px;background:var(--glow);border:1px solid rgba(37,99,235,.3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px}
.welcome h2{font-size:20px;font-weight:500}
.welcome p{font-size:14px;color:var(--muted);max-width:480px;line-height:1.6}
.customer-count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent2);background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);padding:4px 12px;border-radius:4px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;justify-content:center}
.suggestion-btn{background:var(--surface2);border:1px solid var(--border);color:var(--dim);font-size:12px;font-family:'IBM Plex Sans',sans-serif;padding:6px 12px;border-radius:4px;cursor:pointer;transition:all .15s;text-align:left}
.suggestion-btn:hover{border-color:var(--accent);color:var(--text);background:var(--glow)}

/* INPUT */
.input-area{padding:14px 20px 18px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:12px 16px;resize:none;outline:none;transition:border-color .15s;min-height:48px;max-height:140px;line-height:1.5}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.send-btn{background:var(--accent);border:none;color:#fff;width:48px;height:48px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover:not(:disabled){background:#1d4ed8}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn svg{width:18px;height:18px}
.input-hint{margin-top:8px;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;display:flex;gap:12px;flex-wrap:wrap}
</style>
</head>
<body>

<!-- API KEY BANNER -->
<div class="api-banner" id="apiBanner">
  <span class="api-banner-label" id="apiLabel">🔑 API KEY</span>
  <input type="password" class="api-key-input" id="apiKeyInput" autocomplete="off" />
  <button class="api-save-btn" id="apiSaveBtn" onclick="saveApiKey()">Save</button>
  <button class="api-clear-btn" id="apiClearBtn" onclick="clearApiKey()" style="display:none">✕ Clear</button>
  <div class="api-hint" id="apiHint"></div>
</div>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <div class="logo-badge">JAGGAER</div>
    <div>
      <div class="header-title" id="hdrTitle"></div>
      <div class="header-sub" id="hdrSub"></div>
    </div>
  </div>
  <div class="header-right">
    <div class="session-badge">
      <div class="status-dot"></div>
      <span id="sessionLabel"></span>
    </div>
    <div class="lang-toggle">

      <div class="lang-divider"></div>
      <button class="lang-btn" id="btnEN" onclick="setLang('en')"><span class="flag">🇬🇧</span> EN</button>
    </div>
    <button class="new-session-btn" id="newSessionBtn" onclick="newSession()"></button>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label" id="filterLabel"></span>
  <select class="customer-select" id="customerSelect" onchange="onCustomerSelect(this.value)"></select>
  <div class="filter-divider"></div>
  <div class="customer-tags" id="recentTags"></div>
</div>

<!-- CHAT -->
<div class="chat-wrapper">
  <div class="chat-messages" id="chatMessages">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">🇮🇹</div>
      <h2 id="welcomeTitle"></h2>
      <p id="welcomeDesc"></p>
      <div class="customer-count" id="customerCount"></div>
      <div class="suggestions" id="welcomeSuggestions"></div>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="userInput" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">
    <span id="enterHint"></span><span id="shiftHint"></span><span id="contextHint"></span>
  </div>
</div>

// ── State ──────────────────────────────────────────────────────────────────
let currentLang = 'it';
let conversationHistory = [];
let selectedCustomer = '';
let sessionId = genSID();
let recentCustomers = [];
let apiKey = sessionStorage.getItem('jaggaer_api_key') || '';

function genSID(){ return 'SID-'+Math.random().toString(36).substr(2,8).toUpperCase(); }
function t(k){ return (UI_STRINGS[currentLang]||{})[k] || (UI_STRINGS.en||{})[k] || k; }

// ── API Key management ─────────────────────────────────────────────────────
function saveApiKey(){
  const val = document.getElementById('apiKeyInput').value.trim();
  if(!val){ alert('Please enter a valid API key.'); return; }
  apiKey = val;
  sessionStorage.setItem('jaggaer_api_key', val);
  renderApiBanner();
}
function clearApiKey(){
  apiKey = '';
  sessionStorage.removeItem('jaggaer_api_key');
  document.getElementById('apiKeyInput').value = '';
  renderApiBanner();
}
function renderApiBanner(){
  const banner = document.getElementById('apiBanner');
  const input  = document.getElementById('apiKeyInput');
  const saveBtn= document.getElementById('apiSaveBtn');
  const clearBtn=document.getElementById('apiClearBtn');
  const hint   = document.getElementById('apiHint');
  if(apiKey){
    banner.style.background = '#0a1a0a';
    banner.style.borderBottomColor = '#1a3a1a';
    document.getElementById('apiLabel').style.color = 'var(--success)';
    document.getElementById('apiLabel').textContent = '🔑 ' + t('api_key_label');
    input.value = apiKey.substring(0,12)+'••••••••••••••••••••';
    input.disabled = true;
    saveBtn.style.display = 'none';
    clearBtn.style.display = 'inline-flex';
    hint.textContent = t('api_key_hint') + '  ✓ Key active';
    hint.style.color = 'var(--success)';
  } else {
    banner.style.background = '#1a1000';
    banner.style.borderBottomColor = '#3d2600';
    document.getElementById('apiLabel').style.color = 'var(--warn)';
    document.getElementById('apiLabel').textContent = '🔑 ' + t('api_key_label');
    input.value = '';
    input.disabled = false;
    input.placeholder = t('api_key_placeholder');
    saveBtn.style.display = 'inline-flex';
    clearBtn.style.display = 'none';
    hint.textContent = t('api_key_hint');
    hint.style.color = 'var(--muted)';
  }
}

// ── Language ───────────────────────────────────────────────────────────────
function setLang(lang){
  currentLang = lang;
  document.getElementById('btnIT').classList.toggle('active', lang==='it');
  document.getElementById('btnEN').classList.toggle('active', lang==='en');
  applyUI();
}
function applyUI(){
  const L = UI_STRINGS[currentLang];
  document.getElementById('hdrTitle').textContent = L.title;
  document.getElementById('hdrSub').textContent   = L.subtitle;
  document.getElementById('sessionLabel').textContent = sessionId;
  document.getElementById('newSessionBtn').textContent = L.new_session_btn;
  document.getElementById('filterLabel').textContent  = L.filter_label;
  document.getElementById('enterHint').textContent    = L.enter_hint;
  document.getElementById('shiftHint').textContent    = L.shift_hint;
  document.getElementById('userInput').placeholder    = L.placeholder;
  updateContextHint();
  const sel = document.getElementById('customerSelect');
  if(sel.options[0]) sel.options[0].textContent = L.all_customers;
  const ws = document.getElementById('welcomeScreen');
  if(ws){
    document.getElementById('welcomeTitle').textContent = L.welcome_title;
    document.getElementById('welcomeDesc').textContent  = L.welcome_desc;
    const n = Object.keys(PROCEDURES_DATA).length;
    document.getElementById('customerCount').textContent = n+' '+L.customers_available;
    const sc = document.getElementById('welcomeSuggestions');
    sc.innerHTML='';
    L.suggestions.forEach(s=>{
      const b=document.createElement('button'); b.className='suggestion-btn'; b.textContent=s;
      b.onclick=()=>{ document.getElementById('userInput').value=s; sendMessage(); };
      sc.appendChild(b);
    });
  }
  renderApiBanner();
}

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  const customers=Object.keys(PROCEDURES_DATA).sort();
  const sel=document.getElementById('customerSelect');
  const allOpt=document.createElement('option'); allOpt.value=''; sel.appendChild(allOpt);
  customers.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
  document.getElementById('btnIT').classList.add('active');
  applyUI();
});

// ── Customer filter ────────────────────────────────────────────────────────
function onCustomerSelect(v){ selectedCustomer=v; updateContextHint(); }
function updateContextHint(){
  const h=document.getElementById('contextHint');
  if(selectedCustomer){ h.textContent=t('filter_active')+' '+selectedCustomer; h.style.color='#06b6d4'; }
  else{ h.textContent=''; }
}
function addRecentCustomer(name){
  if(!name||recentCustomers.includes(name)) return;
  recentCustomers.unshift(name);
  if(recentCustomers.length>6) recentCustomers.pop();
  renderRecentTags();
}
function renderRecentTags(){
  const c=document.getElementById('recentTags'); c.innerHTML='';
  recentCustomers.forEach(n=>{
    const tag=document.createElement('div');
    tag.className='ctag'+(selectedCustomer===n?' active':'');
    tag.textContent=n;
    tag.onclick=()=>{ selectedCustomer=selectedCustomer===n?'':n; document.getElementById('customerSelect').value=selectedCustomer; updateContextHint(); renderRecentTags(); };
    c.appendChild(tag);
  });
}

// ── Session ────────────────────────────────────────────────────────────────
function newSession(){
  if(conversationHistory.length>0&&!confirm(t('new_session_confirm'))) return;
  conversationHistory=[]; sessionId=genSID(); selectedCustomer=''; recentCustomers=[];
  document.getElementById('customerSelect').value='';
  updateContextHint(); renderRecentTags();
  const chat=document.getElementById('chatMessages'); chat.innerHTML='';
  const ws=document.createElement('div'); ws.className='welcome'; ws.id='welcomeScreen';
  ws.innerHTML=`<div class="welcome-icon">🇮🇹</div><h2 id="welcomeTitle"></h2><p id="welcomeDesc"></p><div class="customer-count" id="customerCount"></div><div class="suggestions" id="welcomeSuggestions"></div>`;
  chat.appendChild(ws);
  const L=UI_STRINGS[currentLang];
  document.getElementById('welcomeTitle').textContent=L.new_session_title;
  document.getElementById('welcomeDesc').textContent=L.new_session_desc;
  document.getElementById('customerCount').textContent=Object.keys(PROCEDURES_DATA).length+' '+L.customers_available+' — '+sessionId;
  document.getElementById('sessionLabel').textContent=sessionId;
  const sc=document.getElementById('welcomeSuggestions');
  L.suggestions.forEach(s=>{ const b=document.createElement('button'); b.className='suggestion-btn'; b.textContent=s; b.onclick=()=>{ document.getElementById('userInput').value=s; sendMessage(); }; sc.appendChild(b); });
}

// ── Input ──────────────────────────────────────────────────────────────────
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }

async function sendMessage(){
  const input=document.getElementById('userInput');
  const text=input.value.trim(); if(!text) return;
  if(!apiKey){ appendMessage('agent', t('api_key_required'), []); return; }
  const ws=document.getElementById('welcomeScreen'); if(ws) ws.remove();
  input.value=''; input.style.height='auto';
  appendMessage('user', text);
  document.getElementById('sendBtn').disabled=true; input.disabled=true;
  const typingEl=showTyping();
  try{
    const res=await callAgent(text);
    typingEl.remove();
    appendMessage('agent', res.text, res.sources);
  }catch(err){
    typingEl.remove();
    appendMessage('agent', t('conn_error')+'\n\n'+err.message);
  }
  document.getElementById('sendBtn').disabled=false; input.disabled=false; input.focus();
}

function appendMessage(role, text, sources){
  const chat=document.getElementById('chatMessages');
  const div=document.createElement('div'); div.className='msg '+role;
  const now=new Date().toLocaleTimeString(currentLang==='it'?'it-IT':'en-GB',{hour:'2-digit',minute:'2-digit'});
  const label=role==='user'?t('you'):t('agent');
  const safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const formatted=safe.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  let html=`<div class="msg-meta"><span>${label}</span><span>${now}</span></div><div class="msg-bubble">${formatted}</div>`;
  if(sources&&sources.length) sources.forEach(s=>{ html+=`<div class="source-chip">${t('source')} ${s}</div>`; });
  div.innerHTML=html; chat.appendChild(div); chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const chat=document.getElementById('chatMessages');
  const div=document.createElement('div'); div.className='msg agent';
  div.innerHTML=`<div class="msg-meta"><span>${t('agent')}</span></div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dots"><span></span><span></span><span></span></div><span class="typing-text">${t('typing')}</span></div></div>`;
  chat.appendChild(div); chat.scrollTop=chat.scrollHeight; return div;
}

// ── Agent ──────────────────────────────────────────────────────────────────
function buildContext(q){
  const ql=q.toLowerCase(); const customers=Object.keys(PROCEDURES_DATA); let rel=[];
  if(selectedCustomer&&PROCEDURES_DATA[selectedCustomer]){
    rel.push({name:selectedCustomer,content:PROCEDURES_DATA[selectedCustomer]});
  } else {
    const mentioned=customers.filter(c=>ql.includes(c.toLowerCase()));
    if(mentioned.length){ mentioned.forEach(c=>rel.push({name:c,content:PROCEDURES_DATA[c]})); }
    else {
      const words=ql.split(/\s+/).filter(w=>w.length>4);
      customers.forEach(c=>{ const ct=PROCEDURES_DATA[c]; if(words.some(w=>ct.toLowerCase().includes(w))) rel.push({name:c,content:ct.substring(0,3000)}); });
      if(!rel.length) customers.slice(0,5).forEach(c=>rel.push({name:c,content:PROCEDURES_DATA[c].substring(0,1500)}));
    }
  }
  let ctx='', total=0; const MAX=50000;
  for(const item of rel){ const chunk=`\n\n=== CLIENTE: ${item.name} ===\n${item.content}`; if(total+chunk.length>MAX){ ctx+=chunk.substring(0,MAX-total); break; } ctx+=chunk; total+=chunk.length; }
  return {contextText:ctx, sourceNames:rel.map(r=>r.name)};
}

async function callAgent(userMessage){
  const {contextText,sourceNames}=buildContext(userMessage);
  const L=UI_STRINGS[currentLang];
  const systemPrompt=L.system_prompt.replace('{context}',contextText);
  const messages=[...conversationHistory,{role:'user',content:userMessage}];
  const response=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:systemPrompt,messages})
  });
  if(!response.ok){ const e=await response.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${response.status}`); }
  const data=await response.json();
  const assistantText=data.content?.[0]?.text||t('no_response');
  conversationHistory.push({role:'user',content:userMessage},{role:'assistant',content:assistantText});
  if(conversationHistory.length>20) conversationHistory=conversationHistory.slice(-20);
  sourceNames.forEach(n=>addRecentCustomer(n));
  const mentionedSources=sourceNames.filter(n=>assistantText.toLowerCase().includes(n.toLowerCase())||sourceNames.length<=2);
  return {text:assistantText,sources:mentionedSources.slice(0,3)};
}
