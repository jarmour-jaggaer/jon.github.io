ne e s.m.i” \n> in hp cliccando su Procedure di Gara possono scaricare il \"Regolamento appalti sotto soglia\"\n• Se chiedono info in merito al \"Regolamento Gare\" non cliccabile in hp inoltriamo a: a s.candito@aqp.it; f.carone@aqp.it; r.defilippis@aqp.it; l.vinella@aqp.it; c.santeramo@aqp.it; m.alongi@aqp.it;  p.patane@aqp.it cc:  e.fiorito@aqp.it", "links": []}, {"header": "NOTE PARTICOLARI", "content": "NON FARE LOGIN FORZATI SU QUESTO PORTALE\n• Procedura per controllare se un fornitore è sbloccato: dettagli nel foglio \"Approfondimenti\"\n• Quando inviamo mail ai referenti AQP, mettere in copia  dmesghali@jaggaer.com     \n• X I FORNITORI BLOCCATI che chiedono info ci facciamo mandare una mail da girare a  e.fiorito@aqp.it \n• NB. X fornitori che chiedono il Regolamento Gare di cui si cita l'accettazione nel Modulo di Adesione\n> non è più presente il link per il “Regolamento delle gare on line e s.m.i” \n> in hp cliccando su Procedure di Gara possono scaricare il \"Regolamento appalti sotto soglia\"\n                                          .", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "•  Recupero credenziali > PEC\nacquisti.online@pec.aqp.it", "links": []}, {"header": "Integrazione con SAP", "content": "• SI > Modulo RDA e integrazione anagrafiche fornitori\n(creazione delle PR a Portale tramite SAP (via WS) e trasmissione dei dati di aggiudicazione a SAP tramite contract)", "links": []}], "approfondimenti": [{"topic": "REGISTRAZIONE/MODIFICA DATI", "focal_point": "• Integrazioni con SAP", "details": "• Settembre 2020: censiti migliaia fornitori con:\n> Mail fittizia +  stato “Registrato” + stato ausiliario “Creato da SAP” \n•  Se ci contattano perchè  non riescono a registrarsi (essendo già profilati da AQP)\n> verifichiamo se hanno stato ausiliario “Creato da SAP” + Mail fittizia +  stato “Registrato”\n> riferiamo al fornitore che la sua anagrafica è già censita perchè migrata da SAP\n> per farlo accedere gli diciamo di comunicarci i dati da inserire in anagrafica (seguire procedura Modifiche)\n> ricevuta richiesta inseriamo i dati e lasciamo inalterato stato ausiliario “Creato da SAP” \n> rispondiamo alla mail spiegando passaggi per recuperare username e password (potranno modificare la username al primo accesso)\n> dopo che il fornitore, accedendo, caricherà il Modulo di Adesione verrà controllato il giorno seguente con la solita prassi report", "links": []}, {"topic": "ALBO", "focal_point": "• Dettagli sulla tipologia di albo", "details": "• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi\n• A seguito completamento form, dalla mezzanotte, non è più possibile fare modifiche e si crea l’istanza nella sezione \"Albo fornitori gestione dati\" > \" Istanza di iscrizione\" .\n• Procedura per apportare modifiche quando hanno l’Istanza è già SBLOCCATA. Devono cliccare:\n> su \"Albo fornitori gestione dati\" > su \"Aggiornamento dati di iscrizione\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccare su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche  in Mie Categorie e in \"Aggiornamento dati di iscrizione\" è scritto \"nessun elemento da mostrare\") devono chiedere lo sblocco cliccando:\n> su \"Albo fornitori gestione dati\" > su \"Istanza di Iscrizione\"\n> sotto la voce \"Azienda valutatrice\"> su \"Messaggi/Messaggi non letti\"\" \n> su \"Crea Messaggio\" e richiedono lo sblocco della categoria per poter apportare le modifiche.", "links": []}, {"topic": "ALBO", "focal_point": "• domande sui Contenuti dell'albo", "details": "• Domande sui contenuti dell'albo \n> se hanno l'istanza far mandare messaggio da \"Istanza di iscrizione\"\n> se NON hanno l'istanza \nA) rimandare l'oe a albo.fornitori@aqp.it (indicata su pop-up in hp)\nB) se segnalano che non gli rispondono da albo.fornitori@aqp.it girare mail \nA:  s.candito@aqp.it; f.carone@aqp.it; r.defilippis@aqp.it; l.vinella@aqp.it; c.santeramo@aqp.it; m.alongi@aqp.it;  p.patane@aqp.it \ncc:  e.fiorito@aqp.it", "links": []}, {"topic": "ALBO", "focal_point": "• Nuovo albo (2024)", "details": "•  ALBO dal 22 Marzo 2024 (ed entro il 30/09/2024) - Tutti gli OE dovranno\n1. aggiornare/compilare i nuovi Dati di Abilitazione . Posso farlo \nA) nella sezione Profilo Azienda > Dati Profilo > Onboarding - Abilitazione (NON devono compilare le Informazioni Aggiuntive che non sono modificabili)\nB) Da aprile circa  4000 fornitori vengono invitari alle seguenti rdi con oggetto \"Aggiornamento sezione Abilitazione Nuovo Albo Fornitori\" nella quali devono compilare i form richiesti (sono collegati ai Dati di Abilitazione che possono vedere in Dati Profilo)\n> Rfi_ 485 > pubblicata 12/04 _scadenza 02/05/24 > 1300 fornitori\n> Rfi_496 > prevista pubblicazione 19/04_scadenza 09/05/204 > \n> Rfi_XXXX > prevista pubblicazione 26/04_scadenza 15/05/204 > \n2. Selezionare le categorie merceologiche presenti nell’ Albero Merceologico (2024) e presentare nuova istanza di iscrizione compilando il Nuovo Questionario \nInoltre:\n3. gli oe già qualificati nel vecchio albo x confermare il possesso dei requisiti devono ANCHE autoinvitarsi a una delle RDO aperte disponibili (\"Bando sistema di qualificazione...2024\"), caricare l'allegato richiesto, compilare e ricaricare il DGUE e pubblicare entro la scadenza fissata \nRfq_4811 > x Forniture  > scadenza 26/04/2024 (salvo proroghe)\nRfq_ 4821 >x  Lavori  > scadenza 26/04/2024 (salvo proroghe)\nRfq_4825 > x Servizi  > scadenza 26/04/2024 (salvo proroghe)\nNB: Dopo il 30/09/24, gli oe che non avessero completato l’inserimento dei dati richiesti saranno cancellati dall’Albo Fornitori.", "links": []}, {"topic": "ALBO", "focal_point": "• Come distinguere nuove e vecchie categorie:", "details": "•  Come distinguere nuove e vecchie categorie:\n> SERV0301 > codice numerico senza spazi è nuova, albo 2024\n> SERV 03 01 > codice numerico con spazi è del vecchio albo 2023\n> AC56  > codice vecchio  albo anteriore al 2023", "links": []}, {"topic": "GARE", "focal_point": "• Gare Assicurazioni", "details": "• GARA ASSICURAZIONI  vedere Approfondimenti\n> se scrivono i buyer per modificare la p.iva procediamo con le modifiche \n> se scrivono i fornitori prima di procedere scriviamo a dmesghali@jaggaer.com e  e.fiorito@aqp.it", "links": []}], "buyer_sections": [], "all_links": ["https://appalti.aqp.it/web/login.html?_ncp=1454492941770.545-1", "http://aqprisponde.aqp.it/ask-fornitori.php"], "text": "AQP - Acquedotto Pugliese\nINFO GENERALI\nNON FARE LOGIN FORZATI SU QUESTO PORTALE\n• Console: TLE\n• SF: ACQUEDOTTO PUGLIESE SPA\n• SITO: https://appalti.aqp.it/web/login.html?_ncp=1454492941770.545-1\n• TELEFONO: 02 12 41 21 303 (visibile dopo che cliccano su Richiedi Asssistenza >  CLICCA QUI )\n• Webform x altri quesiti \"Richiedi assistenza \" ( SI può allegare) \n• Webform albo: \"Albo fornitori\" > \"Help fornitori\" >  http://aqprisponde.aqp.it/ask-fornitori.php\n• COMMERCIALI: dmesghali@jaggaer.com; rsemerari@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\nNON FARE LOGIN FORZATI SU QUESTO PORTALE\n• Da 25 marzo non viene più inviato il report: ABILITAZIONE AUTOMATICA A SEGUITO DI COMPILAZIONE FORM\n•  Tutti gli oe devono compilare i form in Profilo Azienda > Dati Profilo > Onboarding - Abilitazione \n> i Fornitori registrati prima del 25/03/2024 per essere abilitati in automatico\n> gli oe già abilitati devono aggiornarli/compilarli entro il 30/09/24 e scegliere categorie del nuovo albo per conservare la qualifica\n• Per fornitori già registrati con stato ausiliario “Creato da SAP”  seguire indicazioni per la modifica dei dati nel foglio Approfondimenti\n• Fornitori abilitati che devono caricare nuovo modulo di adesione (aprile 2021)\nA) se sono stati invitati alla Rdi 399 > devono caricarlo lì\nB) Se non sono invitati alla rdi possono farlo da due aree:\n>  Profilo Azienda > Dati Profilo > cliccare su riga \"Modulo di adesione \" > Modifica\n>  se hanno i form sbloccati possono caricarlo anche dal form di una categoria\nMODIFICHE\nNON FARE LOGIN FORZATI SU QUESTO PORTALE\n• Possono sempre modificare in autonomia tutti i dati di registrazione tranne c.f. e p.iva\n• Si applica procedura Docusign solo x\n> modifica mail se non hanno le credenziali\n> fornitori con stato ausiliario “Creato da SAP”  seguire indicazioni inApprofondimenti\n• Se i contatti AQP non ci danno riscontro x richieste docusign che abbiamo inoltrato\n> li sollecitiamo due volte\n> se dopo 2° sollecito non rispondono chiudiamo il ticket mandando apposito template all'oe\n• Per fornitori già registrati con stato ausiliario “Creato da SAP”  seguire indicazioni nel foglio Approfondimenti\n• Richieste di Cancellazione > inoltrare a referenti AQP della lista qui sotto che faranno la cancellazione  (NO DOCUSIGN)                                 \n• Fornitori con stato di registrazione BLOCCATO > inoltrare a referenti AQP della lista qui sotto\n• Contatti buyer x Docusign: \ns.candito@aqp.it; f.carone@aqp.it; r.defilippis@aqp.it; l.vinella@aqp.it; c.santeramo@aqp.it; m.alongi@aqp.it; p.patane@aqp.it cc:  e.fiorito@aqp.it\nALBO\nNON FARE LOGIN FORZATI SU QUESTO PORTALE\n• Inserimento categorie da Mie categorie + Blocco/Sblocco in area “Albo fornitori gestione dati” > dettagli nel foglio \"Approfondimenti\"\n• NUOVO ALBO 2024: Tutti gli oe devono effettuare delle operazioni riportate nel foglio Approfondimenti\n• La Domanda di Iscrizione che devono caricare nel 1° form categoria si genera da: Profilo Azienda> Stato Azienda > Stampa Dossier\n• FORM \"Indicare il numero delle fatture\"\n > anche se selezionano un numero inferiore a 10 compaiono le sezioni obbligatorie per inserire i dati per 10 fatture \n> devono compilarli tutti per proseguire\n• Domande sui contenuti dell'albo > guardare Approfondimenti\nGARE\nNON FARE LOGIN FORZATI SU QUESTO PORTALE\n• Nella configurazione delle RTI (e altre forme di partecipazione raggruppate) quando aggiungono utenti nella sezione \"Ruolo\" è obblgatorio selezionare una tra le opzioni disponibili nel menù a tendina\n• GARA ASSICURAZIONI  vedere Approfondimenti\n• NB. X fornitori che chiedono il Regolamento Gare di cui si cita l'accettazione nel Modulo di Adesione\n> non è più presente il link per il “Regolamento delle gare on line e s.m.i” \n> in hp cliccando su Procedure di Gara possono scaricare il \"Regolamento appalti sotto soglia\"\n• Se chiedono info in merito al \"Regolamento Gare\" non cliccabile in hp inoltriamo a: a s.candito@aqp.it; f.carone@aqp.it; r.defilippis@aqp.it; l.vinella@aqp.it; c.santeramo@aqp.it; m.alongi@aqp.it;  p.patane@aqp.it cc:  e.fiorito@aqp.it\nNOTE PARTICOLARI\nNON FARE LOGIN FORZATI SU QUESTO PORTALE\n• Procedura per controllare se un fornitore è sbloccato: dettagli nel foglio \"Approfondimenti\"\n• Quando inviamo mail ai referenti AQP, mettere in copia  dmesghali@jaggaer.com     \n• X I FORNITORI BLOCCATI che chiedono info ci facciamo mandare una mail da girare a  e.fiorito@aqp.it \n• NB. X fornitori che chiedono il Regolamento Gare di cui si cita l'accettazione nel Modulo di Adesione\n> non è più presente il link per il “Regolamento delle gare on line e s.m.i” \n> in hp cliccando su Procedure di Gara possono scaricare il \"Regolamento appalti sotto soglia\"\n                                          .\nIDM\n\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n•  Recupero credenziali > PEC\nacquisti.online@pec.aqp.it\nIntegrazione con SAP\n• SI > Modulo RDA e integrazione anagrafiche fornitori\n(creazione delle PR a Portale tramite SAP (via WS) e trasmissione dei dati di aggiudicazione a SAP tramite contract)\nREGISTRAZIONE/MODIFICA DATI\n• Integrazioni con SAP\n• Settembre 2020: censiti migliaia fornitori con:\n> Mail fittizia +  stato “Registrato” + stato ausiliario “Creato da SAP” \n•  Se ci contattano perchè  non riescono a registrarsi (essendo già profilati da AQP)\n> verifichiamo se hanno stato ausiliario “Creato da SAP” + Mail fittizia +  stato “Registrato”\n> riferiamo al fornitore che la sua anagrafica è già censita perchè migrata da SAP\n> per farlo accedere gli diciamo di comunicarci i dati da inserire in anagrafica (seguire procedura Modifiche)\n> ricevuta richiesta inseriamo i dati e lasciamo inalterato stato ausiliario “Creato da SAP” \n> rispondiamo alla mail spiegando passaggi per recuperare username e password (potranno modificare la username al primo accesso)\n> dopo che il fornitore, accedendo, caricherà il Modulo di Adesione verrà controllato il giorno seguente con la solita prassi report\nALBO\n• Dettagli sulla tipologia di albo\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi\n• A seguito completamento form, dalla mezzanotte, non è più possibile fare modifiche e si crea l’istanza nella sezione \"Albo fornitori gestione dati\" > \" Istanza di iscrizione\" .\n• Procedura per apportare modifiche quando hanno l’Istanza è già SBLOCCATA. Devono cliccare:\n> su \"Albo fornitori gestione dati\" > su \"Aggiornamento dati di iscrizione\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccare su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche  in Mie Categorie e in \"Aggiornamento dati di iscrizione\" è scritto \"nessun elemento da mostrare\") devono chiedere lo sblocco cliccando:\n> su \"Albo fornitori gestione dati\" > su \"Istanza di Iscrizione\"\n> sotto la voce \"Azienda valutatrice\"> su \"Messaggi/Messaggi non letti\"\" \n> su \"Crea Messaggio\" e richiedono lo sblocco della categoria per poter apportare le modifiche.\nALBO\n• domande sui Contenuti dell'albo\n• Domande sui contenuti dell'albo \n> se hanno l'istanza far mandare messaggio da \"Istanza di iscrizione\"\n> se NON hanno l'istanza \nA) rimandare l'oe a albo.fornitori@aqp.it (indicata su pop-up in hp)\nB) se segnalano che non gli rispondono da albo.fornitori@aqp.it girare mail \nA:  s.candito@aqp.it; f.carone@aqp.it; r.defilippis@aqp.it; l.vinella@aqp.it; c.santeramo@aqp.it; m.alongi@aqp.it;  p.patane@aqp.it \ncc:  e.fiorito@aqp.it\nALBO\n• Nuovo albo (2024)\n•  ALBO dal 22 Marzo 2024 (ed entro il 30/09/2024) - Tutti gli OE dovranno\n1. aggiornare/compilare i nuovi Dati di Abilitazione . Posso farlo \nA) nella sezione Profilo Azienda > Dati Profilo > Onboarding - Abilitazione (NON devono compilare le Informazioni Aggiuntive che non sono modificabili)\nB) Da aprile circa  4000 fornitori vengono invitari alle seguenti rdi con oggetto \"Aggiornamento sezione Abilitazione Nuovo Albo Fornitori\" nella quali devono compilare i form richiesti (sono collegati ai Dati di Abilitazione che possono vedere in Dati Profilo)\n> Rfi_ 485 > pubblicata 12/04 _scadenza 02/05/24 > 1300 fornitori\n> Rfi_496 > prevista pubblicazione 19/04_scadenza 09/05/204 > \n> Rfi_XXXX > prevista pubblicazione 26/04_scadenza 15/05/204 > \n2. Selezionare le categorie merceologiche presenti nell’ Albero Merceologico (2024) e presentare nuova istanza di iscrizione compilando il Nuovo Questionario \nInoltre:\n3. gli oe già qualificati nel vecchio albo x confermare il possesso dei requisiti devono ANCHE autoinvitarsi a una delle RDO aperte disponibili (\"Bando sistema di qualificazione...2024\"), caricare l'allegato richiesto, compilare e ricaricare il DGUE e pubblicare entro la scadenza fissata \nRfq_4811 > x Forniture  > scadenza 26/04/2024 (salvo proroghe)\nRfq_ 4821 >x  Lavori  > scadenza 26/04/2024 (salvo proroghe)\nRfq_4825 > x Servizi  > scadenza 26/04/2024 (salvo proroghe)\nNB: Dopo il 30/09/24, gli oe che non avessero completato l’inserimento dei dati richiesti saranno cancellati dall’Albo Fornitori.\nALBO\n• Come distinguere nuove e vecchie categorie:\n•  Come distinguere nuove e vecchie categorie:\n> SERV0301 > codice numerico senza spazi è nuova, albo 2024\n> SERV 03 01 > codice numerico con spazi è del vecchio albo 2023\n> AC56  > codice vecchio  albo anteriore al 2023\nGARE\n• Gare Assicurazioni\n• GARA ASSICURAZIONI  vedere Approfondimenti\n> se scrivono i buyer per modificare la p.iva procediamo con le modifiche \n> se scrivono i fornitori prima di procedere scriviamo a dmesghali@jaggaer.com e  e.fiorito@aqp.it"}, "Ascopiave": {"name": "Ascopiave", "sheet": "Ascopiave", "site": "https://www.eproc-ascopiave.it/web/login.html", "phone": "02 12 41 21 303", "console": "TLK", "webform": "\"Richiedi assistenza online\" (SI può allegare)", "commercials": "ccattaneo@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLK\n• SF: ASCOPIAVE SPA\n•  TELEFONO: 02 12 41 21 303  (visibile dopo che cliccano su Richiedi Asssistenza)\n•  SITO: https://www.eproc-ascopiave.it/web/login.html\n• Webform \"Richiedi assistenza online\" (SI può allegare)\n• COMMERCIALI: ccattaneo@jaggaer.com", "links": ["https://www.eproc-ascopiave.it/web/login.html"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• Ricezione Report su mail cliente: \n- pec non obbligatoria > se manca inviamo mail per farla inserire\n- Condizioni di registrazione (12 pagine) + Requisiti, obblighi e condizioni (5 pagine) firmati digitalmente", "links": []}, {"header": "MODIFICHE", "content": "•  Si applica procedura Docusign\n• Richieste di Cancellazione\n> inviamo all'oe primo template per avviare procedura docusign\n> inoltriamo richiesta dell'oe x avere autorizzazione a: stefano.rasera@ascopiave.it; antonella.tittonel@apretigas.it\n> cancelliamo quando si è concluso iter docusign e il cliente ci ha autor avosolution.com/esop/tlk-host/public/cadf/web/login.html\n• TELEFONO: 02 12 41 21 303  (visibile dopo che cliccano su Richiedi Asssistenza)\n• Webform \"Richiedi assistenza online\" (SI può allegare)\n• COMMERCIALI: gpizzinga@jaggaer.com;c-mpetriccione@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• Ricezione Report sul nostro indirizzo: \n- Regolamento per accesso al portale (non c'è niente da compilare basta firma digitale)\n- Pec se manca abilito e mando mail per inserimento.\n• Invio mail richiesta integrazione da portale.\nMODIFICHE\n• Oltre ai soliti campi in autonomia possono modificare la Ragione Sociale (NON la forma giuridica)\n•  Si applica procedura Docusign\n• Contatti buyer x Docusign: barbara.trombetta@cadf.it; simona.zanellato@cadf.it; marcello.maccanti@deltawebferrara.it; enrico.ditta@deltawebferrara.it; camilla.gavioli@cadf.it\nIDM\n\nALBO\n• Inserimento categorie da Mie Categorie  + Blocco/Sblocco in area “Albo fornitori gestione dati” > dettagli nel foglio \"Approfondimenti\"            \n• Nel primo form di categoria devono allegare il Modulo di Istanza di Ammissione > si tratta di un template scaricabile nello stesso form\n• I Modelli sono scaricabili nei singoli form di categoria\n• X Domande sui Contenuti dell'Albo lasciare questa mail ai fornitori: infofornitori@cadf.it\nGARE\n• Nelle rdo le S.A. chiedono di caricare la Domanda di Iscrizione:  \n- si tratta di D.E. e chi l'ha già compilato nelle categorie se lo ritrova già compilato anche nella rdo \n- chi non ha il campo già compilato nella rdo > devono scaricare il template dai form di categoria\n- chi dovesse eliminarlo e non può più scaricarlo perchè ha le categorie bloccate, deve mandare messaggio dalla gara e chiedere al buyer di inoltrarglielo (non di sbloccargli le categorie)\nNOTE PARTICOLARI\n• Per capire se il fornitore sia o meno sbloccato:\n- accedere con le credenziali del controllo doc\n- Albo Fornitori\n- Valutazioni di categoria globali\n- filtro per azienda fornitore\n- cliccare sulla stringa del fornitore\n- controllare 'FORM ATTUALMENTE MODIFICABILE DA'\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n•  Recupero credenziali > PEC\napprovvigionamenti@cert.cadf.it\nIntegrazione con SAP\n\nALBO\n• Dettagli sulla tipologia di albo\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi\n• A seguito completamento form, dalla mezzanotte, non è più possibile fare modifiche e si crea l’istanza nella sezione \"Albo fornitori gestione dati\" > \" Istanza di iscrizione\" .\n• Procedura per apportare modifiche quando hanno l’Istanza è già SBLOCCATA. Devono cliccare:\n> su \"Albo fornitori gestione dati\" > su \"Aggiornamento dati di iscrizione\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccare su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche  in Mie Categorie e in \"Aggiornamento dati di iscrizione\" è scritto \"nessun elemento da mostrare\") devono chiedere lo sblocco cliccando:\n> su \"Albo fornitori gestione dati\" > su \"Istanza di Iscrizione\"\n> sotto la voce \"Azienda valutatrice\"> su \"Messaggi/Messaggi non letti\"\" \n> su \"Crea Messaggio\" e richiedono lo sblocco della categoria per poter apportare le modifiche.               \n• UTENZE PER CONTROLLO ALBO (SBLOCCO) stesse del controllo x abilitazione.\n\n•\n•\n\n•\n•"}, "Caie": {"name": "CAIE", "sheet": "Caie", "site": "https://caie.bravosolution.com/web/login.html", "phone": "02 124 121 303", "console": "CAIE - Consorzio Autostrade Italiane Energia", "webform": "\"Assistenza online\"", "commercials": "sgalassi@jaggaer.com; rfinelli@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: CAIE - Consorzio Autostrade Italiane Energia\n• SF: TLE\n• SITO: https://caie.bravosolution. ZIONI-ABILITAZIONI\nesempio\n• Richieste abilitazioni da buyer\n•\n\n•\n•\n\n•\n•"}, "Cap": {"name": "Cap Holding", "sheet": "Cap", "site": "https://acquisti.gruppocap.it", "phone": "02 124 121 303", "console": "CAP HOLDING SPA", "webform": "\"Richiedi assistenza\" (si può allegare) (presente in 1° e 2° homepage)", "commercials": "ccattaneo@jaggaer.com; sgalassi@jaggaer.com;  c-mpetriccione@jaggaer.com;  gpizzinga@jaggaer.com;", "sections": [{"header": "INFO GENERALI", "content": "• Console: CAP HOLDING SPA\n• SF: TLE\n• SITO: https://acquisti.gruppocap.it\n• TELEFONO: 02 124 121 303 (visibile dopo che cliccano su Richiedi Asssistenza)\n• Webform \"Richiedi assistenza\" (si può allegare) (presente in 1° e 2° homepage)\n• COMMERCIALI: ccattaneo@jaggaer.com; sgalassi@jaggaer.com;  c-mpetriccione@jaggaer.com;  gpizzinga@jaggaer.com;", "links": ["https://acquisti.gruppocap.it"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "AUTOMATICA\n• Dopo l'abilitazione I Dati Profilo non sono modificabili (I sales non riferiscono cosa fare se vogliono aggiornarli> chiedere nuovamente alla prossima occasione)\n• Registrazione GRUPPI IVA: i dettagli nel foglio Approfondimenti", "links": []}, {"header": "MODIFICHE", "content": "• Possono modificare in autonomia referente, email e telefono. \n• Possono convertire un Sottoutente in Supetutente con apposito tasto in Gestione Utenti > cliccando sulla riga del superutente e c'è tasto a destra per cambiare il ruolo\n• Per tutte le modifiche >  \n1) si applica procedura Docusign\n2) concluso iter Docusign avvisiamo sempre per conoscenza: carlo.restelli@gruppocap.it\n• Richieste di Cancellazione\n> inviamo all'oe primo template per avviare procedura docusign\n> inoltriamo richiesta dell'oe x avere autorizzazione a: carlo.restelli@gruppocap.it\n> cancelliamo quando si è concluso iter docusign e il cliente ci ha autorizzato    \n• P.IVA DI GRUPPO: dettagli per Modifica nel foglio Approfondimenti\n• Dopo l'abilitazione I Dati Profilo non sono modificabili e rimangono così\n• Contatti buyer x Docusign: carlo.restelli@gruppocap.it", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• Inserimento categorie da Albo fornitori > Aggiungi categoria > Espandi\n• NO Blocco/Sblocco. Possono inviare messaggi x chiarimenti dalle Valutazioni di Categoria.\n• Domande sui contenuti dell'albo per chi non ha l'istanza le giriamo a: fornitori@gruppocap.it", "links": []}, {"header": "GARE", "content": "", "links": []}, {"header": "NOTE PARTICOLARI", "content": "• WEBFORM presente\n- in home page prima di accedere\n- dopo login", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "Gruppo IVA", "focal_point": "• Registrazione Gruppi IVA", "details": "•  PRIMA REGISTRAZIONE PER CHI FA PARTE DI UN GRUPPO IVA \nI fornitori che dovranno registrarsi in quanto appartenenti ad un Gruppo IVA dovranno \n> inserire il CF all’interno del campo dedicato alla P.IVA\n> devono compilare due nuovi form specifici \na) Nel primo il fornitore indica se aderisce o meno al G.IVA\nb) Nel secondo, condizionato al primo, indica la PIVA di gruppo.\n• NB x CAP: Nella homepage del portale, cliccando su Registrazione possono scaricare la Guida Alla registrazione con tutte le indicazioni", "links": []}, {"topic": "Gruppo IVA", "focal_point": "• Risposte da dare a chi vuole modificare info in Dati Profilo > Gruppo IVA", "details": "RICHIESTE DI MODIFICA LEGATE AL  GRUPPO IVA\n• OE già registrato con vecchia P.IVA:\n> si applica procedura Docusign in cui devono indicarci i dettagli p.iva di gruppo da inserire\n> concluso iter Docusign per fare la modifica rivolgersi a Manu, Ilde \n• OE già registrato come appartenente a Gruppo IVA, che esce dal gruppo IVA: \n> si applica procedura Docusign in cui devono indicarci partita iva da mettere \n> concluso iter Docusign per fare la modifica rivolgersi a Manu, Ilde \n• OE registrato con partita iva della sua azienda che non fa parte di un Gruppo ma  che vuole indicare \"NO\" nel campo gruppo IVA > diciamo che non è necessario specificarlo (sarà necessario contattarci se in futuro entrerà a far parte di un gruppo IVA)", "links": []}, {"topic": "Gruppo IVA", "focal_point": "• SOLO PER CHI PUO' FARE LA MODIFICA: Procedura per Modifica Gruppo IVA", "details": "• SOLO PER CHI PUO' FARE LA MODIFICA:\nRicevuta regolare richiesta di modifica dall'OE:\n> accedere con le utenze apposite > cercare il fornitore > dati profilo\n> modificare campo p.iva:\nA) se entrato nel G.IVA > ricopiare il CF\nB) se è uscito da G.IVA > togliere il c.f. e mettere la p.iva che ci specifica nella richiesta\n> Nei Dati Profilo:\nA) se entrato nel G.IVA > selezionare SI nel menù a tendina > inserire P.IVA di gruppo nel campo che compare\nB) se è uscito da G.IVA > selezionare NO nel menù a tendina", "links": []}], "buyer_sections": [], "all_links": ["https://acquisti.gruppocap.it"], "text": "Cap Holding\nINFO GENERALI\n• Console: CAP HOLDING SPA\n• SF: TLE\n• SITO: https://acquisti.gruppocap.it\n• TELEFONO: 02 124 121 303 (visibile dopo che cliccano su Richiedi Asssistenza)\n• Webform \"Richiedi assistenza\" (si può allegare) (presente in 1° e 2° homepage)\n• COMMERCIALI: ccattaneo@jaggaer.com; sgalassi@jaggaer.com;  c-mpetriccione@jaggaer.com;  gpizzinga@jaggaer.com;\nREGISTRAZIONI-ABILITAZIONI\nAUTOMATICA\n• Dopo l'abilitazione I Dati Profilo non sono modificabili (I sales non riferiscono cosa fare se vogliono aggiornarli> chiedere nuovamente alla prossima occasione)\n• Registrazione GRUPPI IVA: i dettagli nel foglio Approfondimenti\nMODIFICHE\n• Possono modificare in autonomia referente, email e telefono. \n• Possono convertire un Sottoutente in Supetutente con apposito tasto in Gestione Utenti > cliccando sulla riga del superutente e c'è tasto a destra per cambiare il ruolo\n• Per tutte le modifiche >  \n1) si applica procedura Docusign\n2) concluso iter Docusign avvisiamo sempre per conoscenza: carlo.restelli@gruppocap.it\n• Richieste di Cancellazione\n> inviamo all'oe primo template per avviare procedura docusign\n> inoltriamo richiesta dell'oe x avere autorizzazione a: carlo.restelli@gruppocap.it\n> cancelliamo quando si è concluso iter docusign e il cliente ci ha autorizzato    \n• P.IVA DI GRUPPO: dettagli per Modifica nel foglio Approfondimenti\n• Dopo l'abilitazione I Dati Profilo non sono modificabili e rimangono così\n• Contatti buyer x Docusign: carlo.restelli@gruppocap.it\nIDM\n\nALBO\n• Inserimento categorie da Albo fornitori > Aggiungi categoria > Espandi\n• NO Blocco/Sblocco. Possono inviare messaggi x chiarimenti dalle Valutazioni di Categoria.\n• Domande sui contenuti dell'albo per chi non ha l'istanza le giriamo a: fornitori@gruppocap.it\nGARE\n\nNOTE PARTICOLARI\n• WEBFORM presente\n- in home page prima di accedere\n- dopo login\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n\nIntegrazione con SAP\n\nGruppo IVA\n• Registrazione Gruppi IVA\n•  PRIMA REGISTRAZIONE PER CHI FA PARTE DI UN GRUPPO IVA \nI fornitori che dovranno registrarsi in quanto appartenenti ad un Gruppo IVA dovranno \n> inserire il CF all’interno del campo dedicato alla P.IVA\n> devono compilare due nuovi form specifici \na) Nel primo il fornitore indica se aderisce o meno al G.IVA\nb) Nel secondo, condizionato al primo, indica la PIVA di gruppo.\n• NB x CAP: Nella homepage del portale, cliccando su Registrazione possono scaricare la Guida Alla registrazione con tutte le indicazioni\nGruppo IVA\n• Risposte da dare a chi vuole modificare info in Dati Profilo > Gruppo IVA\nRICHIESTE DI MODIFICA LEGATE AL  GRUPPO IVA\n• OE già registrato con vecchia P.IVA:\n> si applica procedura Docusign in cui devono indicarci i dettagli p.iva di gruppo da inserire\n> concluso iter Docusign per fare la modifica rivolgersi a Manu, Ilde \n• OE già registrato come appartenente a Gruppo IVA, che esce dal gruppo IVA: \n> si applica procedura Docusign in cui devono indicarci partita iva da mettere \n> concluso iter Docusign per fare la modifica rivolgersi a Manu, Ilde \n• OE registrato con partita iva della sua azienda che non fa parte di un Gruppo ma  che vuole indicare \"NO\" nel campo gruppo IVA > diciamo che non è necessario specificarlo (sarà necessario contattarci se in futuro entrerà a far parte di un gruppo IVA)\nGruppo IVA\n• SOLO PER CHI PUO' FARE LA MODIFICA: Procedura per Modifica Gruppo IVA\n• SOLO PER CHI PUO' FARE LA MODIFICA:\nRicevuta regolare richiesta di modifica dall'OE:\n> accedere con le utenze apposite > cercare il fornitore > dati profilo\n> modificare campo p.iva:\nA) se entrato nel G.IVA > ricopiare il CF\nB) se è uscito da G.IVA > togliere il c.f. e mettere la p.iva che ci specifica nella richiesta\n> Nei Dati Profilo:\nA) se entrato nel G.IVA > selezionare SI nel menù a tendina > inserire P.IVA di gruppo nel campo che compare\nB) se è uscito da G.IVA > selezionare NO nel menù a tendina"}, "Cdp": {"name": "CDP - Cassa Depositi e Prestiti", "sheet": "Cdp", "site": "https://portaleacquisti.cdp.it", "phone": "02 00 70 42 46", "console": "TLK", "webform": "\"Richiedi assistenza online\" (SI può allegare)", "commercials": "ldecapite@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLK\n• SF: CASSA DEPOSITI E PRESTITI SPA\n• SITO: https://portaleacquisti.cdp.it \n(url alternativo: https://albocdp.bravosolution.com )\n• TELEFONO:  02 00 70 42 46\n• Webform: \"Richiedi assistenza online\" (SI può allegare)\n• COMMERCIALI:  ldecapite@jaggaer.com", "links": ["https://portaleacquisti.cdp.it", "https://albocdp.bravosolution.com"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• Abilitazione Condizionale legata al completamento dei form supplementari e scelta di almeno una categoria", "links": []}, {"header": "MODIFICHE", "content": "• possono modificare tutto (anche username) in autonomia tranne CF, P.IVA , Ragione Sociale.\n• per il resto mandiamo mail con testo copiato da file salvato in cdp/procedure (2 casistiche diverse!) che loro devono compilare e inviare direttamente a cdp che fa le modifiche (NO DOCUSIGN)\n> NB:se un fornitore ci segnala di aver inviato richiesta di modifica a CDP senza ricevere risposta inoltriamo la segnalazione ai sales\n• per richieste CANCELLAZIONE utenza gli diciamo di scrivere direttamente a CDP: acquisti@cdp.it", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• NON c'è blocco/sblocco (le modifiche sono sempre attive)\n> se è CDP a chiedere aggiornamenti devono lavorare in Valutazioni Modificabii e poi  cliccare \"Conferma e invia a Cassa Depositi e Prestiti\"\n• dal menu di sinistra hanno le icone con \n- Profilo Utente  >>   Mie categorie\n• Messaggistica DAL MENU DI SINISTRA (non dal cruscotto): \n- Profilo Utente >> Valutazioni (se si è già creata l'istanza )  >> Valutazioni di categoria\n•  Per info su contenuti albo girare a: roberto.viani@cdp.it; serafino.valentini@cdp.it   cc: giovanna.corporandi@cdp.it", "links": []}, {"header": "GARE", "content": "", "links": []}, {"header": "NOTE PARTICOLARI", "content": "", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "•  Per informazioni sulla fatturazione possono consultare il link: https://www.cdp.it/sitointernet/it/contatti_sedi.page", "links": ["https://www.cdp.it/sitointernet/it/contatti_sedi.page"]}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "•  Recupero credenziali > PEC\nportaleacquisti@pec.cdp.it", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "MODIFICA MAIL/REFERENTE", "focal_point": "• Template da inviare x modifica Mail/Referente", "details": "• TEMPLATE PER MODIFICA REFERENTE/MAIL:\n\nGentile Fornitore,\nal fine di consertirLe la modifica dei dati di registrazione relativi alla sua Società per l’Accesso al Portale Acquisti del Gruppo CDP, si riportano di seguito le modalità operative da effettuare.\nDovrà essere inviata dalla vs PEC istituzionale all’indirizzo PEC di CDP elenco.fornitori@pec.cdp.it una comunicazione contenente i seguenti campi obbligatori:\nInformazioni Impresa\n•\tDenominazione [inserire la Ragione Sociale in caso di registrazione di una persona giuridica ovvero inserire il Nome e Cognome in caso di registrazione di una persona fisica]: [____________________________________]\n•\tNome referente : [____________________________________]\n•             Forma giuridica : [____________________________________]\n•             Codice Fiscale  : [____________________________________]\n•             Partita IVA : [____________________________________]      \n•             CAP (Sede Legale): [____________________________________]\n•             Comune (Sede Legale) : [____________________________________]\n•             Indirizzo (Sede Legale)  : [____________________________________]\n•             Provincia (Sede Legale)  : [____________________________________]\n•             E-mail PEC abilitata alla ricezione anche di mail ordinarie (o strumento analogo per gli operatori stranieri) - domicilio eletto per la ricezione di tutte le comunicazioni emesse dal Portale Acquisti \nIMPORTANTE: Questo indirizzo email verrà utilizzato per l'accesso al sito e per tutte le comunicazioni. Assicurarsi di inserire l'indirizzo corretto. Si prega di utilizzare \";\" (punto e virgola) per separare più indirizzi): [____________________________________]\n•             Telefono : [____________________________________]\n•             Username (per l'accesso in area riservata del Portale Acquisti): [____________________________________]\nUna volta ricevute le informazioni sopra riportate, a seguito di opportune verifiche, si provvederà ad aggiornarle sul Portale Acquisti e a comunicare le nuove credenziali di accesso\nCordiali saluti", "links": []}, {"topic": "MODIFICA MAIL/REFERENTE", "focal_point": "• Template INGLESE da inviare x modifica Mail/Referente", "details": "• TEMPLATE INGLESE PER MODIFICA REFERENTE/MAIL:\n\nDear User,\nIn order to edit your company data to retrieve your credentials for the portal:\nhttps://portaleacquisti.cdp.it\nplease fill in and send the following template to the address: elenco.fornitori@pec.cdp.it \nCompany data\nCompany name: [____________________________________]\nContact name : [____________________________________]\nLegal status: [____________________________________]\nFiscal Code: [____________________________________]\nVAT: [____________________________________] \nAddress (legal headquarters): [____________________________________]\nE-mail address: [____________________________________]\nTelephone number : [____________________________________]\nUsername: [____________________________________]\nCDP will verify, edit your company data and send you new credentials.\nBest regards", "links": ["https://portaleacquisti.cdp.it"]}, {"topic": "MODIFICA RAGIONE SOCIALE/FORMA GIURIDICA", "focal_point": "• Template da inviare x modifica Ragione Sociale/Forma Giuridica", "details": "• TEMPLATE PER MODIFICA RAGIONE SOCIALE/FORMA GIURIDICA:\n\nGentile Fornitore,\nal fine di consentirLe l’aggiornamento/modifica di alcuni dati di registrazione relativi alla sua Società per l’Accesso al Portale Acquisti del Gruppo CDP, si riportano di seguito le modalità operative da effettuare.\nDovrà essere inviata dalla vs PEC istituzionale all’indirizzo PEC di CDP elenco.fornitori@pec.cdp.it una comunicazione contenente i seguenti campi obbligatori:\nInformazioni Impresa\n•             Denominazione [inserire la Ragione Sociale in caso di registrazione di una persona giuridica ovvero inserire il Nome e Co e Fiscale  : [____________________________________]\n•             Partita IVA : [____________________________________]      \n•             CAP (Sede Legale): [____________________________________]\n•             Comune (Sede Legale) : [____________________________________]\n•             Indirizzo (Sede Legale)  : [____________________________________]\n•             Provincia (Sede Legale)  : [____________________________________]\n•             E-mail PEC abilitata alla ricezione anche di mail ordinarie (o strumento analogo per gli operatori stranieri) - domicilio eletto per la ricezione di tutte le comunicazioni emesse dal Portale Acquisti \nIMPORTANTE: Questo indirizzo email verrà utilizzato per l'accesso al sito e per tutte le comunicazioni. Assicurarsi di inserire l'indirizzo corretto. Si prega di utilizzare \";\" (punto e virgola) per separare più indirizzi): [____________________________________]\n•             Telefono : [____________________________________]\n•             Username (per l'accesso in area riservata del Portale Acquisti): [____________________________________]\nUna volta ricevute le informazioni sopra riportate, a seguito di opportune verifiche, si provvederà ad aggiornarle sul Portale Acquisti e a comunicare le nuove credenziali di accesso\nCordiali saluti\nMODIFICA MAIL/REFERENTE\n• Template INGLESE da inviare x modifica Mail/Referente\n• TEMPLATE INGLESE PER MODIFICA REFERENTE/MAIL:\n\nDear User,\nIn order to edit your company data to retrieve your credentials for the portal:\nhttps://portaleacquisti.cdp.it\nplease fill in and send the following template to the address: elenco.fornitori@pec.cdp.it \nCompany data\nCompany name: [____________________________________]\nContact name : [____________________________________]\nLegal status: [____________________________________]\nFiscal Code: [____________________________________]\nVAT: [____________________________________] \nAddress (legal headquarters): [____________________________________ stato \"Bloccato\" da Credite Agricole > inoltriamo segnalazione al PS che lo fa sbloccare da CA > chiedere di avvisarci\n• Se chiedono supporto per sito ECOVADIS : (è consigliata da Credit Agricol) non diamo supporto\nBIDDING GROUP ATTIVO\n• NO\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n\nIntegrazione con SAP\n\nesempio:\nREGISTRAZIONI-ABILITAZIONI\nesempio\n• Richieste abilitazioni da buyer\n•\n\n•\n•\n\n•\n•"}, "Dolomiti": {"name": "Dolomiti Energia", "sheet": "Dolomiti", "site": "https://dolomitienergia.bravosolution.com/web/login.html", "phone": "02 124 121 303", "console": "TLE", "webform": "\"Contatti\" > compare menù con opzioni (SI può allegare)", "commercials": "emangini@jaggaer.com; gpizzinga@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLE\n• SF: DOLOMITI ENERGIA HOLDING SPA\n•  SITO: https://dolomitienergia.bravosolution.com/web/login.html\n• TELEFONO: 02 124 121 303\n• Webform: \"Contatti\" > compare menù con opzioni (SI può allegare)\n•  COMMERCIALI:  emangini@jaggaer.com; gpizzinga@jaggaer.com", "links": ["https://dolomitienergia.bravosolution.com/web/login.html"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "•  Autoabilitazione con richiesta di iscrizione firmata digitalmente (non necessario controllo).\n• Le società che hanno anche una Partita IVA di Gruppo devono indicare\n> la partiva iva singola in Profilo Azienda > Dati di Registrazione > Informazioni sull'azienda\n> la partita iva di gruppo in Profilo Azienda > dati Profilo > cliccare sulla riga Partita iva di gruppo > matita", "links": []}, {"header": "MODIFICHE", "content": "• Gli oe in AUTONOMIA possono:\n> modificare Nome e Cognome del superuser e Contatti (> Mail/Username possono modificarla in Profilo Utente > Modifica Credenziali Global ID)\n> creare sottoutenza e poi convertirla in Superutente (indicazioni in Approfondimenti)\n• X Modifica Mail X Recupero Credenziali IDM > Si applica procedura Docusign \n• Modif e entrati con le normali credenziali ) \n>  la sezione si chiama Procure to pay\n> se non è già stato fatto, x la ricezione dei soli ordini DA CATALOGO, andrà inserita la mail in:\n> Profilo dell'organizzazione > Dati profilo > cliccare sulla riga “Modalità invio ordini di acquisto” disponibile dalla sezione “Dati Profilo”\n• QUESITI SUL CATALOGO devono selezionare dal form della homepage:\n- cliccare su Contatti\n- devono fleggare \"Ordini e Cataloghi: supporto caricamento cataloghi e presa visione ordini\", compilare il form e cliccare su \"Invia\"\n- queste richieste arrivano direttamente a chi gestisce il Catalogo\n- se finisce nella nostra coda bisogna assegnarlo alla coda corretta cliccando su tasto OC Skill update:\n> titolare caso: area di attesa> skill based routing\n> county : Italy - PS (Premium Legacy)", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "•  Recupero credenziali > non pec (noreply@jaggaer.com)", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "IDM", "focal_point": "• Info sull'IDM", "details": "• ACCESSO CON IDM: cosa devono fare da aprile 2023\n1) cliccare \"Accesso fornitori\"> si apre pop up dove inserire la solita psw e nel campo \"email\" uno degli indirizzi registrati sul portale\n2) cliccano \"Conferma indirizzo e-mail\" e il sistema li manda nel Profilo utente dove devono:\n3) cliccare Modifica Credenziali Global ID x impostare la mail che diventerà la username\n> inserire in \"Nuova mail\" e \"conferma nuova mail\" una mail ordinaria (preferibilmente con dominio aziendale) > Conferma\n4) cliccare la Matita per aggiornare gli indirizzi mail di riferimento delle comunicazioni\n> c'è un campo apposito per PEC e un campo separato per una mail ordinaria che si chiama \"indirizzi mail aggiuntivi\"\n> cliccando su \"Aggiungi\" sotto  \"indirizzi mail aggiuntivi\" possono aggiungere altre mail ordinarie fino a max 5\n> Salvare\n• NB se dopo fatto aver fatto il web/login-ferservizi.html\n• TELEFONO: 02 00 70 42 52\n• Webform \"Richiedi assistenza online\" (si può allegare)\n• Webmail gestita da Team Buyer: http://outlook.com/owa/gruppofs.it\n• COMMERCIALI: slasala@jaggaer.com; dmesghali@jaggaer.com; frighi@jaggaer.com; ctrovalusci@jaggaer.com", "links": ["https://www.acquistionlineferservizi.it/web/login-ferservizi.html", "http://outlook.com/owa/gruppofs.it"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• Ricezione Report sul nostro indirizzo: \n- Modulo di adesione firmato digitalmente compilato e firmato digitalmente (ACCETTARE SOLO IL NUOVO MODULO: senza parte EXPO e senza caselle da barrare per la privacy)\n- Pec obbligatoria\n•  Fornitori stranieri non abilitati per assenza firma digitale o non valida > indicazioni in Approfondimenti\n• 16/12/24 migrazione su Gruppo FS: info sugli oe migrati in Approrondimenti > Registrazioni\n• Le società che hanno una P. IVA DI GRUPPO e non riescono a registrasi perchè è già stata utilizzata da una società del gruppo iva >\n> possono registrarsi aggiungendo un punto dopo la P.IVA di gruppo (es: 13454210158. )", "links": []}, {"header": "MODIFICHE", "content": "•  x Modifiche di Base (indirizzi, telefono, creazione nuovo superutente) \n> si applica procedura Docusign\n• Modifica Ragione Sociale, Cancellazione Correzione P.iva e/o C.F. (solo per correzioni o casi particolari ad es. un libero professionista che non aveva p.iva e dopo gli è stata assegnata)\n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a contatti indicati in fondo\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato                        \n• Contatti buyer x Docusign:                \nA:   s.proietti@ferservizi.it;  s.sciosciasantoro@ferservizi.it\nCC: a.iorio@ferservizi.it; slasala@jaggaer.com; dmesghali@jaggaer.com; frighi@jaggaer.com; ctrovalusci@jaggaer.com i non abilitati per assenza firma digitale o non valida (Non devono inviare mail con segnalazione errori a questi oe)\n> la inoltriamo a Ferservizi che valuterà se dobbiamo abilitarli ugualmente : \ns.proietti@ferservizi.it; a.carbone@ferservizi.it; e.cavallaro@ferservizi.it; s.sciosciasantoro@ferservizi.it; c.giugliano@ferservizi.it; a.iorio@ferservizi.it; e.cionfrini@ferservizi.it; g.catalano@ferservizi.it\n> se ci autorizzano li abilitiamo noi\n> agli oe che non ci autorizzano ad abilitare inviamo la mail con segnalazione del problema riscontrato usando i template presenti in SP", "links": []}, {"topic": "REGISTRAZIONI-ABILITAZIONI", "focal_point": "• Utenze Migrate su Gruppo FS il 16 Dic 24", "details": "• 16/12/24 migrazione su Gruppo FS: \nA) migrati in stato da abilitare su Gruppo FS  solo gli oe Qualificati per i SDQ + alcuni oe richiesti da Ferservizi\n> devono accettare >informativa privacy + condizioni di accesso > il sistema li abilita\nB) NON migrati il 16/12/24:\n> Chi ha scelto e completato form per categorie SDQ ma non è stato ancora qualificato. (Lo valuteranno e qualificheranno su Ferservizi e dopo la qualifica lo migreranno) \n> Chi non ha mai scelto categorie su Ferservizi. Se interessati devono registrarsi su Gruppo FS\n> Chi ha scelto categorie Albo Fornitori e Albo Start up > In futuro, gli oe qualificati per queste categorie, verranno migrati.", "links": []}, {"topic": "ALBO", "focal_point": "• FUNZIONALITA' ALBO DURANTE COESISTENZA PORTALE GRUPPO E FS E FERSERVIZI\n\n> casistiche particolari qualifica  legate ai coesistenza due portali", "details": "• Funzionalità Albo Ferservizi durante coesistenza due portali:\n- Le categorie del SDQ (Sistema di Qualificazione):\n> dal go live su Gruppo fs non saranno pià selezionabili su Ferservizi > chi vuole scegliere categorie SDQ deve farlo su Gruppo FS\n> oe qualificati al momento del go live sono migrati in stato da abilitare su Gruppo FS > devono accettare a video privacy e condizioni di accesso > il sistema li abilita e compaiono le istanze SDQ in Valutazioni\n> per gli oe con i SDQ con stato \"in Valutazione\" viene conclusa la valutazione su Ferservizi e poi vengono migrati su Gruppo FS\n- l’Albo Fornitori e l’Albo Startup per qualche tempo rimangono attivi su Ferservizi e possono selezionare le relative categorie- \n• Potrà succedere che un oe in valutazione per gli SDQ su Ferservizi vada a qualificarsi per gli SDQ anche su Gruppo FS. \n> Se oe ci segnala che lo ha fatto e chiede info rimandare a minerva_acquisti_support@fstechnology.it con relativo template", "links": []}, {"topic": "ALBO", "focal_point": "• DOMANDE SUI CONTENUTI", "details": "• Domande sui contenuti dell'albo:\nA) se hanno l'istanza in Valutazioni> mandano messaggio Valutazioni > Valutazioni di Categoria (se è una categoria SDQ da portale Gruppo FS, per altre categorie da Ferservizi)\nB) se NON ha istanza in Valutazioni > rimandare a indirizzi mail presenti in hp nelle due aree:\n> Gruppo FS > Area Fonitori > Sistemi di qualificazione > cliccare sul nome dellla società del gruppo associata alla loro categoria\n> Gruppo FS > Area Fonitori > Albi > cliccare sul nome dellla società del gruppo associata alla loro categoria", "links": []}, {"topic": "ALBO", "focal_point": "• FAQ ALBO", "details": "FAQ:\n•  \"Requisiti di ordine generale\" x iscriversi ai Sistema  di Qualificazione> si scarica da template presente nel form o  dall'homepage:\n> sotto Sistema di Qualificazione > Regolamento Generale, categorie merceologiche e Schede tecniche \n> aprire cartella \"Regolamento e Allegati\" \n> aprire cartella \"Allegati regolamento generale\"\n> aprire \"All. 1  Scheda Requisiti Legali e di Integrità\"\n> trovano \"I Requisiti di ordine generale\"da pagina 4 del suddetto documento\n• \"Domanda di iscrizione all'Albo Fornitori e/o al Sistema di Qualificazione”\n> perchè si crei correttamente l'istanza (qr) gli oe devono caricare e salvare la Domanda di Iscrizione dopo aver inserito tutti gli altri dati\n> x il suddetto motivo quando apportano aggiornamenti ai form devono sempre ricaricare la Domanda di Iscrizione come ultimo dato\n> presente template con istruzioni  sui passaggi da fare nel file template", "links": []}], "buyer_sections": [], "all_links": ["https://www.acquistionlineferservizi.it/web/login-ferservizi.html", "http://outlook.com/owa/gruppofs.it"], "text": "Ferservizi\nINFO GENERALI\n• Console: FER\n• SF: FERSERVIZI SPA\n• SITO: https://www.acquistionlineferservizi.it/web/login-ferservizi.html\n• TELEFONO: 02 00 70 42 52\n• Webform \"Richiedi assistenza online\" (si può allegare)\n• Webmail gestita da Team Buyer: http://outlook.com/owa/gruppofs.it\n• COMMERCIALI: slasala@jaggaer.com; dmesghali@jaggaer.com; frighi@jaggaer.com; ctrovalusci@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• Ricezione Report sul nostro indirizzo: \n- Modulo di adesione firmato digitalmente compilato e firmato digitalmente (ACCETTARE SOLO IL NUOVO MODULO: senza parte EXPO e senza caselle da barrare per la privacy)\n- Pec obbligatoria\n•  Fornitori stranieri non abilitati per assenza firma digitale o non valida > indicazioni in Approfondimenti\n• 16/12/24 migrazione su Gruppo FS: info sugli oe migrati in Approrondimenti > Registrazioni\n• Le società che hanno una P. IVA DI GRUPPO e non riescono a registrasi perchè è già stata utilizzata da una società del gruppo iva >\n> possono registrarsi aggiungendo un punto dopo la P.IVA di gruppo (es: 13454210158. )\nMODIFICHE\n•  x Modifiche di Base (indirizzi, telefono, creazione nuovo superutente) \n> si applica procedura Docusign\n• Modifica Ragione Sociale, Cancellazione Correzione P.iva e/o C.F. (solo per correzioni o casi particolari ad es. un libero professionista che non aveva p.iva e dopo gli è stata assegnata)\n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a contatti indicati in fondo\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato                        \n• Contatti buyer x Docusign:                \nA:   s.proietti@ferservizi.it;  s.sciosciasantoro@ferservizi.it\nCC: a.iorio@ferservizi.it; slasala@jaggaer.com; dmesghali@jaggaer.com; frighi@jaggaer.com; ctrovalusci@jaggaer.com\nIDM\n\nALBO\n• Da 10 Luglio 2025 non sono più selezionabili le categorie Servizi\n• Categorie scelte > x scegliere le categorie\n• Domande sui contenuti dell'albo:\nA) se hanno l'istanza in Valutazioni> mandano messaggio Valutazioni > Valutazioni di Categoria (se è una categoria SDQ da portale Gruppo FS, per altre categorie da Ferservizi)\nB) se NON ha istanza in Valutazioni > rimandare a indirizzi mail presenti in hp di Gruppo FS nelle due aree\n> Gruppo FS > Area Fonitori > Sistemi di qualificazione > cliccare sul nome dellla società del gruppo associata alla loro categoria\n> Gruppo FS > Area Fonitori > Albi > cliccare sul nome dellla società del gruppo associata alla loro categoria\n• Funzionalità Albo Ferservizi durante coesistenza due portali in  Approfondimenti > Albo\n• Nel foglio Approfondimenti ci sono FAQ inerenti: domanda di iscrizione, allegato \"Requisiti di ordine generale\" ecc\nGARE\n•  Dopo il passaggio a Gruppo FS\n> gare pubblicate prima del passaggio vengono concluse su Ferservizi\n> le nuovo le pubblicano su Gruppo FS\nNOTE PARTICOLARI\n\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n• PORTALE INSERIMENTO FATTURE: Non diamo assistenza/info\nMAIL CHE PARTONO DA SISTEMA\n•  Recupero credenziali > PEC\nacquistionline@pec.ferservizi.it\n• Richieste di integrazione x albo > PEC\nIntegrazione con SAP\n\nREGISTRAZIONI-ABILITAZIONI\n• Gestione fornitori stranieri non abilitati per assenza firma digitale o non valida > indicazioni in Approfondimenti\n• GCC Belgrado deve inoltrarci, giornalmente, la lista di eventuali fornitori stranieri non abilitati per assenza firma digitale o non valida (Non devono inviare mail con segnalazione errori a questi oe)\n> la inoltriamo a Ferservizi che valuterà se dobbiamo abilitarli ugualmente : \ns.proietti@ferservizi.it; a.carbone@ferservizi.it; e.cavallaro@ferservizi.it; s.sciosciasantoro@ferservizi.it; c.giugliano@ferservizi.it; a.iorio@ferservizi.it; e.cionfrini@ferservizi.it; g.catalano@ferservizi.it\n> se ci autorizzano li abilitiamo noi\n> agli oe che non ci autorizzano ad abilitare inviamo la mail con segnalazione del problema riscontrato usando i template presenti in SP\nREGISTRAZIONI-ABILITAZIONI\n• Utenze Migrate su Gruppo FS il 16 Dic 24\n• 16/12/24 migrazione su Gruppo FS: \nA) migrati in stato da abilitare su Gruppo FS  solo gli oe Qualificati per i SDQ + alcuni oe richiesti da Ferservizi\n> devono accettare >informativa privacy + condizioni di accesso > il sistema li abilita\nB) NON migrati il 16/12/24:\n> Chi ha scelto e completato form per categorie SDQ ma non è stato ancora qualificato. (Lo valuteranno e qualificheranno su Ferservizi e dopo la qualifica lo migreranno) \n> Chi non ha mai scelto categorie su Ferservizi. Se interessati devono registrarsi su Gruppo FS\n> Chi ha scelto categorie Albo Fornitori e Albo Start up > In futuro, gli oe qualificati per queste categorie, verranno migrati.\nALBO\n• FUNZIONALITA' ALBO DURANTE COESISTENZA PORTALE GRUPPO E FS E FERSERVIZI\n\n> casistiche particolari qualifica  legate ai coesistenza due portali\n• Funzionalità Albo Ferservizi durante coesistenza due portali:\n- Le categorie del SDQ (Sistema di Qualificazione):\n> dal go live su Gruppo fs non saranno pià selezionabili su Ferservizi > chi vuole scegliere categorie SDQ deve farlo su Gruppo FS\n> oe qualificati al momento del go live sono migrati in stato da abilitare su Gruppo FS > devono accettare a video privacy e condizioni di accesso > il sistema li abilita e compaiono le istanze SDQ in Valutazioni\n> per gli oe con i SDQ con stato \"in Valutazione\" viene conclusa la valutazione su Ferservizi e poi vengono migrati su Gruppo FS\n- e) \"Richiedi assistenza online\" in basso a sinistra\n (NB: il form in basso a destra nel sito di smistamento non ci riguarda)\n• Nel sito  \"Supplier Station del Gruppo FS\"  > \"Istruzioni\"  trovano:\n> Codizioni Generali di registrazione, Informativa privacy\n> Istruzioni x registrazion e, questionario scouting e gestione profilo\n> Manuale DGUE\n• COMMERCIALI: frighi@jaggaer.com; ctrovalusci@jaggaer.com", "links": ["https://eprocurement.gruppofs.it/esop/tlk-host/public/fs/web/home.html", "https://eprocurement.gruppofs.it", "https://awfp.ferservizi.it/MonitoraggioFatture/"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• Fornitori migrati come accedono:\n>  quelli del portale Trenitalia  con le stesse credenziali del vecchio (salvo che sia scaduta la psw)\n > quelli migrati da Ferservizi, Mercitalia ricevono nuove credenziali quando vengono migrati \n• Fornitori Migrati su Gruppo Fs devono accettare:\n> la nuova informativa sulla protezione dei dati personali\n> le nuove condizioni di accesso ed utilizzo del Portale.\n• Gli oe che si registrano ex-novo (schermate nel file caricato in sp)\n> dettaglio nella sezione Approfondimenti\n• Form di registrazione Codice Fiscale x oe italiani:\n> se hanno selezionato forma giuridica \"Persona Fisica\" o \"Libero professionista\" > deve avere 16 caratteri\n> se hanno selezionato altre forme giuridiche > deve avere 11 caratteri \n• Se un oe ci segnala che è stato registrato al portale e non ne era a conoscenza\n> verifichiamo se è stato registrato con procedura automatica\n> se risulta procedura automatica lasciamo la mail minerva_acquisti_support@fstechnology.it", "links": []}, {"header": "MODIFICHE", "content": "• La Ragione sociale e il nome del superutente sono modificabili autonomamente dagli OE abilitati in Profilo Azienda > Form di Registrazione > Anagrafica azienda\n• Modifica mail se non hanno le credenziali > Si applica procedura Docusign\n• Se oe deve modificare Forma Giuridica/Username o Correggere p.iva o c.f  > NO Docusign\n> inoltriamo la richiesta a in attesa ci venga comunicato da Deloitte e/o Gruppo FS\n> quando fanno la modifica ci avvisano e informiamo l'oe\n•  Info sui Dati Profilo modificabili o meno dopo l'abilitazione in Approfondimenti\n• Contatti buyer x Docusign: in attesa ci venga comunicato da Deloitte e/o Gruppo FS", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• In Classificazione Corrente\n> Le Categorie che fanno parte del  SDQ (Sistema di qualificazione)> Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) \n> Altre Categorie: Non è un vero albo >  se compilano categorie è solo per scouting, non segue una qualifica.\n• Altre aree per inserimento info:\n> In  Profilo azienda > Dati Profilo trovano il Questionario di Scouting\n> Sezione \"Modifica Dati\" include \"Informazioni aggiuntive\" e \"Richiesta di trasformazione societaria\" > dettagli in Approfondimenti\n• I Modelli per le Categorie SDQ sono nella hp di Gruppo > dettagli in Approfindimenti\n• Per domande sui contenuti dell'albo > leggere sezione \"Approfondimenti\"\n• Richieste seller per questioni tecniche non attinenti Jaggaer > \n> confrontarsi con Manuela/Dario x valutare la casistica\n> se non riguarda Jaggaer lasciare mail minerva_acquisti_support@fstechnology.it", "links": []}, {"header": "GARE", "content": "• Nel sito  \"Supplier Station del Gruppo FS\"  > \"Istruzioni\" trovano:\n> Manuale DGUE\n• Presente area Contratti\n• Rfi_320_ \"Sistema Dinamico per l’aggiudicazione di Contratti di Vendita di rottami ferrosi e non ferrosi ai fini del loro recupero\" > bando aperto scade 2026\n> se chiedono info \nA) invitare a scaricare documentazione presente nella rdi dopo avere espresso interesse + in hp cliccando su \"Sistema Dinamico di Vendita\"\nB) msg da rdi\nNB. dopo che un oe pubblica la rfi_320 nello \"Stato evento\" della rdi leggono \"Termini Chiusi\" e scompare la matita anche se la rdi è ancora in corso:\n> se devono apportare modifiche l'oe deve mandare messaggio dalla rdi x chiedere di attivarle\n• Italferr pubblica delle rdi per i fornitori qualificati solo per mandare comunicazioni agli oe\n• Non devono compilare nulla", "links": []}, {"header": "NOTE PARTICOLARI", "content": "• Nel sito  \"Supplier Station del Gruppo FS\"  > \"Istruzioni\"  trovano:\n> Codizioni Generali di registrazione, Informativa privacy\n> Istruzioni x registrazione, questionario scouting e gestione profilo\n> Manuale DGUE\n• X Info sul Portale Amministrativo rimandare ai contatti in basso a dx nella hp \n• Se segnalano che il link nel form per Questionario ESGEO non funziona lasciare mail: minerva_acquisti_support@fstechnology.it\n• Richieste seller per questioni tecniche non attinenti Jaggaer > \n> confrontarsi con Manuela/Dario x valutare la casistica\n> se non riguarda Jaggaer lasciare mail minerva_acquisti_support@fstechnology.it", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "•  Credenziali: \neprocurement@pec.gruppofs.it", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "REGISTRAZIONI-ABILITAZIONI", "focal_point": "• Iter Registrazione nuovi fornitori", "details": "• Gli oe che si registrano ex-novo (schermate nel file caricato in sp)\n> accettano le condizioni generali e informativa privacy a video \n> compilano i Dati Organizzazione Principale > Dati di registrazione > Anagrafica Azienda + Informazioni utente\n> salvanto e il sistema invia la password\n> compilano Pagine di onboarding (incluso caricamento del modulo di adesione che però non viene controllato per l'abilitazione)\n> il sistema li abilita automaticamente", "links": []}, {"topic": "SEZIONE \"Modifica Dati\"", "focal_point": "• Dati Profilo", "details": "•  Dopo l'abilitazione i Dati Profilo \nA) Modificabili sono: Questionario di scouting, Partita iva di gruppo\nB) NON Modificabili: Informazioni Aggiuntive (Tipologia di azienda e form annessi), Allegati (Modulo di adesione e Modulo di autodichiarazione), ESGEO (eventualmente compilabile nei form di categoria)\n>NB: le \"Informazioni Aggiuntive\" sono presenti anche nella sezione \"Modifica dati\" > se vogliono aggiornarle seguire le indicazioni presenti nella colonna \"Albo\"", "links": []}, {"topic": "SEZIONE \"Modifica Dati\"", "focal_point": "• Sezione \"Modifica Dati\"", "details": "•  Sezione \"Modifica Dati\" include \"Informazioni aggiuntive\" e \"Richiesta di trasformazione societaria\" (dettagli e schermate nel file in sharepoint)\n> Se sono modificabili possono aggiornarle da Valutazioni Modificabili > dopo compilazione devono salvare e Inviare Form al Valutatore\n> se non sono attive e vogliono aggiornarle: \nA) se hanno istanza inviano messaggio dalle Valutazioni di categoria \nB) se non hanno l'istanza lasciamo la mail minerva_acquisti_support@fstechnology.it (bozza nel file Template)", "links": []}, {"topic": "ALBO", "focal_point": "• Domande sui contenuti dell'Albo", "details": "• Per domande sui contenuti dell'albo :\nA) se hanno l'istanza in Valutazioni> mandano messaggio\nB) se NON hanno istanza in Valutazioni > guidarli nella hp e fare questi passaggi\n1) Area Fonitori > file \"Categorie Merceologiche\" riporta elenco categorie associate alla società del gruppo che se ne occupa\n(NB: il file riporta anche le società del gruppo ancora da migrare. Se un oe vuole iscriversi a quelle categorie riferire di farlo nel sito specifico (ad es: acquisti RFI)\n2) Trovano le mail di riferimento per le loro categorie in due aree della hp:\n> Area Fonitori > Sistemi di qualificazione > cliccare sul nome dellla società del gruppo associata alla propria categoria (24 mar manca mail per Busitalia- attendiamo info)\n> Area Fonitori > Albi > cliccare sul nome dellla società del gruppo associata alla propria categoria", "links": []}, {"topic": "ALBO", "focal_point": "• Modelli Albo", "details": "• I Modelli per le Categorie SDQ sono nella hp di Gruppo \n> Area Fornitori > Sistemi di Qualificazione > Trenitalia (finchè ci sono solo le sue categorie)\n> NB: Se riferiscono di non poter aprire i file contenuti nelle cartelle compresse devono salvare la cartella e poi estrarre i file", "links": []}], "buyer_sections": [], "all_links": ["https://eprocurement.gruppofs.it/esop/tlk-host/public/fs/web/home.html", "https://eprocurement.gruppofs.it", "https://awfp.ferservizi.it/MonitoraggioFatture/"], "text": "Gruppo FS  _ Progetto Minerva\nINFO GENERALI\n• Console: FER\n• SF: FERROVIE DELLO STATO ITALIANE SPA\n• Homepage di Gruppo: https://eprocurement.gruppofs.it/esop/tlk-host/public/fs/web/home.html\n> Portale acquisti: https://eprocurement.gruppofs.it \n> Portale Amministrativo (NON forniamo supporto) https://awfp.ferservizi.it/MonitoraggioFatture/ \n• TELEFONO: 02 00 70 42 52\n• Webform (si può allegare) \"Richiedi assistenza online\" in basso a sinistra\n (NB: il form in basso a destra nel sito di smistamento non ci riguarda)\n• Nel sito  \"Supplier Station del Gruppo FS\"  > \"Istruzioni\"  trovano:\n> Codizioni Generali di registrazione, Informativa privacy\n> Istruzioni x registrazion e, questionario scouting e gestione profilo\n> Manuale DGUE\n• COMMERCIALI: frighi@jaggaer.com; ctrovalusci@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• Fornitori migrati come accedono:\n>  quelli del portale Trenitalia  con le stesse credenziali del vecchio (salvo che sia scaduta la psw)\n > quelli migrati da Ferservizi, Mercitalia ricevono nuove credenziali quando vengono migrati \n• Fornitori Migrati su Gruppo Fs devono accettare:\n> la nuova informativa sulla protezione dei dati personali\n> le nuove condizioni di accesso ed utilizzo del Portale.\n• Gli oe che si registrano ex-novo (schermate nel file caricato in sp)\n> dettaglio nella sezione Approfondimenti\n• Form di registrazione Codice Fiscale x oe italiani:\n> se hanno selezionato forma giuridica \"Persona Fisica\" o \"Libero professionista\" > deve avere 16 caratteri\n> se hanno selezionato altre forme giuridiche > deve avere 11 caratteri \n• Se un oe ci segnala che è stato registrato al portale e non ne era a conoscenza\n> verifichiamo se è stato registrato con procedura automatica\n> se risulta procedura automatica lasciamo la mail minerva_acquisti_support@fstechnology.it\nMODIFICHE\n• La Ragione sociale e il nome del superutente sono modificabili autonomamente dagli OE abilitati in Profilo Azienda > Form di Registrazione > Anagrafica azienda\n• Modifica mail se non hanno le credenziali > Si applica procedura Docusign\n• Se oe deve modificare Forma Giuridica/Username o Correggere p.iva o c.f  > NO Docusign\n> inoltriamo la richiesta a in attesa ci venga comunicato da Deloitte e/o Gruppo FS\n> quando fanno la modifica ci avvisano e informiamo l'oe\n•  Info sui Dati Profilo modificabili o meno dopo l'abilitazione in Approfondimenti\n• Contatti buyer x Docusign: in attesa ci venga comunicato da Deloitte e/o Gruppo FS\nIDM\n\nALBO\n• In Classificazione Corrente\n> Le Categorie che fanno parte del  SDQ (Sistema di qualificazione)> Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) \n> Altre Categorie: Non è un vero albo >  se compilano categorie è solo per scouting, non segue una qualifica.\n• Altre aree per inserimento info:\n> In  Profilo azienda > Dati Profilo trovano il Questionario di Scouting\n> Sezione \"Modifica Dati\" include \"Informazioni aggiuntive\" e \"Richiesta di trasformazione societaria\" > dettagli in Approfondimenti\n• I Modelli per le Categorie SDQ sono nella hp di Gruppo > dettagli in Approfindimenti\n• Per domande sui contenuti dell'albo > leggere sezione \"Approfondimenti\"\n• Richieste seller per questioni tecniche non attinenti Jaggaer > \n> confrontarsi con Manuela/Dario x valutare la casistica\n> se non riguarda Jaggaer lasciare mail minerva_acquisti_support@fstechnology.it\nGARE\n• Nel sito  \"Supplier Station del Gruppo FS\"  > \"Istruzioni\" trovano:\n> Manuale DGUE\n• Presente area Contratti\n• Rfi_320_ \"Sistema Dinamico per l’aggiudicazione di Contratti di Vendita di rottami ferrosi e non ferrosi ai fini del loro recupero\" > bando aperto scade 2026\n> se chiedono info \nA) invitare a scaricare documentazione presente nella rdi dopo avere espresso interesse + in hp cliccando su \"Sistema Dinamico di Vendita\"\nB) msg da rdi\nNB. dopo che un oe pubblica la rfi_320 nello \"Stato evento\" della rdi leggono \"Termini Chiusi\" e scompare la matita anche se la rdi è ancora in corso:\n> se devono apportare modifiche l'oe deve mandare messaggio dalla rdi x chiedere di attivarle\n• Italferr pubblica delle rdi per i fornitori qualificati solo per mandare comunicazioni agli oe\n• Non devono compilare nulla\nNOTE PARTICOLARI\n• Nel sito  \"Supplier Station del Gruppo FS\"  > \"Istruzioni\"  trovano:\n> Codizioni Generali di registrazione, Informativa privacy\n> Istruzioni x registrazione, questionario scouting e gestione profilo\n> Manuale DGUE\n• X Info sul Portale Amministrativo rimandare ai contatti in basso a dx nella hp \n• Se segnalano che il link nel form per Questionario ESGEO non funziona lasciare mail: minerva_acquisti_support@fstechnology.it\n• Richieste seller per questioni tecniche non attinenti Jaggaer > \n> confrontarsi con Manuela/Dario x valutare la casistica\n> se non riguarda Jaggaer lasciare mail minerva_acquisti_support@fstechnology.it\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n•  Credenziali: \neprocurement@pec.gruppofs.it\nIntegrazione con SAP\n\nREGISTRAZIONI-ABILITAZIONI\n• Iter Registrazione nuovi fornitori\n• Gli oe che si registrano ex-novo (schermate nel file caricato in sp)\n> accettano le condizioni generali e informativa privacy a video \n> compilano i Dati Organizzazione Principale > Dati di registrazione > Anagrafica Azienda + Informazioni utente\n> salvanto e il sistema invia la password\n> compilano Pagine di onboarding (incluso caricamento del modulo di adesione che però non viene controllato per l'abilitazione)\n> il sistema li abilita automaticamente\nSEZIONE \"Modifica Dati\"\n• Dati Profilo\n•  Dopo l'abilitazione i Dati Profilo \nA) Modificabili sono: Questionario di scouting, Partita iva di gruppo\nB) NON Modificabili: Informazioni Aggiuntive (Tipologia di azienda e form annessi), Allegati (Modulo di adesione e Modulo di autodichiarazione), ESGEO (eventualmente compilabile nei form di categoria)\n>NB: le \"Informazioni Aggiuntive\" sono presenti anche nella sezione \"Modifica dati\" > se vogliono aggiornarle seguire le indicazioni presenti nella colonna \"Albo\"\nSEZIONE \"Modifica Dati\"\n• Sezione \"Modifica Dati\"\n•  Sezione \"Modifica Dati\" include \"Informazioni aggiuntive\" e \"Richiesta di trasformazione societaria\" (dettagli e schermate nel file in sharepoint)\n> Se sono modificabili possono aggiornarle da Valutazioni Modificabili > dopo compilazione devono salvare e Inviare Form al Valutatore\n> se non sono attive e vogliono aggiornarle: \nA) se hanno istanza inviano messaggio dalle Valutazioni di categoria \nB) se non hanno l'istanza lasciamo la mail minerva_acquisti_support@fstechnology.it (bozza nel file Template)\nALBO\n• Domande sui contenuti dell'Albo\n• Per domande sui contenuti dell'albo :\nA) se hanno l'istanza in Valutazioni> mandano messaggio\nB) se NON hanno istanza in Valutazioni > guidarli nella hp e fare questi passaggi\n1) Area Fonitori > file \"Categorie Merceologiche\" riporta elenco categorie associate alla società del gruppo che se ne occupa\n(NB: il file riporta anche le società del gruppo ancora da migrare. Se un oe vuole iscriversi a quelle categorie riferire di farlo nel sito specifico (ad es: acquisti RFI)\n2) Trovano le mail di riferimento per le loro categorie in due aree della hp:\n> Area Fonitori > Sistemi di qualificazione > cliccare sul nome dellla società del gruppo associata alla propria categoria (24 mar manca mail per Busitalia- attendiamo info)\n> Area Fonitori > Albi > cliccare sul nome dellla società del gruppo associata alla propria categoria\nALBO\n• Modelli Albo\n• I Modelli per le Categorie SDQ sono nella hp di Gruppo \n> Area Fornitori > Sistemi di Qualificazione > Trenitalia (finchè ci sono solo le sue categorie)\n> NB: Se riferiscono di non poter aprire i file contenuti nelle cartelle compresse devono salvare la cartella e poi estrarre i file"}, "Gruppo Iren": {"name": "Gruppo Iren", "sheet": "Gruppo Iren", "site": "https://portaleacquisti.gruppoiren.it/web/login.html", "phone": "02 00 70 42 56", "console": "TLK", "webform": "\"Richiedi assistenza online\" (SI può allegare)", "commercials": "fcasadei@jaggaer.com;", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLK\n• SF: IREN MERCATO SPA\n• SITO: https://portaleacquisti.gruppoiren.it/web/login.html\n• TELEFONO: 02 00 70 42 56\n• Webform: \"Richiedi assistenza online\" (SI può allegare) \n• COMMERCIALI: fcasadei@jaggaer.com;", "links": ["https://portaleacquisti.gruppoiren.it/web/login.html"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "•   Ricezione Report sulla cassetta postale: \n- Condizioni generali di registrazione registrazione firmato dig. (11 pag)  Campi: \n> obbligatori 13 (legale rapp.) ,14 (privacy>  Titolare: Nome e cognome o Ragione sociale).\n> non oblligatorio: Punto 12 (Account principale) > non verifichiamo quanto indicato\n- Clausole vessatorie (2 pag.) firmate digitalmente\n• Pec obbligatoria + NON pec se manca possiamo abilitare ma inviamo mail per farla inserire\n• I Dati di registrazione Supplementari si bloccano in automatico quando il fornitore viene abilitato\n> se hanno necessità di sbloccarli per fare delle modifiche ci facciamo mandare una richiesta scritta dal fornitore e inoltriamo a staff.aa@gruppoiren.it\n• Per tutte le Comunicazioni per l'Abilitazione scriviamo a staff.aa@gru nche se dovesse capitare in altri portali):\n> succede perchè spostandosi nel portale cambia l'indirizzo IP\n> l'oe deve chiedere al suo supporto informatico di fare in modo che navigando l'indirizzo IP non cambi", "links": []}, {"topic": "ERRORE QUANDO CLICCANO SU AREA GARE", "focal_point": "•  Messaggio Errore quando cliccano su area gare\n    \"Credenziali scadute o future\"", "details": "• Se riescono ad accedere a Hera Pro ma quando cliccano su area Gare compare messaggio che segnala che le credenziali sono scadute o future\n> far fare log out e pulire la cache o farli collegare da altri browser\n> altrimenti in hp c'è link diretto per area gare sotto la voce \"Hai problemi di accesso?\"\n> se non riescono in nessuno dei due modi devono scrivere a accesso.portalefornitori@gruppohera.it", "links": []}, {"topic": "ALBO", "focal_point": "• Aree valutazioni", "details": "• Hanno 3 aree Valutazioni:\n> Valutazioni Modificabili: sempre vuota\n> Valutazioni di Qualifica: x inviare msg (area msg attiva appena si registrano. Non è necessario che abbiano scelto le categorie e compilato i form)\n> Valutazioni di Categoria: x vedere la lista dettagliata di tutte le valutazioni (fasce o assessment) associate a specifiche Categorie Merceologiche (per cui è stato compilato il questionario)", "links": []}, {"topic": "ALBO", "focal_point": "• Procedura per rinuncia alla qualifica", "details": "•  Se un OE vuole perdere lo stato di qualifica attivo o l’intera iscrizione all’albo può indicarlo nel relativo form di categoria \n> form \"Rinuncia GM\" per rinunciare alla qualifica di una specifica categoria\n> form \"Rinuncia totale all'iscrizione all'albo fornitori\" > x riniciare a tutta la qualifica", "links": []}], "buyer_sections": [], "all_links": ["https://www.gruppohera.it/gruppo/fornitori", "https://portalefornitori.gruppohera.it/", "https://www.gruppohera.it/gruppo/fornitori/manuali-hera-pro"], "text": "Hera_Pro\nINFO GENERALI\n• Console: GEO\n• SF: HERA S.P.A\n• SITO ISTI
