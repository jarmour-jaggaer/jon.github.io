<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAGGAER — Procedure Clienti</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14;--surface:#0f1520;--surface2:#141b2d;--surface3:#1a2236;
  --border:#1e2a42;--border2:#253350;
  --accent:#2563eb;--glow:rgba(37,99,235,.12);--accent2:#06b6d4;
  --text:#dde4f0;--muted:#556070;--dim:#7a8fa8;
  --success:#10b981;--warn:#f59e0b;--green-hdr:#1a3a28;--green-text:#4ade80;
  --highlight-bg:rgba(250,200,20,.18);--highlight:#fde68a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-badge{background:var(--accent);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;letter-spacing:.08em;white-space:nowrap}
.hdr-title{font-size:14px;font-weight:500}
.hdr-sub{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.lang-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:5px;overflow:hidden}
.lang-btn{background:transparent;border:none;color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600;padding:5px 11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.lang-btn .flag{font-size:13px}
.lang-btn.active{background:var(--accent);color:#fff}
.lang-btn:not(.active):hover{background:var(--glow);color:var(--text)}
.lang-sep{width:1px;background:var(--border);align-self:stretch}
.stat-chip{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:4px;white-space:nowrap}
.stat-chip b{color:var(--accent2)}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.sidebar.collapsed{width:0;border-right:none}
.sb-head{padding:10px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.sb-title{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.sb-filter{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;font-family:'IBM Plex Sans',sans-serif;padding:5px 8px;border-radius:4px;outline:none;margin:8px 14px 6px;width:calc(100% - 28px);transition:border-color .15s}
.sb-filter:focus{border-color:var(--accent)}
.sb-filter::placeholder{color:var(--muted)}
.cust-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding:4px 0}
.cust-item{padding:7px 14px;font-size:12px;cursor:pointer;transition:background .1s,color .1s;color:var(--dim);border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-item:hover{background:var(--surface2);color:var(--text);border-left-color:var(--border2)}
.cust-item.active{background:var(--glow);color:var(--accent2);border-left-color:var(--accent);font-weight:500}
.toggle-sb{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:12px;width:26px;height:26px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.toggle-sb:hover{border-color:var(--accent);color:var(--accent2)}

/* MAIN */
.main{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* SEARCH BAR */
.search-bar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap{flex:1;position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:12px;color:var(--muted);pointer-events:none}
.search-icon svg{width:16px;height:16px}
#searchInput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:10px 42px 10px 40px;outline:none;transition:border-color .15s}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
#searchInput::placeholder{color:var(--muted)}
.clear-btn{position:absolute;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:3px;display:none;transition:color .15s}
.clear-btn:hover{color:var(--text)}
.clear-btn svg{width:14px;height:14px;display:block}
.search-meta{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);white-space:nowrap}

/* CONTENT AREAS */
.results-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.detail-view{display:none;flex:1;overflow-y:auto;padding:20px;flex-direction:column;gap:0;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.detail-view.open{display:flex}
.results-area.hidden{display:none}

/* WELCOME */
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:40px}
.state-icon{font-size:38px}
.state-title{font-size:18px;font-weight:500}
.state-sub{font-size:13px;color:var(--muted);max-width:420px;line-height:1.6}
.quick-label{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
.quick-searches{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
.qs-btn{background:var(--surface2);border:1px solid var(--border);color:var(--dim);font-size:12px;padding:6px 12px;border-radius:4px;cursor:pointer;transition:all .15s}
.qs-btn:hover{border-color:var(--accent);color:var(--text);background:var(--glow)}

/* RESULT CARD */
.result-card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;overflow:hidden;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.rc-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.rc-head:hover{background:var(--surface3)}
.rc-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.rc-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:3px;white-space:nowrap}
.b-console{background:rgba(37,99,235,.15);color:#7aa3f5;border:1px solid rgba(37,99,235,.25)}
.b-phone{background:rgba(16,185,129,.12);color:#5ee8b5;border:1px solid rgba(16,185,129,.2)}
.b-hits{background:rgba(250,200,20,.1);color:#fde68a;border:1px solid rgba(250,200,20,.2)}
.expand-icon{color:var(--muted);font-size:11px;transition:transform .2s;flex-shrink:0}
.rc-head.open .expand-icon{transform:rotate(180deg)}
.rc-body{display:none;padding:0}
.rc-body.open{display:block}

/* INFO ROW (quick fields) */
.info-row{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.info-item{display:flex;flex-direction:column;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:6px 10px;min-width:130px;flex:1}
.info-label{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.info-value{font-size:12px;color:var(--text);word-break:break-all}
.info-value a{color:var(--accent2);text-decoration:none}
.info-value a:hover{text-decoration:underline}

/* SECTION TABLE inside card */
.section-table{width:100%;border-collapse:collapse}
.section-table .sec-hdr-row td{
  background:var(--green-hdr);color:var(--green-text);
  font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;
  padding:6px 14px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);
}
.section-table .sec-hdr-row td:last-child{border-right:none}
.section-table .sec-content-row td{
  vertical-align:top;padding:10px 14px;
  font-size:12px;line-height:1.75;color:var(--dim);
  border-bottom:1px solid var(--border);border-right:1px solid var(--border);
  white-space:pre-wrap;word-break:break-word;max-width:300px;
}
.section-table .sec-content-row td:last-child{border-right:none}
.section-table .sec-content-row td mark{background:var(--highlight-bg);color:var(--highlight);border-radius:2px;padding:0 2px;font-weight:600}
.section-table .sec-content-row td a{color:var(--accent2);text-decoration:none;word-break:break-all}
.section-table .sec-content-row td a:hover{text-decoration:underline}

/* APPROFONDIMENTI inside card */
.appro-table{width:100%;border-collapse:collapse;margin-top:0}
.appro-table-title{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px 6px;background:var(--surface2);border-top:2px solid var(--border2)}
.appro-table thead td{background:var(--surface3);font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:6px 14px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.appro-table thead td:last-child{border-right:none}
.appro-table tbody td{vertical-align:top;padding:9px 14px;font-size:12px;line-height:1.7;color:var(--dim);border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:pre-wrap;word-break:break-word;max-width:300px}
.appro-table tbody td:last-child{border-right:none}
.appro-table tbody td mark{background:var(--highlight-bg);color:var(--highlight);border-radius:2px;padding:0 2px;font-weight:600}
.appro-table tbody td a{color:var(--accent2);text-decoration:none;word-break:break-all}
.appro-table tbody td a:hover{text-decoration:underline}
.appro-table tbody tr:last-child td{border-bottom:none}

/* LINKS SECTION */
.links-section{padding:10px 14px;border-top:1px solid var(--border);background:var(--surface2)}
.links-title{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.links-list{display:flex;flex-direction:column;gap:4px}
.link-item{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--accent2);text-decoration:none;word-break:break-all}
.link-item:hover{text-decoration:underline;color:#fff}

.view-full-btn{background:transparent;border:none;color:var(--accent2);font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;padding:8px 14px;text-decoration:underline;text-underline-offset:3px;display:block}
.view-full-btn:hover{color:#fff}

/* DETAIL VIEW */
.dv-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;flex-shrink:0}
.dv-name{font-size:22px;font-weight:600}
.back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace;padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent2)}
.dv-info-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}

/* Section block in detail view */
.dv-section{margin-bottom:2px}
.dv-sec-hdr{
  display:grid;grid-template-columns:repeat(var(--cols,4),1fr);
  background:var(--green-hdr);border:1px solid var(--border);border-bottom:none;border-radius:4px 4px 0 0;
  overflow:hidden;
}
.dv-sec-hdr-cell{
  padding:7px 12px;color:var(--green-text);font-size:11px;
  font-family:'IBM Plex Mono',monospace;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  border-right:1px solid var(--border);
}
.dv-sec-hdr-cell:last-child{border-right:none}
.dv-sec-content{
  display:grid;grid-template-columns:repeat(var(--cols,4),1fr);
  background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;
  overflow:hidden;margin-bottom:8px;
}
.dv-sec-content-cell{
  padding:10px 12px;font-size:12px;line-height:1.75;color:var(--dim);
  border-right:1px solid var(--border);white-space:pre-wrap;word-break:break-word;
  vertical-align:top;
}
.dv-sec-content-cell:last-child{border-right:none}
.dv-sec-content-cell mark{background:var(--highlight-bg);color:var(--highlight);border-radius:2px;padding:0 2px;font-weight:600}
.dv-sec-content-cell a{color:var(--accent2);text-decoration:none;word-break:break-all}
.dv-sec-content-cell a:hover{text-decoration:underline}

.dv-block-title{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 6px}
.dv-appro{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px}
.dv-appro table{width:100%;border-collapse:collapse}
.dv-appro table thead td{background:var(--surface3);font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:6px 12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.dv-appro table thead td:last-child{border-right:none}
.dv-appro table tbody td{vertical-align:top;padding:9px 12px;font-size:12px;line-height:1.7;color:var(--dim);border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:pre-wrap;word-break:break-word;max-width:280px}
.dv-appro table tbody td:last-child{border-right:none}
.dv-appro table tbody tr:last-child td{border-bottom:none}
.dv-appro table tbody td mark{background:var(--highlight-bg);color:var(--highlight);border-radius:2px;padding:0 2px;font-weight:600}
.dv-appro table tbody td a{color:var(--accent2);text-decoration:none;word-break:break-all}
.dv-appro table tbody td a:hover{text-decoration:underline}

.dv-links{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:8px}
.dv-links-title{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.dv-links-grid{display:flex;flex-direction:column;gap:5px}
.dv-link{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--accent2);text-decoration:none;word-break:break-all}
.dv-link:hover{color:#fff;text-decoration:underline}

/* no results */
.no-results{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);text-align:center}
.no-results-icon{font-size:36px;opacity:.4}
</style>
</head>

<div class="app-body">

        </div>
        <input type="text" id="searchInput" autocomplete="off" oninput="onSearch(this.value)" onkeydown="if(event.key==='Escape')clearSearch()">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">

      <div class="search-meta" id="searchMeta"></div>

    <div class="results-area" id="resultsArea"></div>
    <div class="detail-view" id="detailView"></div>
  </div>
</div>

 creare sottotutenze nei loro profili\n• NO Nome e Cognome referente > sono disattivati e non devono inserirli", "links": []}, {"header": "MODIFICHE", "content": "• Se NON hanno le Credenziali e devono aggiungere/modificare una MAIL > diciamo di contattare i riferimenti di ACEA presenti nella homepage cliccando su \"Società\" (in alto a dx) e selezionando la Società di riferimento \n• Se HANNO le Credenziali possono modificare in autonomia:\n> Mail, Username e Telefono in Profilo Utente (in alto a dx)\n> Indirizzo della Sede in Profilo Azienda > Dati di Registrazione\n• NO Nome e Cognome referente > sono disattivati e non devono inserirli\n• Campo MAIL: non si consiglia aggiunta di mail ordinarie perchè deve esserci solo la PEC\n• Per Modifica Ragione Sociale/Cancellazione  > diciamo di contattare i riferimenti di ACEA presenti nella homepage\n• Se OE vuole modificare delle info presenti in Dati Profilo > seguire procedura in Approfondimenti", "links": []}, {"header": "IDM", "content": "• NO", "links": []}, {"header": "ALBO", "content": "• Inserimento categorie da Mie Categorie  + Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > (dettagli negli Approfondimenti)\n• SE FANNO DOMANDE ATTINENTI: loro stato di qualifica sul vecchio albo, contenuti albo (vecchio e nuovo) ecc > >  rimandiamo ai riferimenti nella homepage cliccando su \"Società\" e selezionando la Società di riferimento\n• In \"Mia azienda\" > \"Dati di registrazione Complementari >  ci sono altre voci da compilare che sono sempre ATTIVE (no c'è blocco/sblocco in quest'area)\n>  \"Documentazione da aggiornare (vetrina documentale)\"\n• Modelli albo sono scaricabili come template nei singoli Data Element\n• Nei Form di categoria devono ricaricare il \"Questionario\" \n- compilare tutti i form obbligatori tranne il campo dove devono caricare il Questionario\n- cliccare su Salva >  cliccare su “Salva e continua più tardi/salta parametri obbligatori”\n- cliccare sulla categoria precedentemente selezionata\n- cliccare sul pulsante con i tre puntini >  Stampa >  salvare il file come pdf e firmarlo digitalmente\n- Modifica > caricare il pdf nell'apposito form > Salva         \n• A gennaio 2025 parte nuovo albo per Acque (a dicembre iniziano a dismettere il vecchio)", "links": []}, {"header": "GARE", "content": "•  Se il buyer consente la partecipazione in RTI  i fornitori che selezionano come forma di partecipazione RTI avranno sempre la possibilità di selezionare se le mandanti partecipano online o offline. \n• DA 18 MARZO 25 _Nella configurazione delle RTI (e altre forme di partecipazione raggruppate) quando aggiungono utenti nella sezione \"Ruolo\" è obblgatorio selezionare una tra le opzioni disponibili nel menù a tendina\n(NB: Possono scaricare il Manuale \"Gruppo di Offerta Operatore economico\" nella 2° hp, area Link Personalizzati)\n• GARE SAP: le seguenti società del Gruppo fanno ancora gare su SAP : - Acque - Publiacque - Ingegnerie Toscane\n> i fornitori devono effettuare la registrazione sul notro portale ACEA Jaggaer \n> vengono inviate da SRM 2 mail con le credenziali  per accedere in SAP: una mail con la username e una con la psw (vedere foglio approfondimenti)\n> se ci viene segnalato da un oe che non ha ricevuto le mail delle credenziali potrebbe esserci un problema di integrazione da segnalare (Manuela > Elisa Calzi)\n•  Per problemi tecnici/bug sul DGUE ACEA: \n> confrontarsi con Dario e/o Manuela\n> se necessario andrà aperto ticket mandando mail a: supporto_acea@ggap.it", "links": []}, {"header": "NOTE PARTICOLARI", "content": "• Domande sul vecchio portale >  diciamo di contattare I vari riferimenti  presenti nella homepage cliccando su \"Società\"  e selezionando la Società di riferimento\nGRUPPO IVA\n• Registrazione azienda che fa parte di un Gruppo Iva:\n> il fornitore inserisce codice fiscale e partita iva della propria impresa (è specificato nei form da compilare)\n> nei Dati di Reg. Supplementare seleziona “SI” nel campo in cui chiede se fa parte di un gruppo iva\n> si attivano campi da compilare relativi al gruppo iva (partita iva del gruppo iva, allegato con comunicazione di attivazione gruppo iva, data di decorrenza)\n• Se un fornitore era impresa singola e poi entra in Gruppo Iva (o viceversa) > devono allegare la richiesta di modifica nei Dati Complementari >  cliccando su \"Richiesta aggiornamento form supplementari\" \nATI/CONSORZI\n• Prima di registrare l’ATI  o il Consorzio devono essere registrati sul portale i singoli membri\n• Procedura iscrizione ATI/Consorzio\n> Ragione sociale (ATI + ragioni sociali delle imprese che la compongono) (la capogruppo indica: \"Capogruppo ATI + ragioni sociali delle imprese che la compongono)\n> Partita iva/C.F. (ricopiano quanto scritto nella Ragione sociale)\n> Si attivano dati di reg. Supplementari relativi all’ATI/Consorzio: dove necessario ci sono tot campi per inserire i dati di ogni membro tra cui CODICE SAP\n> CODICE SAP : se qualcuno dice di non averlo lo rimandiamo ai contatti ACEA\n• Se un buyer prova ad accedere tramite SAP al nostro portale e hanno Internet explorer come browser predefinito può comparire l'errore \"Autenticazione non riuscita. Credenziali o troppo vecchie o future\" > in tal caso riferire di cambiare browser predefinito o copiare il link di accesso su un browser diverso da explorer\n• NO MULTIUTENZE > su richiesta di Acea gli OE non possono creare sottotutenze nei loro profili\n• Le password devono rispettare questi criteri\n> MIN di 8 caratteri \n> almeno: 1 carattere maiuscolo, 1 carattere minuscolo, 1 numero e un carattere speciale.", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "Mixed> \nLa capogruppo può scegliere se selezionare \"Offline\" o \"registrato/registrato\" per gli altri utenti del gruppo", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "•  Recupero credenziali > PEC", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "MODIFICHE", "focal_point": "• Modifica Dati Profilo", "details": "• Quando gli oe vogliono aggiornare  delle info in > Mia Azienda > Profilo Azienda >  Dati Profilo:\nA) x aggiornare info nei campi \"Informazioni Generali\" e \"Gruppo IVA\" > devono caricare nel campo \"Richiesta aggiornamento form supplementari\"  un allegato specificando cosa vogliono modificare\nB) x aggiornare o integrare gli iban riportati in \"IBAN Fornitore\" o nei campi \"IBAN1 e 2\" > devono caricare nel campo \"Richiesta aggiornamento form supplementari il template compilato con i dati bancari da aggiornare", "links": []}, {"topic": "ALBO", "focal_point": "• Dettagli sulla tipologia di albo", "details": "• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.", "links": []}, {"topic": "ACEA: integrazione SAP", "focal_point": "• Credenziali di accesso per SAP \ninviate a fornitori che si registrano su nostro partale per partecipare a gare di: \n- Acque \n- Publiacque \n- Ingegnerie Toscane", "details": "• Mail Comunicazione userid SAP:\nMittente: fornitorinoreply@cert.aceaspa.it\nOggetto: Comunicazione UserID \n• Mail Comunicazione password SAP: \nMittente: fornitorinoreply@cert.aceaspa.it\nOggetto: Comunicazione Password", "links": []}], "buyer_sections": [], "all_links": ["https://procurement-gruppoacea.app.jaggaer.com"], "text": "ACEA\nINFO GENERALI\n• Console: TLE\n• SF: ACEA SPA\n• SITO: https://procurement-gruppoacea.app.jaggaer.com\n• TELEFONO: 02 124121 303 (visibile dopo che cliccano su Richiedi Asssistenza > Clicca qui)\n• Webform: \"Richiedi assistenza\" (SI può allegare)\n• COMMERCIALI: c-mpetriccione@jaggaer.com; spetrazzoli@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• AUTOMATICA (compilazione \"Informazioni Generali\" + \"Dati di registrazione supplementari\")\n• Appena avviene l'abilitazione automatica si bloccano i Dati Profilo > se devono aggiornarli vedere colonna \"Modifiche\" del file\n• Registrazione ATI/CONSORZIO > vedere info in colonna Note Particolari\n• Gruppo IVA > vedere info in colonna Note Particolari\n• NB: l'IBAN è un dato che inseriscono nei Dati di registrazione Supplementari in fase di registrazione > se devono variarlo seguire indicazione nella colonna Modifiche\n• NO Multiutenze > su richiesta di Acea gli OE non possono creare sottotutenze nei loro profili\n• NO Nome e Cognome referente > sono disattivati e non devono inserirli\nMODIFICHE\n• Se NON hanno le Credenziali e devono aggiungere/modificare una MAIL > diciamo di contattare i riferimenti di ACEA presenti nella homepage cliccando su \"Società\" (in alto a dx) e selezionando la Società di riferimento \n• Se HANNO le Credenziali possono modificare in autonomia:\n> Mail, Username e Telefono in Profilo Utente (in alto a dx)\n> Indirizzo della Sede in Profilo Azienda > Dati di Registrazione\n• NO Nome e Cognome referente > sono disattivati e non devono inserirli\n• Campo MAIL: non si consiglia aggiunta di mail ordinarie perchè deve esserci solo la PEC\n• Per Modifica Ragione Sociale/Cancellazione  > diciamo di contattare i riferimenti di ACEA presenti nella homepage\n• Se OE vuole modificare delle info presenti in Dati Profilo > seguire procedura in Approfondimenti\nIDM\n• NO\nALBO\n• Inserimento categorie da Mie Categorie  + Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > (dettagli negli Approfondimenti)\n• SE FANNO DOMANDE ATTINENTI: loro stato di qualifica sul vecchio albo, contenuti albo (vecchio e nuovo) ecc > >  rimandiamo ai riferimenti nella homepage cliccando su \"Società\" e selezionando la Società di riferimento\n• In \"Mia azienda\" > \"Dati di registrazione Complementari >  ci sono altre voci da compilare che sono sempre ATTIVE (no c'è blocco/sblocco in quest'area)\n>  \"Documentazione da aggiornare (vetrina documentale)\"\n• Modelli albo sono scaricabili come template nei singoli Data Element\n• Nei Form di categoria devono ricaricare il \"Questionario\" \n- compilare tutti i form obbligatori tranne il campo dove devono caricare il Questionario\n- cliccare su Salva >  cliccare su “Salva e continua più tardi/salta parametri obbligatori”\n- cliccare sulla categoria precedentemente selezionata\n- cliccare sul pulsante con i tre puntini >  Stampa >  salvare il file come pdf e firmarlo digitalmente\n- Modifica > caricare il pdf nell'apposito form > Salva         \n• A gennaio 2025 parte nuovo albo per Acque (a dicembre iniziano a dismettere il vecchio)\nGARE\n•  Se il buyer consente la partecipazione in RTI  i fornitori che selezionano come forma di partecipazione RTI avranno sempre la possibilità di selezionare se le mandanti partecipano online o offline. \n• DA 18 MARZO 25 _Nella configurazione delle RTI (e altre forme di partecipazione raggruppate) quando aggiungono utenti nella sezione \"Ruolo\" è obblgatorio selezionare una tra le opzioni disponibili nel menù a tendina\n(NB: Possono scaricare il Manuale \"Gruppo di Offerta Operatore economico\" nella 2° hp, area Link Personalizzati)\n• GARE SAP: le seguenti società del Gruppo fanno ancora gare su SAP : - Acque - Publiacque - Ingegnerie Toscane\n> i fornitori devono effettuare la registrazione sul notro portale ACEA Jaggaer \n> vengono inviate da SRM 2 mail con le credenziali  per accedere in SAP: una mail con la username e una con la psw (vedere foglio approfondimenti)\n> se ci viene segnalato da un oe che non ha ricevuto le mail delle credenziali potrebbe esserci un problema di integrazione da segnalare (Manuela > Elisa Calzi)\n•  Per problemi tecnici/bug sul DGUE ACEA: \n> confrontarsi con Dario e/o Manuela\n> se necessario andrà aperto ticket mandando mail a: supporto_acea@ggap.it\nNOTE PARTICOLARI\n• Domande sul vecchio portale >  diciamo di contattare I vari riferimenti  presenti nella homepage cliccando su \"Società\"  e selezionando la Società di riferimento\nGRUPPO IVA\n• Registrazione azienda che fa parte di un Gruppo Iva:\n> il fornitore inserisce codice fiscale e partita iva della propria impresa (è specificato nei form da compilare)\n> nei Dati di Reg. Supplementare seleziona “SI” nel campo in cui chiede se fa parte di un gruppo iva\n> si attivano campi da compilare relativi al gruppo iva (partita iva del gruppo iva, allegato con comunicazione di attivazione gruppo iva, data di decorrenza)\n• Se un fornitore era impresa singola e poi entra in Gruppo Iva (o viceversa) > devono allegare la richiesta di modifica nei Dati Complementari >  cliccando su \"Richiesta aggiornamento form supplementari\" \nATI/CONSORZI\n• Prima di registrare l’ATI  o il Consorzio devono essere registrati sul portale i singoli membri\n• Procedura iscrizione ATI/Consorzio\n> Ragione sociale (ATI + ragioni sociali delle imprese che la compongono) (la capogruppo indica: \"Capogruppo ATI + ragioni sociali delle imprese che la compongono)\n> Partita iva/C.F. (ricopiano quanto scritto nella Ragione sociale)\n> Si attivano dati di reg. Supplementari relativi all’ATI/Consorzio: dove necessario ci sono tot campi per inserire i dati di ogni membro tra cui CODICE SAP\n> CODICE SAP : se qualcuno dice di non averlo lo rimandiamo ai contatti ACEA\n• Se un buyer prova ad accedere tramite SAP al nostro portale e hanno Internet explorer come browser predefinito può comparire l'errore \"Autenticazione non riuscita. Credenziali o troppo vecchie o future\" > in tal caso riferire di cambiare browser predefinito o copiare il link di accesso su un browser diverso da explorer\n• NO MULTIUTENZE > su richiesta di Acea gli OE non possono creare sottotutenze nei loro profili\n• Le password devono rispettare questi criteri\n> MIN di 8 caratteri \n> almeno: 1 carattere maiuscolo, 1 carattere minuscolo, 1 numero e un carattere speciale.\nBIDDING GROUP ATTIVO\nMixed> \nLa capogruppo può scegliere se selezionare \"Offline\" o \"registrato/registrato\" per gli altri utenti del gruppo\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n•  Recupero credenziali > PEC\nIntegrazione con SAP\n\nMODIFICHE\n• Modifica Dati Profilo\n• Quando gli oe vogliono aggiornare  delle info in > Mia Azienda > Profilo Azienda >  Dati Profilo:\nA) x aggiornare info nei campi \"Informazioni Generali\" e \"Gruppo IVA\" > devono caricare nel campo \"Richiesta aggiornamento form supplementari\"  un allegato specificando cosa vogliono modificare\nB) x aggiornare o integrare gli iban riportati in \"IBAN Fornitore\" o nei campi \"IBAN1 e 2\" > devono caricare nel campo \"Richiesta aggiornamento form supplementari il template compilato con i dati bancari da aggiornare\nALBO\n• Dettagli sulla tipologia di albo\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.\nACEA: integrazione SAP\n• Credenziali di accesso per SAP \ninviate a fornitori che si registrano su nostro partale per partecipare a gare di: \n- Acque \n- Publiacque \n- Ingegnerie Toscane\n• Mail Comunicazione userid SAP:\nMittente: fornitorinoreply@cert.aceaspa.it\nOggetto: Comunicazione UserID \n• Mail Comunicazione password SAP: \nMittente: fornitorinoreply@cert.aceaspa.it\nOggetto: Comunicazione Password"}, "Aci": {"name": "Aci Informatica", "sheet": "Aci", "site": "https://portaleacquisti.aci.it", "phone": "02 12 41 21 398", "console": "TLE", "webform": "\"Richiedi assistenza on line\" (SI può allegare)", "commercials": "ctrovalusci@jaggaer.com; cgaliano@jaggaer.com", "sections": [{"header": "SITO E CONTATTI", "content": "• Console: TLE\n• SF a seconda del portale per il quale chiamano:  \n> ACI Informatica S.p.A. > ACI Progei\n> ACI Infomobility > ACI Global\n> AUTOMOBILE CLUB D'ITALIA (x chi chiama per l'albo Avvocati)\n• SITO: https://portaleacquisti.aci.it\n• TELEFONO: 02 12 41 21 398 \n• Webform: \"Richiedi assistenza on line\" (SI può allegare)\n• COMMERCIALI: ctrovalusci@jaggaer.com; cgaliano@jaggaer.com", "links": ["https://portaleacquisti.aci.it"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• Abilitazione a seguito di controlli di GCC Belgrado sui report:\n> Pec obbligatoria \n> Ctr di registrazione firmato digitalmente \n> Tipologia Entità (persona fisica, persona giuridica ecc) e compilazione campi obbligatori opzionali associati a tipologia selezionata \n• Invio mail richiesta integrazione da portale. \n• Se un buyer Aci chiede di abilitare un oe seguire procedura nella sezione\"Approfondimenti\" \n• X fornitori disabilitati da Aci seguire procedura nella sezione\"Approfondimenti\"", "links": []}, {"header": "MODIFICHE", "content": "• Mail/Referente: > si applica procedura Docusign   e procediamo in autonomia \n•  Ragione sociale/Forma giuridica:\nA) Fornitori REGISTRATI > basta richiesta scritta nel corpo di una mail + in allegato la mail inviata da portale dopo controllo > facciamo la modifica e abilitiamo se è tutto ok\nB) Fornitori ABILITATI \n1) inviamo all'oe primo template per avviare procedura docusign\n2) quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a: a contatti indicati qui sotto\n3) facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato                                       \n• se ACI ci chiede di effettuare modifiche che gli oe possono fare in autonomia (es: aggiunta pec) diciamo di farci contattare dal fornitore e spieghiamo come procedere\n• Contatti buyer x Docusign:  a.avallone@informatica.aci.it  Cc c e commerciali\n> se Aci risponde che uno specifico oe è iscritto su Aci Progei inoltrare la richiesta a manola_soldani@progei.aci.it; gianluca_pizzichelli@progei.aci.it\n> se ACI risponde che possiamo fare la modifica perchè non sono qualificati procediamo", "links": []}, {"header": "IDM", "content": "• NO", "links": []}, {"header": "ALBO", "content": "• Inserimento categorie da Mie Categorie + Blocco/Sblocco in area Valutazioni (dettagli negli Approfondimenti)\n• Albero merceologico composto da 3 macrogruppi \n• In \"Mia Azienda> Profilo azienda > Dati profilo\" possono sempre aggiornare:\n> \"Tipologia Entità\" e \"Ulteriori informazioni persona fisica\"\n• sono presenti rami di categorie dismesse  (dettagli negli Approfondimenti)\n• Per info sui contenuti:\n- chi ha l'istanza può inviare messaggio da Valutazioni di Categoria\n- chi non ha l'istanza:\n>  Categorie Aci Informatica: possono scrivere agli indirizzi presenti in hp nella sezione \"Documenti per la qualifica degli Operatori Economici\"\n>  Categorie Aci Progei:  possono scrivere agli indirizzi presenti nella sezione \"Elenco fornitori\"\n>  Albo \"Elenco Avvocati Esterni\" ci inviano richiesta da form che inoltriamo a: avvocatiesterni@aci.it", "links": []}, {"header": "GARE", "content": "• Inbound\n• Area Negoziazioni:\n- RDO > Mie RDO > RDO per tutti\n- RDI  > Elenco RDI > RDI per tutti", "links": []}, {"header": "NOTE PARTICOLARI", "content": "", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "• SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "• Recupero credenziali: PEC\n> portaleacquisti@pec.aci.it \n• Inviti per partecipare in rti alle gare: NON PEC\n> portaleacquisti@aci.it", "links": []}], "approfondimenti": [{"topic": "REGISTRAZIONI-ABILITAZIONI", "focal_point": "• Richieste abilitazioni da buyer\n• Nuovo contratto Aci", "details": "• Se un buyer Aci informatica chiede di abilitare un oe effettuiamo controllo sui dati di abilitazione. Se dai controlli:   \nA) tutto ok, si abilita e si risponde che è stato abilitato;\nB) se non sono ok,  si risponde al buyer segnalando probemi riscontrati e chiedendo se ritengono opportuno si proceda ugualmente all'abilitazione.\n• Il nuovo ctr di registrazione deve avere la seguente intestazione: CONDIZIONI GENERALI DI REGISTRAZIONE E DI UTILIZZO DEL PORTALE FORNITORI ACI E SOCIETA’ DEL GRUPPO. senza logo aci", "links": []}, {"topic": "ALBO", "focal_point": "• Dettagli sulla tipologia di albo", "details": "• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.", "links": []}, {"topic": "ALBO", "focal_point": "•Albero Categorie Merceologiche (aggiornato novembre 2024)", "details": "• Albero merceologico con 3 macrogruppi:\n1) ACI - Elenco Avvocati Esterni ACI Automobile Club d'Italia > ATTIVE\n2) ACI Informatica - Albo Fornitori e Professionisti (include categorie ATTIVE e NON ATTIVE)\n> NAP - Nuovo Albo Professionisti (Legale e Notarile) di ACI Informatica SpA > selezionabili e attive\n> NAF - Nuovo Albo Fornitori di ACI Informatica SpA - IN DISMISSIONE > da ottobre 2024 non più selezionabili ma chi è qualificato può fare aggiornamenti da Valutazioni secondo procedura\n> AC - Albo Collaboratori/Consulenti di ACI Informatica SpA - IN DISMISSIONE > Categorie non più selezionabili per le quali non si possono fare aggiornamenti\n> AF - Albo Fornitori di ACI Informatica SpA - IN DISMISSIONE\n3) ACI Progei S.p.A. - Elenco dei prestatori di lavori, servizi e forniture di ACI Progei S.p.A. > ATTIVE", "links": []}], "buyer_sections": [], "all_links": ["https://portaleacquisti.aci.it"], "text": "Aci Informatica\nSITO E CONTATTI\n• Console: TLE\n• SF a seconda del portale per il quale chiamano:  \n> ACI Informatica S.p.A. > ACI Progei\n> ACI Infomobility > ACI Global\n> AUTOMOBILE CLUB D'ITALIA (x chi chiama per l'albo Avvocati)\n• SITO: https://portaleacquisti.aci.it\n• TELEFONO: 02 12 41 21 398 \n• Webform: \"Richiedi assistenza on line\" (SI può allegare)\n• COMMERCIALI: ctrovalusci@jaggaer.com; cgaliano@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• Abilitazione a seguito di controlli di GCC Belgrado sui report:\n> Pec obbligatoria \n> Ctr di registrazione firmato digitalmente \n> Tipologia Entità (persona fisica, persona giuridica ecc) e compilazione campi obbligatori opzionali associati a tipologia selezionata \n• Invio mail richiesta integrazione da portale. \n• Se un buyer Aci chiede di abilitare un oe seguire procedura nella sezione\"Approfondimenti\" \n• X fornitori disabilitati da Aci seguire procedura nella sezione\"Approfondimenti\"\nMODIFICHE\n• Mail/Referente: > si applica procedura Docusign   e procediamo in autonomia \n•  Ragione sociale/Forma giuridica:\nA) Fornitori REGISTRATI > basta richiesta scritta nel corpo di una mail + in allegato la mail inviata da portale dopo controllo > facciamo la modifica e abilitiamo se è tutto ok\nB) Fornitori ABILITATI \n1) inviamo all'oe primo template per avviare procedura docusign\n2) quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a: a contatti indicati qui sotto\n3) facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato                                       \n• se ACI ci chiede di effettuare modifiche che gli oe possono fare in autonomia (es: aggiunta pec) diciamo di farci contattare dal fornitore e spieghiamo come procedere\n• Contatti buyer x Docusign:  a.avallone@informatica.aci.it  Cc c e commerciali\n> se Aci risponde che uno specifico oe è iscritto su Aci Progei inoltrare la richiesta a manola_soldani@progei.aci.it; gianluca_pizzichelli@progei.aci.it\n> se ACI risponde che possiamo fare la modifica perchè non sono qualificati procediamo\nIDM\n• NO\nALBO\n• Inserimento categorie da Mie Categorie + Blocco/Sblocco in area Valutazioni (dettagli negli Approfondimenti)\n• Albero merceologico composto da 3 macrogruppi \n• In \"Mia Azienda> Profilo azienda > Dati profilo\" possono sempre aggiornare:\n> \"Tipologia Entità\" e \"Ulteriori informazioni persona fisica\"\n• sono presenti rami di categorie dismesse  (dettagli negli Approfondimenti)\n• Per info sui contenuti:\n- chi ha l'istanza può inviare messaggio da Valutazioni di Categoria\n- chi non ha l'istanza:\n>  Categorie Aci Informatica: possono scrivere agli indirizzi presenti in hp nella sezione \"Documenti per la qualifica degli Operatori Economici\"\n>  Categorie Aci Progei:  possono scrivere agli indirizzi presenti nella sezione \"Elenco fornitori\"\n>  Albo \"Elenco Avvocati Esterni\" ci inviano richiesta da form che inoltriamo a: avvocatiesterni@aci.it\nGARE\n• Inbound\n• Area Negoziazioni:\n- RDO > Mie RDO > RDO per tutti\n- RDI  > Elenco RDI > RDI per tutti\nNOTE PARTICOLARI\n\nBIDDING GROUP ATTIVO\n• SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n• Recupero credenziali: PEC\n> portaleacquisti@pec.aci.it \n• Inviti per partecipare in rti alle gare: NON PEC\n> portaleacquisti@aci.it\nREGISTRAZIONI-ABILITAZIONI\n• Richieste abilitazioni da buyer\n• Nuovo contratto Aci\n• Se un buyer Aci informatica chiede di abilitare un oe effettuiamo controllo sui dati di abilitazione. Se dai controlli:   \nA) tutto ok, si abilita e si risponde che è stato abilitato;\nB) se non sono ok,  si risponde al buyer segnalando probemi riscontrati e chiedendo se ritengono opportuno si proceda ugualmente all'abilitazione.\n• Il nuovo ctr di registrazione deve avere la seguente intestazione: CONDIZIONI GENERALI DI REGISTRAZIONE E DI UTILIZZO DEL PORTALE FORNITORI ACI E SOCIETA’ DEL GRUPPO. senza logo aci\nALBO\n• Dettagli sulla tipologia di albo\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.\nALBO\n•Albero Categorie Merceologiche (aggiornato novembre 2024)\n• Albero merceologico con 3 macrogruppi:\n1) ACI - Elenco Avvocati Esterni ACI Automobile Club d'Italia > ATTIVE\n2) ACI Informatica - Albo Fornitori e Professionisti (include categorie ATTIVE e NON ATTIVE)\n> NAP - Nuovo Albo Professionisti (Legale e Notarile) di ACI Informatica SpA > selezionabili e attive\n> NAF - Nuovo Albo Fornitori di ACI Informatica SpA - IN DISMISSIONE > da ottobre 2024 non più selezionabili ma chi è qualificato può fare aggiornamenti da Valutazioni secondo procedura\n> AC - Albo Collaboratori/Consulenti di ACI Informatica SpA - IN DISMISSIONE > Categorie non più selezionabili per le quali non si possono fare aggiornamenti\n> AF - Albo Fornitori di ACI Informatica SpA - IN DISMISSIONE\n3) ACI Progei S.p.A. - Elenco dei prestatori di lavori, servizi e forniture di ACI Progei S.p.A. > ATTIVE"}, "Acinque": {"name": "Acinque", "sheet": "Acinque", "site": "", "phone": "02 12 41 21 303", "console": "TLE", "webform": "\"Richiesta assistenza\" (SI può allegare)", "commercials": "fcasadei@jaggaer.com; c-mpetriccione@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLE\n• SF: Acinque SpA\n• SITO: Nuovo URL : https://albofornitori.gruppoacinque.it/web/login.html  > si accede con le solite credenziali\n(Vecchio url: https://acsm-agam.app.jaggaer.com > li indirizza in automatico al nuovo )\n• TELEFONO: 02 12 41 21 303 (visibile dopo che cliccano su Richiedi Asssistenza)\n• Webform \"Richiesta assistenza\" (SI può allegare)\n• COMMERCIALI: fcasadei@jaggaer.com; c-mpetriccione@jaggaer.com", "links": ["https://albofornitori.gruppoacinque.it/web/login.html", "https://acsm-agam.app.jaggaer.com"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• AUTOMATICO a seguito della compilazione dei Dati di Registrazione Supplementari", "links": []}, {"header": "MODIFICHE", "content": "•  X Tutte le Modifiche (anche Username e ragione sociale, correzione p.iva e c.fr digitati male ecc)\n1) si applica procedura Docusign\n2) concluso iter Docusign avvisiamo sempre per conoscenza albo.fornitori@acinque.it\n• Modifica p.iva e/o c.f in casi particolari (es:hanno digitato male c.f. o p.iva in fase di registrazione )\n> si applica procedura Docusign\n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a albo.fornitori@acinque.it  chiedendo autorizzazione\n> facciamo modifica quando si è concluso iter docusign e il clie plementari\nMODIFICHE\n•  X Tutte le Modifiche (anche Username e ragione sociale, correzione p.iva e c.fr digitati male ecc)\n1) si applica procedura Docusign\n2) concluso iter Docusign avvisiamo sempre per conoscenza albo.fornitori@acinque.it\n• Modifica p.iva e/o c.f in casi particolari (es:hanno digitato male c.f. o p.iva in fase di registrazione )\n> si applica procedura Docusign\n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a albo.fornitori@acinque.it  chiedendo autorizzazione\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato                 \n• Contatti buyer x Docusign: albo.fornitori@acinque.it\nIDM\n\nALBO\n• Mie Categorie/Albo fornitori > Aggiungi categoria > Espandi (NO BLOCCO/SBLOCCO)\n•  Quando si è creata l'istanza possono inviare quesiti sui contenuti dell'albo dalla sezione Valutazioni > Valutazioni di Categoria\n• Domande sui contenuti dell'albo > inoltrare a albo.fornitori@acinque.it  (possiamo anche lasciarla perchè è indicata nelle hp del portale)\nGARE\n• Richieste specifiche relative alla partecipazione dei fornitori alle procedure di gara  > inoltrare a albo.fornitori@acinque.it\nNOTE PARTICOLARI\n\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n• PEC: nuovoportale.acquisti@pec.acsm-agam.it\nIntegrazione con SAP\n\nesempio:\nREGISTRAZIONI-ABILITAZIONI\nesempio\n• Richieste abilitazioni da buyer\n•"}, "ADR": {"name": "ADR - Aeroporti di Roma", "sheet": "ADR", "site": "https://www.sg.adr.it", "phone": "02 124 121 303", "console": "GEO", "webform": "\"Richiedi Assistenza on line\" (SI può allegare)", "commercials": "cgaliano@jaggaer.com;  ldecapite@jaggaer.com (NON CONTATTARE PER DUBBI: chiedere prima a Manuela)", "sections": [{"header": "INFO GENERALI", "content": "• Console: GEO\n• SF: AEROPORTI DI ROMA SPA\n• SITO:  https://www.sg.adr.it \n• TELEFONO:  02 124 121 303  (visibile dopo che cliccano su Richiedi Asssistenza)\n•  Webform: \"Richiedi Assistenza on line\" (SI può allegare)\n• COMMERCIALI: cgaliano@jaggaer.com;  ldecapite@jaggaer.com (NON CONTATTARE PER DUBBI: chiedere prima a Manuela)", "links": ["https://www.sg.adr.it"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• AUTOMATICA\n• Se un OE chiede perchè è stato disattivato > farsi mandare richiesta scritta e inoltrare a  albofornitori@adr.it", "links": []}, {"header": "MODIFICHE", "content": "• X tutte le modifiche:\n> NOI NON FACCIAMO NESSUNA MODIFICA: non dobbiamo correggere neanche eventuali refusi (ad esempio una mail digitata male)\n> inoltriamo la richiesta dell'oe a ADR che fa la modifica:  albofornitori@adr.it (NO DOCUSIGN)\n• Se viene modificata la mail cambia in automatico la username", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• \"Mie Categorie\" sempre ATTIVE (NO BLOCCO/SBLOCCO):\n> Valutazioni > Valutazioni di Categoria > x per mandare i messaggi\n> Valutazioni > Area Pagamento/Mantenimento/Rinnovi > x per mandare i messaggi specifici x Pagamento/Mantenimento/Rinnovi   ( qui trovano l'istanza solo quando gliela attiva quest'area ADR)\n•  Domande sui contenuti dell'albo inoltriamo a albofornitori@adr.it\n• NB: nel questionario viene richiesta la \"Ricevuta di pagamento\" (info pagamento in HP-‘Regolamento’-art.8)\n• NB: nel questionario viene richiesto se l'oe ha effettuato la registrazione sul portale Sinergi/Synesgy e gli chiederanno un documento a comprova.", "links": []}, {"header": "GARE", "content": "• Modulo gare attivo\n• Domande sui contenuti delle gare:\n> rimandiamo alla messaggistica di gara\n> eventuali situazioni particolari possiamo inoltrarle a albofornitori@adr.it", "links": []}, {"header": "NOTE PARTICOLARI", "content": "• Recupero Credenziali: la username coincide sempre con la mail ma NON COMUNICHIAMO LA USERNAME \n> se non ricordano username li guidiamo per recuperarla\n> cliccare su Recupero username e password\n> inserire la mail registrata sul portale\n> cliccare su Dimenticato username\n> selezionare \"non sono un robot\", poi  le figure richieste e cliccare su Verifica\n> cliccare su Richiedi link Username\n• Se un OE chiede perchè è stato disattivato > farsi mandare richiesta scritta e inoltrare a  albofornitori@adr.it\n• Per problematiche inerenti attività svolte da Fincons sul portale ADR (ad es aggiunta di de) confrontarsi con Manuela ed eventualmente inoltrare a:rosalinda.palmisano@finconsgroup.com", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "• NON PEC: eprocurement@sg.adr.it", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [], "buyer_sections": [], "all_links": ["https://www.sg.adr.it"], "text": "ADR - Aeroporti di Roma\nINFO GENERALI\n• Console: GEO\n• SF: AEROPORTI DI ROMA SPA\n• SITO:  https://www.sg.adr.it \n• TELEFONO:  02 124 121 303  (visibile dopo che cliccano su Richiedi Asssistenza)\n•  Webform: \"Richiedi Assistenza on line\" (SI può allegare)\n• COMMERCIALI: cgaliano@jaggaer.com;  ldecapite@jaggaer.com (NON CONTATTARE PER DUBBI: chiedere prima a Manuela)\nREGISTRAZIONI-ABILITAZIONI\n• AUTOMATICA\n• Se un OE chiede perchè è stato disattivato > farsi mandare richiesta scritta e inoltrare a  albofornitori@adr.it\nMODIFICHE\n• X tutte le modifiche:\n> NOI NON FACCIAMO NESSUNA MODIFICA: non dobbiamo correggere neanche eventuali refusi (ad esempio una mail digitata male)\n> inoltriamo la richiesta dell'oe a ADR che fa la modifica:  albofornitori@adr.it (NO DOCUSIGN)\n• Se viene modificata la mail cambia in automatico la username\nIDM\n\nALBO\n• \"Mie Categorie\" sempre ATTIVE (NO BLOCCO/SBLOCCO):\n> Valutazioni > Valutazioni di Categoria > x per mandare i messaggi\ i da buyer\n•\n\n•\n•\n\n•\n•"}, "Alperia": {"name": "Alperia", "sheet": "Alperia", "site": "https://sourcing.alperiagroup.eu/web/login.html", "phone": "> per assistenza in italiano: 02 124 121 303", "console": "TLE", "webform": "\"Richiesta assistenza online\" (si può allegare)", "commercials": "gpizzinga@jaggaer.com; emangini@jaggaer.com; c-mpetriccione@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLE\n• SF: Alperia SpA\n• SITO: https://sourcing.alperiagroup.eu/web/login.html\n•  TELEFONO: \n> per assistenza in italiano: 02 124 121 303 \n> per assistenza in inglese: +39 02 00704241 (quando arriva la chiamata su 8X8 leggiamo\"Milano_Public_Eng\" )\n> per chi chiama da Germania o Austria:  +498007244883\n> per chi chiama dall'Italia e richiede assistenza in lingua tedesca: 0282951912 \n• Webform \"Richiesta assistenza online\" (si può allegare)\n•  COMMERCIALI: gpizzinga@jaggaer.com; emangini@jaggaer.com; c-mpetriccione@jaggaer.com", "links": ["https://sourcing.alperiagroup.eu/web/login.html"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• il fornitore inserisce i documenti richiesti e il giorno seguente Alperia fa i controlli e li abilita\n• Nei dati di registrazione supplementari hanno  le \"Norme per l'accesso al Portale\" > area sempre modificabile, Alperia può chiedere di aggiornarle\n• X Agenzie Assicurative > le varie agenzie di una compagnia assicurativa per registrarsi possonno inserire il codice fiscale anche nel campo P.IVA", "links": []}, {"header": "MODIFICHE", "content": "•  Si applica procedura Docusign \n• Richieste di Cancellazione\n> inviamo all'oe primo template per avviare procedura docusign\n> inoltriamo richiesta dell'oe x avere autorizzazione a:supplier@alperia.eu\n> cancelliamo quando si è concluso iter docusign e il cliente ci ha autorizzato                                     \nNB quando ci autorizzano, se non specificano nulla, chiediamo conferma che per loro sia sufficiente disabilitarlo o non vogliono più averlo visibile in albo \n> se confermano che non lo vogliono vedere, dopo aver disabilitato il fornitore lo archiviamo\n• Contatti buyer x Docusign: supplier@alperia.eu", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• Inserimento categorie da:\n- Mie Categorie > Aggiungi categoria > Espandi \n- da menù di sinistra> Profilo Azienda > Mie Categorie > Aggiungi categoria > Espandi \n• Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > dettagli nel foglio \"Approfondimenti\"\n• Per info su contenuti girare le richieste a:  supplier@alperia.eu  in CC emangini@jaggaer.com", "links": []}, {"header": "GARE", "content": "•  Indicazioni per caricamento del DGUE Elettronico con “Prepara risposta ESDP”: i nel file “Procedura ESPD seller” ( \\\\TERADATA\\share\\Moc\\ESOP\\PA\\PA comune )\n• Per alcuni portali possono caricare i contratti di gara nella rdo (es Alperia):  \n> se è previsto nel report di gara troviamo \n1) la sezione \"Gestisci documento ufficiale di contratto collegati: SI\"\n2) il codice di contratto (es. con_387)\n> per vedere il documento di contratto l'oe deve cominciare a creare la risposta della rdo", "links": []}, {"header": "NOTE PARTICOLARI", "content": "• Richiesta di assistenza scritte in tedesco dagli OE vanno gestite in tedesco:\nA) Se c’è Simone li giriamo a lui.\nB) Se Simone non c’è, proviamo a tradurre la richiesta con google translate (o programma simile):\n> Se abbiamo compreso la richiesta, prepariamo la risposta in italiano (se si tratta di una risposta semplice), la traduciamo in tedesco su google translate e la inviamo.\n> Se non ci è chiara la richiesta, chiediamo aiuto via teams a Teodor Kern (non parla italiano, gli va scritto in inglese) comunicandogli anche il codice del ticket. Dopodichè procediamo come sopra. \n> Se Teodor non fosse disponibile, sempre via teams, scriviamo ad Aleksandar Mladjenovic che verificherà se c'è qualcun altro disponibile che ci può aiutare.\n> Se la risposta che abbiamo preparato e tradotto in tedesco su google translate è articolata e/o non siamo sicuri che sia corretta, possiamo chiedere a Teodor (o chi per lui) di controllarla.", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "• SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "• Prima psw parte da: noreply.sourcing@pec.alperia.eu\n(Non sappiamo se anche i recuperi partono da questo indirizzo)", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "ALBO", "focal_point": "• Dettagli sulla tipologia di albo", "details": "• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}], "buyer_sections": [], "all_links": ["https://sourcing.alperiagroup.eu/web/login.html"], "text": "Alperia\nINFO GENERALI\n• Console: TLE\n• SF: Alperia SpA\n• SITO: https://sourcing.alperiagroup.eu/web/login.html\n•  TELEFONO: \n> per assistenza in italiano: 02 124 121 303 \n> per assistenza in inglese: +39 02 00704241 (quando arriva la chiamata su 8X8 leggiamo\"Milano_Public_Eng\" )\n> per chi chiama da Germania o Austria:  +498007244883\n> per chi chiama dall'Italia e richiede assistenza in lingua tedesca: 0282951912 \n• Webform \"Richiesta assistenza online\" (si può allegare)\n•  COMMERCIALI: gpizzinga@jaggaer.com; emangini@jaggaer.com; c-mpetriccione@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• il fornitore inserisce i documenti richiesti e il giorno seguente Alperia fa i controlli e li abilita\n• Nei dati di registrazione supplementari hanno  le \"Norme per l'accesso al Portale\" > area sempre modificabile, Alperia può chiedere di aggiornarle\n• X Agenzie Assicurative > le varie agenzie di una compagnia assicurativa per registrarsi possonno inserire il codice fiscale anche nel campo P.IVA\nMODIFICHE\n•  Si applica procedura Docusign \n• Richieste di Cancellazione\n> inviamo all'oe primo template per avviare procedura docusign\n> inoltriamo richiesta dell'oe x avere autorizzazione a:supplier@alperia.eu\n> cancelliamo quando si è concluso iter docusign e il cliente ci ha autorizzato                                     \nNB quando ci autorizzano, se non specificano nulla, chiediamo conferma che per loro sia sufficiente disabilitarlo o non vogliono più averlo visibile in albo \n> se confermano che non lo vogliono vedere, dopo aver disabilitato il fornitore lo archiviamo\n• Contatti buyer x Docusign: supplier@alperia.eu\nIDM\n\nALBO\n• Inserimento categorie da:\n- Mie Categorie > Aggiungi categoria > Espandi \n- da menù di sinistra> Profilo Azienda > Mie Categorie > Aggiungi categoria > Espandi \n• Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > dettagli nel foglio \"Approfondimenti\"\n• Per info su contenuti girare le richieste a:  supplier@alperia.eu  in CC emangini@jaggaer.com\nGARE\n•  Indicazioni per caricamento del DGUE Elettronico con “Prepara risposta ESDP”: i nel file “Procedura ESPD seller” ( \\\\TERADATA\\share\\Moc\\ESOP\\PA\\PA comune )\n• Per alcuni portali possono caricare i contratti di gara nella rdo (es Alperia):  \n> se è previsto nel report di gara troviamo \n1) la sezione \"Gestisci documento ufficiale di contratto collegati: SI\"\n2) il codice di contratto (es. con_387)\n> per vedere il documento di contratto l'oe deve cominciare a creare la risposta della rdo\nNOTE PARTICOLARI\n• Richiesta di assistenza scritte in tedesco dagli OE vanno gestite in tedesco:\nA) Se c’è Simone li giriamo a lui.\nB) Se Simone non c’è, proviamo a tradurre la richiesta con google translate (o programma simile):\n> Se abbiamo compreso la richiesta, prepariamo la risposta in italiano (se si tratta di una risposta semplice), la traduciamo in tedesco su google translate e la inviamo.\n> Se non ci è chiara la richiesta, chiediamo aiuto via teams a Teodor Kern (non parla italiano, gli va scritto in inglese) comunicandogli anche il codice del ticket. Dopodichè procediamo come sopra. \n> Se Teodor non fosse disponibile, sempre via teams, scriviamo ad Aleksandar Mladjenovic che verificherà se c'è qualcun altro disponibile che ci può aiutare.\n> Se la risposta che abbiamo preparato e tradotto in tedesco su google translate è articolata e/o non siamo sicuri che sia corretta, possiamo chiedere a Teodor (o chi per lui) di controllarla.\nBIDDING GROUP ATTIVO\n• SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n• Prima psw parte da: noreply.sourcing@pec.alperia.eu\n(Non sappiamo se anche i recuperi partono da questo indirizzo)\nIntegrazione con SAP\n\nALBO\n• Dettagli sulla tipologia di albo\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.\n\n•\n•\n\n•\n•"}, "Amia": {"name": "Amia", "sheet": "Amia", "site": "https://amiavr.bravosolution.com/web/login.html", "phone": "02 124 121 303", "console": "TLE", "webform": "\"Richiesta assistenza\" (SI può allegare)", "commercials": "ccattaneo@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLE\n• SF: AMIA SPA\n• SITO: https://amiavr.bravosolution.com/web/login.html\n• TELEFONO: 02 124 121 303 (visibile dopo che cliccano su Richiedi Asssistenza)\n• Webform: \"Richiesta assistenza\" (SI può allegare)\n• COMMERCIALI: ccattaneo@jaggaer.com", "links": ["https://amiavr.bravosolution.com/web/login.html"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• AUTOMATICA", "links": []}, {"header": "MODIFICHE", "content": "• Si applica procedura Docusign\n• Richieste Cancellazione Azienda > \n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a: Davide.Roner@amiavr.it \n> cancelliamo quando si è concluso iter docusign e il cliente ci ha autorizzato                     \n• Contatti buyer x Docusign: Davide.Roner@amiavr.it", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• Inserimento categorie da \"Mie categorie\" > NON CI SONO DATA ELEMENT DA COMPILARE\n> in passato avevano DE dentro le categorie quindi in valutazioni potrebbero avere delle istanze che segnalano documenti mancanti o scaduti > devono ignorarle perchè non devono aggiornare più nulla\n• Mail x Info Contenuti Albo, inoltrare a: amia.verona@amiavr.it", "links": []}, {"header": "GARE", "content": "• Inbound", "links": []}, {"header": "NOTE PARTICOLARI", "content": "", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "esempio:\nREGISTRAZIONI-ABILITAZIONI", "focal_point": "esempio\n• Richieste abilitazioni da buyer", "details": "•", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}], "buyer_sections": [], "all_links": ["https://amiavr.bravosolution.com/web/login.html"], "text": "Amia\nINFO GENERALI\n• Console: TLE\n• SF: AMIA SPA\n• SITO: https://amiavr.bravosolution.com/web/login.html\n• TELEFONO: 02 124 121 303 (visibile dopo che cliccano su Richiedi Asssistenza)\n• Webform: \"Richiesta assistenza\" (SI può allegare)\n• COMMERCIALI: ccattaneo@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• AUTOMATICA\nMODIFICHE\n• Si applica procedura Docusign\n• Richieste Cancellazione Azienda > \n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltri er Modifica Ragione Sociale e/o Forma giuridica, Correzione p.iva  (ad es. un libero professionista che non aveva p.iva e dopo gli è stata assegnata):\n> si applica procedura Docusign\n> effettuata modifica avvisiamo i.aliboni@stradeanas.it; f.riggi@stradeanas.it \n• Per richieste di Cancellazione:  \n• Richieste di Cancellazione\n> inviamo all'oe primo template per avviare procedura docusign\n> inoltriamo richiesta dell'oe x avere autorizzazione a:  i.aliboni@stradeanas.it; f.riggi@stradeanas.it  \n> cancelliamo quando si è concluso iter docusign e il cliente ci ha autorizzato                                      \n• Per richieste di modifica dati giunte da imprese che hanno più utenze con la stessa p.iva e/o c.f (ad esempio un'impresa singola e una rti):\n- il sistema non ci permette di salvare la modifica perchè rileva la doppia utenza\n- segnalare a Manuela (farà segnalazione ad Anna Esposto o ITOPS)\n• Contatti buyer x Docusign: i.aliboni@stradeanas.it; f.riggi@stradeanas.it", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• NB. I fornitori possono selezionare le categorie anche al momento della registrazione ma le possono eliminare solo quando sono abilitati.\n• Per qualificarsi:\n- cliccare su 'Categorie Merceologiche'>  'Aggiungi categoria' > 'Espandi'...\n• NO Blocco/Sblocco Categorie > Categorie sempre attive\n• I fornitori già qualificati hanno l'Istanza nell'area Valutazioni da cui possono inviare messaggi: Mia Azienda > Valutazioni > Valutazioni e qualificazioni\n• PER DOMANDE SU CONTENUTI ALBO (per chi non ha istanze in Valutazioni) (anche se chiedono Allegato 7):\n> possono rivolgersi ai riferimenti riportati nella sezione CONTATTI della homepage", "links": []}, {"header": "GARE", "content": "•  inbound\n• x invitarsi ai Bandi Pubblici: \n> Richieste di offerta > Procedura Aperta \n> Elenco Richiesta di Informazioni > Richiesta di Informazioni per tutti\n• Limite Dimensioni Allegati nei Messaggi di gara: 20
