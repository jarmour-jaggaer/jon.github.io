t/login.do\n- Portale in inglese: \n> cliccano su https://seamilano.bravosolution.com/esop/guest/login.do?userAct=changeLangIndex&language=en_GB\n> cliccano su “richiedi accesso sso” ed inseriscono le credenziali del portale sea", "links": ["https://seamilano.bravosolution.com/esop/guest/login.do", "https://seamilano.bravosolution.com/esop/guest/login.do?userAct=changeLangIndex&language=en_GB"]}, {"header": "NOTE PARTICOLARI", "content": "• Per tutto ciò che riguarda il portale SAP (accesso,\"Ordini\", collaborazione > fare inviare richiesta da Assistenza online\n>  inoltriamo a portalefornitorisea@seamilano.eu CC: leonardo.pedersoli@seamilano.eu   \n• Quesiti relativi agli \"Collaborazione\" > fare inviare richiesta da Assistenza online selezionando nell'elenco la voce \"Portale Collaborativo Amministrazione \" \n> se arriva a noi inoltriamo a felice.froiio@seamilano.eu; antonella.pertosa@seamilano.eu \n• Per recupero credenziali su SAP (SQM) > inoltrare la mail a antonella.pertosa@seamilano.eu; felice.froiio@seamilano.eu\n• Per eventuali probematiche tecniche particolari consultarsi con Manu: valuterà se inoltrare segnalazione a  sea-jaggaer-ams@avvale.com", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "•  Recupero credenziali JAGGAER > PEC (portalegare@pec.seamilano.eu)\n•  Recupero credenziali SAP > NO PEC (supportosrm@seamilano.eu)", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "REGISTRAZIONI-ABILITAZIONI", "focal_point": "• Registrazione RTI", "details": "• Registrazione di RTI \n> NON consentite su Jaggaer\n> chi era registrato come rti su SAP deve fare nuova registrazione su JA con p.iva singola \nNB: le utenze RTI migrate da SAP hanno p.iva fittizia quindi non impediscono la registrazione delle singole imprese che le compongono", "links": []}, {"topic": "ABILITAZIONI", "focal_point": "• Solleciti Abilitazioni", "details": "• Se oe sollecita l'abilitazione (es: deve partecipare ad una gara) lo cerchiamo su console e verifichiamo in Stato Azienda la voce \"Form di registrazione\"\n> se sono\" incompleti\"> gli diciamo che per essere abilitati devono compilare tuttii campi obbligatori richiesti\n> se sono \"completi\">  inoltriamo a portalefornitorisea@seamilano.eu;  CC: leonardo.pedersoli@seamilano.eu", "links": []}, {"topic": "REGISTRAZIONI-ABILITAZIONI", "focal_point": "• Fornitori Registrati con Stato CREATO", "details": "• Gli OE che da console risultano con stato CREATO \"non hanno un utente associato\n> non possono registrarsi perchè già presenti e non possono recuperare le credenziali\n> ci facciamo inviare mail con i dati da inserire in anagrafica: nome, cognome, numero di telefono e indirizzo mail \n> quando riceviamo i dati richiesti li inoltriamo a sea-jaggaer-ams@avvale.com (in CC Manzin) usando la bozza presente nel file Template\n> quando  ci segnalano che hanno sistemato l'utenza avvisiamo l'oe che può recuperare le credenziali e caricare i documenti per l'abilitazione \n(NB: anche se Avvale ci indica la user nella mail noi NON la comunichiamo all'oe che deve recuperarla con la solita procedura)", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}], "buyer_sections": [], "all_links": ["https://seamilano.bravosolution.com/esop/guest/login.do", "https://milanairports.com/it/fornitori/collabora-con-sea", "http://www.seamilano.eu/it/b2b/fornitori", "https://milanairports.com/business/it/b2b/fornitori/manualistica", "https://seamilano.bravosolution.com/esop/guest/login.do?userAct=changeLangIndex&language=en_GB"], "text": "SEA\nINFO GENERALI\n• Console: TLE\n• SF: SPA ESERCIZI AEROPORTUALI S.E.A.\n•  SITO JAGGAER:  https://seamilano.bravosolution.com/esop/guest/login.do\n• SITO DA CUI ACCEDERE AL NOSTRO E A QUELLO SAP: \n> https://milanairports.com/it/fornitori/collabora-con-sea\n> cliccare su \"Collabora con SEA\"\n> x vedere nostra hp di accesso \"accedi alla piattaforma fornitori\"\n> x registrarsi su nostro portale \"Nuova registrazione\"\n> x accedere al vecchio portale \"Accesso alla piattaforma preesistente\" > cliccare sul \"qui\" della frase \"In caso di necessità per continuare ad accedere all' \"Area Riservata\" della piattaforma fornitori preesistente, è possibile collegarsi qui.\"\n• TELEFONO:  02 00 70 42 49\n• Webform \n> http://www.seamilano.eu/it/b2b/fornitori \n> cliccare su \"Collabora con SEA\"\n> \"Modulo di assistenza\" (si può allegare)\n• COMMERCIALI:  ccattaneo@jaggaer.com; gpizzinga@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• Dal 19 gen 2024: possono registrarsi solo sul portale Jaggaer \n> accettano le Condizioni Generali a video > compilano i form \n> compilano i form e nei Dati Profilo caricano le Condizioni Generali \n> SEA fa verifiche e li abilita\n• Registrazione di RTI in approfondimenti\n• Partita iva di Gruppo > chi fa parte di gruppo iva si registra con P.iva della propria impresa e poi indica nei Dati Profilo se fa parte di un gruppo iva\n• Se oe sollecita l'abilitazione (es: deve partecipare ad una gara) > info in Approfondimenti\n• Alcuni OE sono stati retrocessi da \"Abilitato\" a \"In attesa di abilitazione\" perchè erano stati erroneamente migrati come Abilitati\n> se ci contattano segnalando che prima vedevano più aree e ora solo i form di registrazione\n> diciamo che devono compilare i form obbligatori che risultano incompleti\n• Procedura per OE con stato \"CREATO\" > in \"Approfondimenti\"\nMODIFICHE\n• Su Jaggaer possono aggiornare tutta l'anagrafica tranne l'email, Ragione sociale, forma giuridica, p.iva , c.fM\n• Richieste modifiche anagrafica su Jaggaer (mail, ragione sociale, forma giuridica) > Si applica procedura Docusign\n• Se nell'anagrafica di un OE è indicata una mail fittizia e deve recuperare le credenziali\n> verifichiamo se è una registrazione interna fatta da SEA\n> avviamo procedura docusign usando apposito template\n• Richieste modifiche anagrafica su SAP (SQM) > inoltrare la mail a portalefornitorisea@seamilano.eu CC: leonardo.pedersoli@seamilano.eu\n• Procedura per OE con stato \"CREATO\" > foglio \"Approfondimenti\"\n• Contatti buyer x Docusign: portalefornitorisea@seamilano.eu CC: leonardo.pedersoli@seamilano.eu\nIDM\n\nALBO\n• L’iscrizione all’albo è composta da 2 parti (entrambi con BLOCCO/SBLOCCO):\n> Compilazione del Questionario Generale  \n> Scelta delle categorie merceologiche in Mie Categorie e compilazione dei questionari specifici\n• Mie categorie + Blocco/Sblocco Questionario Generale e Questionari Specifici in area Valutazioni (Modificabili/di Categoria) \n• ITER DI QUALIFICA: indicazioni nel file “FAQ” presente In sharepoint nella cartella del cliente\n• Domande sui contenuti albo:\n> se hanno istanza > possono inviare Messaggio da Valutazioni di Categoria\n> se devono ancora compilare la categoria > girare la richiesta a portalefornitorisea@seamilano.eu CC: leonardo.pedersoli@seamilano.eu\n• Per casistiche particolari inerenti l'albo confrontarsi con Manuela per valutare se chiedere chiarimenti a sea-jaggaer-ams@avvale.com\n• Manuali albo su sp e hp portale:\n https://milanairports.com/business/it/b2b/fornitori/manualistica\nGARE\n• Inbound\n• LINK DI EMERGENZA X GARE\n- Portale Italiano: https://seamilano.bravosolution.com/esop/guest/login.do\n- Portale in inglese: \n> cliccano su https://seamilano.bravosolution.com/esop/guest/login.do?userAct=changeLangIndex&language=en_GB\n> cliccano su “richiedi accesso sso” ed inseriscono le credenziali del portale sea\nNOTE PARTICOLARI\n• Per tutto ciò che riguarda il portale SAP (accesso,\"Ordini\", collaborazione > fare inviare richiesta da Assistenza online\n>  inoltriamo a portalefornitorisea@seamilano.eu CC: leonardo.pedersoli@seamilano.eu   \n• Quesiti relativi agli \"Collaborazione\" > fare inviare richiesta da Assistenza online selezionando nell'elenco la voce \"Portale Collaborativo Amministrazione \" \n> se arriva a noi inoltriamo a felice.froiio@seamilano.eu; antonella.pertosa@seamilano.eu \n• Per recupero credenziali su SAP (SQM) > inoltrare la mail a antonella.pertosa@seamilano.eu; felice.froiio@seamilano.eu\n• Per eventuali probematiche tecniche particolari consultarsi con Manu: valuterà se inoltrare segnalazione a  sea-jaggaer-ams@avvale.com\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n•  Recupero credenziali JAGGAER > PEC (portalegare@pec.seamilano.eu)\n•  Recupero credenziali SAP > NO PEC (supportosrm@seamilano.eu)\nIntegrazione con SAP\n\nREGISTRAZIONI-ABILITAZIONI\n• Registrazione RTI\n• Registrazione di RTI \n> NON consentite su Jaggaer\n> chi era registrato come rti su SAP deve fare nuova registrazione su JA con p.iva singola \nNB: le utenze RTI migrate da SAP hanno p.iva fittizia quindi non impediscono la registrazione delle singole imprese che le compongono\nABILITAZIONI\n• Solleciti Abilitazioni\n• Se oe sollecita l'abilitazione (es: deve partecipare ad una gara) lo cerchiamo su console e verifichiamo in Stato Azienda la voce \"Form di registrazione\"\n> se sono\" incompleti\"> gli diciamo che per essere abilitati devono compilare tuttii campi obbligatori richiesti\n> se sono \"completi\">  inoltriamo a portalefornitorisea@seamilano.eu;  CC: leonardo.pedersoli@seamilano.eu\nREGISTRAZIONI-ABILITAZIONI\n• Fornitori Registrati con Stato CREATO\n• Gli OE che da console risultano con stato CREATO \"non hanno un utente associato\n> non possono registrarsi perchè già presenti e non possono recuperare le credenziali\n> ci facciamo inviare mail con i dati da inserire in anagrafica: nome, cognome, numero di telefono e indirizzo mail \n> quando riceviamo i dati richiesti li inoltriamo a sea-jaggaer-ams@avvale.com (in CC Manzin) usando la bozza presente nel file Template\n> quando  ci segnalano che hanno sistemato l'utenza avvisiamo l'oe che può recuperare le credenziali e caricare i documenti per l'abilitazione \n(NB: anche se Avvale ci indica la user nella mail noi NON la comunichiamo all'oe che deve recuperarla con la solita procedura)\n\n•\n•\n\n•\n•"}, "Siae": {"name": "SIAE", "sheet": "Siae", "site": "https://siaeprocurement.bravosolution.com", "phone": "02 124 121 303", "console": "TLE", "webform": "\"Assistenza online\" (SI può allegare)", "commercials": "ccattaneo@jaggaer.com;", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLE\n• SF: SIAE- Società Italiana degli Autori e degli Editori\n• SITO: https://siaeprocurement.bravosolution.com\n• TELEFONO: 02 124 121 303\n• Webform \"Assistenza online\" (SI può allegare)  \n• COMMERCIALI: ccattaneo@jaggaer.com;", "links": ["https://siaeprocurement.bravosolution.com"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• AUTOMATICA\n• PEC: non obbligatoria ai fini della registrazione/abilitazione. Necessaria in caso di invito da parte di SIAE a partecipare ad indagini di mercato", "links": []}, {"header": "MODIFICHE", "content": "• Si applica procedura Docusign\n• Per Variazioni Societarie/modifiche Ragione Sociale/albo\n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a: Alessandro.Clapiz@siae.it; Lavinia.Piani@siae.it\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato      \n• Contatti buyer x Docusign: Alessandro.Clapiz@siae.it; Lavinia.Piani@siae.it", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "•  Mie categorie > Aggiungi categoria> Espandi\n•  Possono inviare messaggi da Valutazioni di Categoria\n•  Per info albo girare la richiesta a: Alessandro.Clapiz@siae.it; Lavinia.Piani@siae.it", "links": []}, {"header": "GARE", "content": "•  Sul portale pubblicano solo Gare ad In // ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function hi(text, terms){
  if(!terms||!terms.length) return linkify(esc(text));
  let s = esc(text);
  terms.forEach(term=>{
    const re = new RegExp('('+escRe(esc(term))+')', 'gi');
    s = s.replace(re, '<mark>$1</mark>');
  });
  return linkify(s);
}

function linkify(s){
  // Turn URLs into clickable links (but skip those already inside <mark> or <a>)
  return s.replace(/(https?:\/\/[^\s\n<>"'&]+)/g, (url) => {
    const clean = url.replace(/[.,;)]+$/, '');
    const display = clean.length > 55 ? clean.substring(0,52)+'…' : clean;
    return `<a href="${clean}" target="_blank" rel="noopener">${display}</a>`;
  });
}

// ── Search ────────────────────────────────────────────────────────────────────
function onSearch(v){
  query=v.trim();
  document.getElementById('clearBtn').style.display=query?'flex':'none';
  clearTimeout(searchTmo);
  if(!query){ showWelcome(); return; }
  searchTmo=setTimeout(()=>runSearch(query),150);
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').style.display='none';
  query=''; activeCustomer=null; setActiveSb(null);
  showWelcome();
}

function runSearch(q){
  document.getElementById('detailView').classList.remove('open');
  document.getElementById('resultsArea').classList.remove('hidden');
  activeCustomer=null; setActiveSb(null);

  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  const results=[];

  CUSTOMERS.forEach(c=>{
    const txt=c.text.toLowerCase();
    let score=0;
    terms.forEach(term=>{
      let idx=0,cnt=0;
      while((idx=txt.indexOf(term,idx))!==-1){cnt++;idx+=term.length;}
      score+=cnt;
    });
    if(c.name.toLowerCase().includes(terms.join(' '))) score+=50;
    if(score>0) results.push({c, score, terms});
  });
  results.sort((a,b)=>b.score-a.score);

  const area=document.getElementById('resultsArea'); area.innerHTML='';
  const meta=document.getElementById('searchMeta');

  if(!results.length){
    meta.textContent='';
    area.innerHTML=`<div class="no-results"><div class="no-results-icon">🔍</div><div style="font-size:15px;color:var(--dim)">${t('no_results')}</div><div style="font-size:13px;margin-top:4px">${t('no_results_sub')}</div></div>`;
    return;
  }

  meta.textContent=`${results.length} ${results.length===1?t('result_one'):t('results_lbl')} "${q}"`;
  results.forEach(r=>area.appendChild(buildCard(r.c, r.terms)));
}

// ── Card ──────────────────────────────────────────────────────────────────────
function buildCard(c, terms){
  const card=document.createElement('div'); card.className='result-card';

  // Count hits
  const txt=c.text.toLowerCase();
  let hits=0;
  terms.forEach(term=>{
    let idx=0; while((idx=txt.indexOf(term,idx))!==-1){hits++;idx+=term.length;}
  });

  // Header badges
  let badges='';
  if(c.console) badges+=`<span class="badge b-console">${esc(c.console)}</span>`;
  if(c.phone)   badges+=`<span class="badge b-phone">📞 ${esc(c.phone)}</span>`;
  badges+=`<span class="badge b-hits">${hits} ${t('hits')}</span>`;

  // Info row (quick fields)
  let infoHtml='';
  const infoItems=[];
  if(c.site)        infoItems.push([t('info_site'), `<a href="${esc(c.site)}" target="_blank" rel="noopener">${esc(c.site.replace('https://','').substring(0,45))}${c.site.length>50?'…':''}</a>`]);
  if(c.phone)       infoItems.push([t('info_phone'), esc(c.phone)]);
  if(c.console)     infoItems.push([t('info_console'), esc(c.console)]);
  if(c.webform)     infoItems.push([t('info_wf'), esc(c.webform.substring(0,60))]);
  if(c.commercials) infoItems.push([t('info_comm'), esc(c.commercials.substring(0,80))]);
  if(infoItems.length){
    infoHtml=`<div class="info-row">${infoItems.map(([l,v])=>`<div class="info-item"><div class="info-label">${l}</div><div class="info-value">${v}</div></div>`).join('')}</div>`;
  }

  // Section table — group consecutive (header, content) pairs into one table
  // Each green row is a row of headers; next row is content
  // We need to find matched sections
  const matchedSecs = c.sections.filter(s=>
    terms.some(term=>s.header.toLowerCase().includes(term)||s.content.toLowerCase().includes(term))
  );

  // Group sections by header row — headers at same "row level" should be columnar
  // We detect this by noting headers come in groups: each green row covers multiple columns
  // Re-group by iterating sections: consecutive pairs with the same "row group"
  // Simple approach: show all matched sections as individual pairs
  let secHtml='';
  if(matchedSecs.length){
    // Build a 2-col table per matched section
    secHtml='<table class="section-table">';
    // Try to find paired sections (same row in spreadsheet = same group)
    // We'll just show each as its own row pair
    const shown=new Set();
    // Group sections into their original row groups (header + content pairs)
    // Since sections array is flat, group them in pairs of 2-4 based on sheet structure
    // Simple: show up to 3 matched sections
    matchedSecs.slice(0,4).forEach(s=>{
      if(shown.has(s.header)) return; shown.add(s.header);
      secHtml+=`<tr class="sec-hdr-row"><td>${esc(s.header)}</td></tr>`;
      secHtml+=`<tr class="sec-content-row"><td>${hi(s.content,terms)}</td></tr>`;
    });
    secHtml+='</table>';
  }

  // Links
  let linksHtml='';
  if(c.all_links && c.all_links.length){
    linksHtml=`<div class="links-section">
      <div class="links-title">🔗 ${t('sec_links')}</div>
      <div class="links-list">${c.all_links.map(l=>`<a class="link-item" href="${esc(l)}" target="_blank" rel="noopener">${esc(l)}</a>`).join('')}</div>
    </div>`;
  }

  card.innerHTML=`
    <div class="rc-head" onclick="toggleCard(this)">
      <div class="rc-name">${esc(c.name)}</div>
      <div class="rc-badges">${badges}</div>
      <span class="expand-icon">▼</span>
    </div>
    <div class="rc-body">
      ${infoHtml}
      ${secHtml}
      ${linksHtml}
      <button class="view-full-btn" onclick="event.stopPropagation();showDetail('${esc(c.sheet).replace(/'/g,"\\'")}')">📄 ${t('show_full')}</button>
    </div>
  `;
  return card;
}

  hdr.classList.toggle('open');
  hdr.nextElementSibling.classList.toggle('open');

  if(c.site)        infoItems.push([t('info_site'),`<a href="${esc(c.site)}" target="_blank" rel="noopener">${esc(c.site)}</a>`]);
  if(c.phone)       infoItems.push([t('info_phone'),esc(c.phone)]);
  if(c.console)     infoItems.push([t('info_console'),esc(c.console)]);
  if(c.webform)     infoItems.push([t('info_wf'),esc(c.webform)]);
  if(c.commercials) infoItems.push([t('info_comm'),esc(c.commercials)]);
  const infoHtml=infoItems.length?`<div class="dv-info-row">${infoItems.map(([l,v])=>`<div class="info-item"><div class="info-label">${l}</div><div class="info-value">${v}</div></div>`).join('')}</div>`:'';

  // Build section blocks
  // Group sections into their original row groups using the spreadsheet structure:
  // consecutive sections that appeared in the same green header row should be shown together
  // We detect row groups by pairing sections that were collected from the same spreadsheet row.
  // Since our parser collects section per column per green row, we need to re-group them.
  // Strategy: sections in the same "group" share a common row index. We stored them flat,
  // but we can infer groups because the Excel had at most 4 columns.
  // Re-group by chunks of up to 4 (the max cols seen: A,B,C,D)
  let secsHtml='';
  // Group sections into row-groups of up to 4
  const secGroups=[];
  for(let i=0;i<c.sections.length;){
    const group=[c.sections[i]];
    // Look ahead: if next section appears to be from same row (same non-content row), include it
    // Heuristic: group sections that are not "INFO GENERALI" type duplicates
    // Since sections alternate between different named headers, just group in chunks of 4
    let j=i+1;
    while(j<c.sections.length && j<i+4 && !isDuplicateGroupStart(c.sections,i,j)){
      group.push(c.sections[j]); j++;
    }
    secGroups.push(group);
    i=j;
  }

  secGroups.forEach(group=>{
    const cols=group.length;
    secsHtml+=`<div class="dv-section">`;
    secsHtml+=`<div class="dv-sec-hdr" style="--cols:${cols}">`;
    group.forEach(s=>{ secsHtml+=`<div class="dv-sec-hdr-cell">${esc(s.header)}</div>`; });
    secsHtml+=`</div>`;
    secsHtml+=`<div class="dv-sec-content" style="--cols:${cols}">`;
    group.forEach(s=>{ secsHtml+=`<div class="dv-sec-content-cell">${hi(s.content,terms)}</div>`; });
    secsHtml+=`</div></div>`;
  });

  // Approfondimenti table
  let approHtml='';
  if(c.approfondimenti && c.approfondimenti.length){
    approHtml=`<div class="dv-block-title">${t('sec_appro')}</div>
    <div class="dv-appro"><table>
      <thead><tr><td>${t('col_topic')}</td><td>${t('col_fp')}</td><td>${t('col_details')}</td></tr></thead>
      <tbody>
        ${c.approfondimenti.map(a=>`
          <tr>
            <td>${hi(a.topic,terms)}</td>
            <td>${hi(a.focal_point,terms)}</td>
            <td>${hi(a.details,terms)}</td>
          </tr>`).join('')}
      </tbody>
    </table></div>`;
  }

  // Buyer sections
  let buyerHtml='';
  if(c.buyer_sections && c.buyer_sections.length){
    const buyerGroups=[];
    for(let i=0;i<c.buyer_sections.length;){
      const group=[c.buyer_sections[i]];
      let j=i+1;
      while(j<c.buyer_sections.length && j<i+3){group.push(c.buyer_sections[j]);j++;}
      buyerGroups.push(group); i=j;
    }
    buyerHtml=`<div class="dv-block-title">${t('sec_buyer')}</div>`;
    buyerGroups.forEach(group=>{
      const cols=group.length;
      buyerHtml+=`<div class="dv-section">`;
      buyerHtml+=`<div class="dv-sec-hdr" style="--cols:${cols}">`;
      group.forEach(s=>{ buyerHtml+=`<div class="dv-sec-hdr-cell">${esc(s.header)}</div>`; });
      buyerHtml+=`</div><div class="dv-sec-content" style="--cols:${cols}">`;
      group.forEach(s=>{ buyerHtml+=`<div class="dv-sec-content-cell">${hi(s.content,terms)}</div>`; });
      buyerHtml+=`</div></div>`;
    });
  }

  // Links
  let linksHtml='';
  if(c.all_links && c.all_links.length){
    linksHtml=`<div class="dv-block-title">${t('sec_links')}</div>
    <div class="dv-links">
      <div class="dv-links-grid">
        ${c.all_links.map(l=>`<a class="dv-link" href="${esc(l)}" target="_blank" rel="noopener">${esc(l)}</a>`).join('')}
      </div>
    </div>`;
  }

  dv.innerHTML=`
    <div class="dv-top">
      <button class="back-btn" onclick="backToResults()">${t('back')}</button>
      <div class="dv-name">${esc(c.name)}</div>
    </div>
    ${infoHtml}
    ${secsHtml}
    ${approHtml}
    ${buyerHtml}
    ${linksHtml}
  `;
  dv.scrollTop=0;
}

function isDuplicateGroupStart(sections,groupStart,j){
  // Heuristic: a new group starts when we see a header that matches
  // typical "new row" patterns or when we've already seen this header in the current group
  const currentHeaders=new Set(sections.slice(groupStart,j).map(s=>s.header));
  return currentHeaders.has(sections[j].header);
}

function backToResults(){
  document.getElementById('detailView').classList.remove('open');
  document.getElementById('resultsArea').classList.remove('hidden');
  activeCustomer=null; setActiveSb(null);
  if(!query) showWelcome();
}

// ── Welcome ───────────────────────────────────────────────────────────────────
function showWelcome(){
  document.getElementById('detailView').classList.remove('open');
  document.getElementById('resultsArea').classList.remove('hidden');
  document.getElementById('searchMeta').textContent='';
  const area=document.getElementById('resultsArea');
  area.innerHTML=`
    <div class="state-screen">
      <div class="state-icon">🇮🇹</div>
      <div class="state-title">${t('welcome_title')}</div>
      <div class="state-sub">${t('welcome_sub')}</div>
      <div class="quick-label">${t('quick_lbl')}</div>
      <div class="quick-searches">${t('quick').map(q=>`<button class="qs-btn" onclick="setSearch('${q}')">${q}</button>`).join('')}</div>
    </div>`;
}

function setSearch(v){
  document.getElementById('searchInput').value=v;
  document.getElementById('clearBtn').style.display='flex';
  query=v; runSearch(v);
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('btnIT').classList.add('active');
  applyUI(); buildSb(CUSTOMERS); showWelcome();
});
</script>
