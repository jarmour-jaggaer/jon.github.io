• Domande sui contenuti dell'albo se non hanno Istanza.\nA) Telefonicamente diciamo di mandare la richiesta dal formonline selezionando l'opzione corretta.\nB)  Quando ci arriva il caso lo inoltriamo al referente associato al codice indicato nel caso:\n> Opzione  3.1_3.4 = se contiene una domanda sui contenuti senza specifica della categoria: => aliberatore@invitalia.it; kcolantonio@invitalia.it\n> Opzioni 3.3_3.5 _ 3.6_ 3.8_3.9_3.10 => aliberatore@invitalia.it\n> Opzione 3.7 => kcolantonio@invitalia.it\n• Modelli scaricabili dalla homepage del portale\n• Dettagli nel file \"Albo\" nella cartella procedure del ciente\n• Chi può registrarsi all'albo > dettagli in Approfondimenti", "links": []}, {"header": "GARE", "content": "•  Per domande degli oe poco chiare su gare e bandi possiamo chiedere chiarimenti a Invitalia: mlausi@invitalia.it; sroghini@invitalia.it\n• Nelle hp del portale > Documenti Utili > presente videoguida per compilazione DGUE", "links": []}, {"header": "NOTE PARTICOLARI", "content": "• Se riceviamo chiamate per Info sul  GDPR da parte di fornitori/utenti interni\n> inviare una email a dpo@jaggaer.com \n> inserendo nome e cognome del chiamante, riferimento telefonico ed email e breve sunto della richiesta\n• Piattaforma accetta nei singoli form/parametri file con dimensioni:\na) 150 MB: quali estensione b) 600 MB: .zip e .rar", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  Mixed> \nLa capogruppo può scegliere se selezionare \"Offline\" o \"registrato/registrato\" per gli altri utenti del gruppo", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "•  Recupero credenziali > PEC -> noreply-committenzapubblica@postacert.invitalia.it\n•  Le mail di invito a partecipare ad una  gara come mandante in una rti arrivano da: noreply-committenzapubblica@invitalia.it", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "PORTALE VACCINI", "focal_point": "• Portale Vaccini: https://personalevaccini..it", "details": "• Fornitori che si sono registrati per sbaglio su INGATE ma volevano registrarsi al portale https://personalevaccini.it\n> inviano richiesta disattivazione nel corpo del form\n> li disattiviamo e poi archiviamo\n• BANDO RECRUTAMENTO VACCINAZIONI ANTICOVID  (INFO al 14/12/2020)\n> rimandare al sito https://personalevaccini..it  e relativo Webform (arriva ad )", "links": ["https://personalevaccini..it", "https://personalevaccini.it"]}, {"topic": "ALBO", "focal_point": "• Chi può registrarsi all'albo", "details": "• Possono registrarsi all'albo\n> operatori economici: Forniture e Servizi \n> commissari che vogliono classificarsi per le professioni di interesse: 'Commissario Straordinario Unico per la Depurazione' e 'Servizi tecnici e Lavori'", "links": []}, {"topic": "ALBO", "focal_point": "• Dettagli sulla tipologia di albo", "details": "• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.", "links": []}], "buyer_sections": [], "all_links": ["https://ingate.invitalia.it", "https://personalevaccini..it", "https://personalevaccini.it"], "text": "Invitalia\nINFO GENERALI\n• Console: TLE\n• SF: INVITALIA SPA\n• SITO: https://ingate.invitalia.it\n• TELEFONO: 02 12 41 21 304\n• WEBMAIL: Contatti > Richiedi assistenza online (si può allegare)\n• COMMERCIALI: ccattaneo@jaggaer.com; gpizzinga@jaggaer.com; mpetriccione@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\nAUTOMATICA \n• Da Feb 2021: caricamento massivo di qualche migliaio di anagrafiche\n• Se chi vuole registrarsi per iscriversi all'albo Commissari non ha la P.iva può mettere il c.f. nel campo p.iva\n(Nei casi Salesforce vanno compilati come se fossero fornitori: Supplier Issue)\n• Se ci contattano OE non abilitati che hanno necessità di accedere al portale (x gare, albo ecc) > li abilitiamo\nMODIFICHE\n•  X Modifica Mail/Indirizzi/Referente : procedura Docusign\n• X Cancellazione/Modifica Ragione Sociale/Forma giuridica:\n> procedura docusign + una visura camerale dalla quale si evinca la modifica \n> concluso iter Docusign avvisiamo sempre per conoscenza RUP aliberatore@invitalia.it\n• Richieste di Modifica particolari (es: inserire P.Iva Europea, società che hanno preso la partita iva del gruppo ecc)\n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a: aliberatore@invitalia.it\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato                   \n• Contatti buyer x Docusign: aliberatore@invitalia.it\nIDM\n\nALBO\n• Inserimento categorie da Mie Categorie + Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > dettagli nel foglio \"Approfondimenti\"\n• Domande sui contenuti dell'albo se non hanno Istanza.\nA) Telefonicamente diciamo di mandare la richiesta dal formonline selezionando l'opzione corretta.\nB)  Quando ci arriva il caso lo inoltriamo al referente associato al codice indicato nel caso:\n> Opzione  3.1_3.4 = se contiene una domanda sui contenuti senza specifica della categoria: => aliberatore@invitalia.it; kcolantonio@invitalia.it\n> Opzioni 3.3_3.5 _ 3.6_ 3.8_3.9_3.10 => aliberatore@invitalia.it\n> Opzione 3.7 => kcolantonio@invitalia.it\n• Modelli scaricabili dalla homepage del portale\n• Dettagli nel file \"Albo\" nella cartella procedure del ciente\n• Chi può registrarsi all'albo > dettagli in Approfondimenti\nGARE\n•  Per domande degli oe poco chiare su gare e bandi possiamo chiedere chiarimenti a Invitalia: mlausi@invitalia.it; sroghini@invitalia.it\n• Nelle hp del portale > Documenti Utili > presente videoguida per compilazione DGUE\nNOTE PARTICOLARI\n• Se riceviamo chiamate per Info sul  GDPR da parte di fornitori/utenti interni\n> inviare una email a dpo@jaggaer.com \n> inserendo nome e cognome del chiamante, riferimento telefonico ed email e breve sunto della richiesta\n• Piattaforma accetta nei singoli form/parametri file con dimensioni:\na) 150 MB: quali estensione b) 600 MB: .zip e .rar\nBIDDING GROUP ATTIVO\n•  Mixed> \nLa capogruppo può scegliere se selezionare \"Offline\" o \"registrato/registrato\" per gli altri utenti del gruppo\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n•  Recupero credenziali > PEC -> noreply-committenzapubblica@postacert.invitalia.it\n•  Le mail di invito a partecipare ad una  gara come mandante in una rti arrivano da: noreply-committenzapubblica@invitalia.it\nIntegrazione con SAP\n\nPORTALE VACCINI\n• Portale Vaccini: https://personalevaccini..it\n• Fornitori che si sono registrati per sbaglio su INGATE ma volevano registrarsi al portale https://personalevaccini.it\n> inviano richiesta disattivazione nel corpo del form\n> li disattiviamo e poi archiviamo\n• BANDO RECRUTAMENTO VACCINAZIONI ANTICOVID  (INFO al 14/12/2020)\n> rimandare al sito https://personalevaccini..it  e relativo Webform (arriva ad )\nALBO\n• Chi può registrarsi all'albo\n• Possono registrarsi all'albo\n> operatori economici: Forniture e Servizi \n> commissari che vogliono classificarsi per le professioni di interesse: 'Commissario Straordinario Unico per la Depurazione' e 'Servizi tecnici e Lavori'\nALBO\n• Dettagli sulla tipologia di albo\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche."}, "IPZS": {"name": "IPZS", "sheet": "IPZS", "site": "", "phone": "02 12 41 21 303", "console": "GEO", "webform": "\"Richiedi assistenza online\"  (NON si può allegare)", "commercials": "fcasadei@jaggaer.com; cgaliano@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: GEO\n• SF: IST. POLIGR E ZECCA DELLO STATO SPA\n• 2 HOMEPAGE: possono accedere con le stesse credenziali da due url diversi ma il portale è lo stesso\n>  http://www.procurement.i  es migrazione) confrontarsi con Manuela ed eventualmente inoltrare a: monica.debonis@finconsgroup.com; diomede.illuzzi@finconsgroup.com; simone.crescenzi@finconsgroup.com", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "ALBO", "focal_point": "• Dettagli sulla tipologia di albo", "details": "• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}], "buyer_sections": [], "all_links": ["http://www.procurement.ipzs.it", "https://www.procurement.valoridicarta.it"], "text": "IPZS\nINFO GENERALI\n• Console: GEO\n• SF: IST. POLIGR E ZECCA DELLO STATO SPA\n• 2 HOMEPAGE: possono accedere con le stesse credenziali da due url diversi ma il portale è lo stesso\n>  http://www.procurement.ipzs.it \n> https://www.procurement.valoridicarta.it\n• TELEFONO: 02 12 41 21 303\n• INDIRIZZO MAIL:  Webform \"Richiedi assistenza online\"  (NON si può allegare)\n• COMMERCIALI: fcasadei@jaggaer.com; cgaliano@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\nAUTOMATICA \n> fine luglio 24 (26/07 ca.) verranno migrati circa 3000/5000 oe (sia anagrafica che qualifica)\nMODIFICHE\n• Chi ha le credenziali può aggiornare l'anagrafica in autonomia\n• Per aggiornamento dati non modificabili in autonomia seguiamo procedura Docusign\n• Contatti buyer x Docusign:\nIDM\n\nALBO\n• Inserimento categorie da Mie Categorie + Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > dettagli nel foglio \"Approfondimenti\"\n• A seguito dEella migrazione ora terminata:\n> OE \"Qualificati\": vedranno stato Qualificato ma alcuni DE incompleti > x aggiornarli devono inviare richiesta di sblocco\n> OE che erano Registrati al vecchio albo e non avevano completato iscrizione  + Nuovi Registrati > devono completare iscrizione all'albo\n• Se chedono info su \"Referenze commerciali\" non c'è un modello da scaricare. L'oe deve caricare un documento con le referenze \n> se vogliono dettagli devono inviare quesito tramite form di assistenza > inoltriamo a referenti contenuti albo\n• Nella sezione Documenti della hp gli oe possono scaricare \"FAQ Albo Fornitori\" :\n• Domande sui contenuti dell'albo:\n> possiamo lasciare agli oe la mail albo.fornitori@ipzs.it (è riportata nelle \"FAQ Albo fornitori\" della hp)\n> in alternativa inoltrare a: f.bauduin@ipzs.it; a.altamura@ipzs.it\nGARE\n• inbound\nNOTE PARTICOLARI\n• Per problematiche inerenti attività svolte da Fincons sul portale IPZS (ad es migrazione) confrontarsi con Manuela ed eventualmente inoltrare a: monica.debonis@finconsgroup.com; diomede.illuzzi@finconsgroup.com; simone.crescenzi@finconsgroup.com\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n\nIntegrazione con SAP\n\nALBO\n• Dettagli sulla tipologia di albo\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.\n\n•\n•\n\n•\n•"}, "Italferr": {"name": "Italferr", "sheet": "Italferr", "site": "https://www.acquistionline.italferr.it/web/login.html", "phone": "02 00 70 42 52", "console": "FER", "webform": "\"Richiedi assistenza online\" (si può allegare)", "commercials": "slasala@jaggaer.com; dmesghali@jaggaer.com; frighi@jaggaer.com; ctrovalusci@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: FER\n• SF: ITALFERR SPA\n• SITO: https://www.acquistionline.italferr.it/web/login.html\n• TELEFONO: 02 00 70 42 52\n• Webform \"Richiedi assistenza online\" (si può allegare) \n• Webmail gestita da Team Buyer: http://outlook.com/owa/gruppofs.it \n• COMMERCIALI: slasala@jaggaer.com; dmesghali@jaggaer.com; frighi@jaggaer.com; ctrovalusci@jaggaer.com", "links": ["https://www.acquistionline.italferr.it/web/login.html", "http://outlook.com/owa/gruppofs.it"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• Ricezione Report sul nostro indirizzo: \n- Modulo di adesione firmato digitalmente \n- Pec obbligatoria\n• Invio mail richiesta integrazione da portale. \n•  Fornitori stranieri che ci contattano perchè non abilitati per assenza firma digitale o f.d. non valida \n> la inoltriamo a Italferr: a.petruzzelli@italferr.it; g.ciampa@italferr.it; a.amicone@italferr.it\n> se ci autorizzano li abilitiamo\n• In caso di registrazione di Dipartimenti universitari leggere Approfondimenti\n• Da Ottobre 25 Vengono Migrati su Gruppo FS solo i Fornitori con stato Qualificato", "links": []}, {"header": "MODIFICHE", "content": "•  Si applica procedura Docusign\n• Contatti buyer x Docusign: a.amicone@italferr.it; l.blasi@italferr.it; v.bufano@italferr.it; d.marra@italferr.it; k.zucchi@italferr.it", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• Da Ottobre 2025 Categorie  NON PIU’ SELEZIONABILI su Italferr\n(c'è il tasto Scegli Categoria ma nessuna è selezionabile)\nA) Fornitori che hanno lo stato Qualificato vengono migrati su Gruppo FS dove si ritroveranno l’istanza con stato qualificato ma i form non compilati\nB) chi ha completato i form prima della migrazione Italferr concluderà la qualifica sul portale Italferr\nC) chi aveva scelto categorie ma non completato i form su Italferr dovrà avviare nuova qualifica su Gruppo FS\nD) chi non aveva mai scelto categorie su Italferr dovrà avviare nuova qualifica su Gruppo FS\n• Rfi 2 e 4 rimangono attive solo per scambi in essere coi fornitori invitati ma non dobbiamo più controllare le istanze che si creano giorno per giorno e invitare gli oe\n• Domande sui contenuti dell'albo\nA) se sono invitati alla rfi_4 possono mandar chiesta da Poste inoltriamo il contratto al buyer che lo ha richiesto chiedendo verifica\n> se è una registrazione NON richiesta da Poste inoltriamo ctr chiedendo verifica a s.deustacchio@posteitaliane.it; dariop.fores@posteitaliane.it  (non inviare email a Francesco Russo anche se è stato messo in copia dal fornitore).\n• Contratti senza firma digitale accettabili solo su richiesta esplicita di un buyer Poste che abbia messo in copia Fores e D'Eustacchio (o i referenti albo) \n> se non sono in copia rispondiamo al buyer, mettendo F e D in copia e chiedendo ulteriore conferma a procedere\n• NB:  Se nella voce “Account Principale” del ctr riportano i dati di una persona diversa dal legale firmatario lo accettiamo in quanto è specificato nel punto 2.4 del ctr stesso", "links": []}, {"topic": "REGISTRAZIONI-ABILITAZIONI", "focal_point": "•Abilitazione fornitori X SDA Trasporto Aereo Internazionale", "details": "• Fornitori X SDA Trasporto Aereo Internazionale (es. compagnie aeree straniere richiesta da Porrini, Fiorentini, Valentini, D'eustacchio):\n> x supporto outbound il buyer deve inviare file compilato coi dati (come tutte le richieste di registrazione)\n> se Poste specifica nella richiesta che deve essere abilitato per questo SDA > possiamo abilitare anche senza contratto, documento di identità, o firma digitale su ctr \n> se il buyer invia a noi il ctr del fornitore abilitiamo anche se non lo hanno caricato sul portale \n> se caricano ctr su portale barrando pagina 9 \"Trasporto aereo internazionale\" > GccBelgrado può accettare ctr non firmato digitalmente  (senza doc identità) (anche gli oe italiani)", "links": []}, {"topic": "MODIFICHE", "focal_point": "• Modifica Ragione Sociale e/o Forma Giuridica", "details": "• Variazione Ragione Sociale e forma giuridica di fornitore da abilitare\nseguiamo normale iter Docusign e facciamo modifica \n• Variazione Ragione Sociale e forma giuridica di fornitore Abilitato\n> procedura Docusign  + Camera di Commercio  + Atto notarile o verbale assemblea che attesti la modifica \n> ricevuta regolare mail con dettagli modifica + Camera comm e atto notarile (o verbale) \nA) chiedere autorizzazione \na :  ZEPPIER6@posteitaliane.it; \nCC:  manuela.ferracci@posteitaliane.it; michela.palombo@posteitaliane.it; martina.ribelli@posteitaliane.it; s.deustacchio@posteitaliane.it; dariop.fores@posteitaliane.it; \nB) Se è un'azienda di vigilanza/trasporto valori chiediamo autorizzazione a: a La Salvia  lasalvi6@posteitaliane.it e eventuali altri referenti di Postetutela che Fores ci indicherà. \n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato", "links": []}, {"topic": "MODIFICHE", "focal_point": "• Richieste di Cancellazione", "details": "• Cancellazione di fornitore da abilitare > seguiamo procedura Docusign\n• Cancellazione di fornitore Abilitato\n> inviamo all'oe primo template per avviare procedura docusign\n> inoltriamo richiesta dell'oe x avere autorizzazione a:\na :  ZEPPIER6@posteitaliane.it; \nCC:  manuela.ferracci@posteitaliane.it; michela.palombo@posteitaliane.it; martina.ribelli@posteitaliane.it; s.deustacchio@posteitaliane.it; dariop.fores@posteitaliane.it; \n> cancelliamo quando si è concluso iter docusign e il cliente ci ha autorizzato    \nB) Se è un'azienda di vigilanza/trasporto valori chiediamo autorizzazione a: a La Salvia  lasalvi6@posteitaliane.it e eventuali altri referenti di Postetutela che Fores ci indicherà.", "links": []}, {"topic": "MODIFICHE", "focal_point": "• Richieste di Modifiche dati degli OE arrivate dai Buyer", "details": "• RICHIESTE MODIFICHE GIUNTE DAI BUYER :   \n> se la richiesta viene dai Zeppieri, Fores, D'Eustacchio procediamo\n> se viene da altri buyer chiediamo conferma x procedere \nA:  ZEPPIER6@posteitaliane.it;   \nCC manuela.ferracci@posteitaliane.it;  michela.palombo@posteitaliane.it; martina.ribelli@posteitaliane.it; s.deustacchio@posteitaliane.it; dariop.fores@posteitaliane.it;", "links": []}, {"topic": "ALBO", "focal_point": "• Funzionamento area Albo con blocco/sblocco e Valutazioni", "details": "• Inserimento categorie da Albo Fornitori > Scegli la categoria > Espandi\n• A seguito completamento form, dalla mezzanotte, non è più possibile fare modifiche e si crea l’istanza nella sezione 'Valutazioni, ‘ Valutazioni di categoria’ .\n• Procedura per apportare modifiche quando hanno l’istanza già sbloccata: \n- cliccano su \"Albo fornitori\"\n- dal menu di sinistra \"Mia azienda\"\n- cliccano su 'Valutazioni'\n-'Valutazioni Modificabili' cliccano sotto la voce 'Azienda valutatrice'\n- cliccano sulla riga della categoria (in basso)\n- si apre il form in altro a destra 'Modifica'\n- 'Salva' e 'Invia form di categoria al valutatore'\n• La messaggistica nelle valutazioni si attiva se è Poste che manda un messaggio all'oe\n• Richieste sblocco e chiarimenti alla mail specifica di categoria specificata in hp", "links": []}], "buyer_sections": [], "all_links": ["https://www.posteprocurement.it/esop/tlp-host/public/poste/web/default.jst"], "text": "Poste Procurement\nINFO GENERALI\n• Console: TLP\n• SF: POSTE ITALIANE SPA\n• SITO: https://www.posteprocurement.it/esop/tlp-host/public/poste/web/default.jst\n• TELEFONO: 02 00 70 42 57 (x albo: 02 00 70 42 43)\n• Webform x gli oe:  \"Assistenza online\" (si può allegare) \n• Webform x i buyer: dalla 2° hp > cliccano una voce > cliccano \"i\" in alto a dx > cliccano \"Ricchiedi supporto\"\n• COMMERCIALI:  frighi@jaggaer.com;rfinelli@jaggaer.com; gpizzinga@jaggaer.com \n• BUYER DI RIFERIMENTO: (per nostro uso interno): s.deustacchio@posteitaliane.it; dariop.fores@posteitaliane.it\nREGISTRAZIONI-ABILITAZIONI\n• Ricezione Report gestito da GCC Belgrado: dettagli in Approfondimenti\n•  Il contratto deve avere 7 pagine (quello da 9 pagine è vecchio e non possiamo accettarlo)\n• Casistiche particolari relative alle firme digitali sui contratti in Approfondimenti\n• Fornitori X SDA Trasporto Aereo Internazionale (es. compagnie aeree straniere richiesta da Porrini, Fiorentini, Valentini, D'eustacchio): dettagli in Approfondimenti\n• Procedura Registrazione Poste dettagliata nel file \"Procedure Poste\" salvato in Sharepoint\n• I buyer possono chiederci di supportare i fornitori nell'iter di registrazione > procedure indicate nel file \"Procedure Poste\" salvato in Sharepoint\nMODIFICHE\n•  Posso modificare in autonomia tutti i dati in profilo utente (nome, cognome, contatti, user)\n• X Modifica Mail se non hanno credenziali > si applica procedura Docusign\n• Richieste Modifica Ragione Sociale/ forma giuridica > guardare Approfondimenti                                  \n• Richiesta di Cancellazione > guardare Approfondimenti   \n• Contatti buyer x Docusign : \na :  ZEPPIER6@posteitaliane.it; \nCC:  manuela.ferracci@posteitaliane.it;  michela.palombo@posteitaliane.it; martina.ribelli@posteitaliane.it; s.deustacchio@posteitaliane.it; dariop.fores@posteitaliane.it; \n• Contatti buyer x Docusign solo per aziende di Vigilanza : lasalvi6@posteitaliane.it\nIDM\n\nALBO\n• Inserimento categorie da Albo FornitorI  + Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > dettagli nel foglio \"Approfondimenti\"\n• NON c'è messaggistica nelle Valutazioni\n• Modelli albo in hp: > Albo Fornitori > Accedi all'Albo Fornitori di Poste Italiane\nA) Documenti generali per la Qualificazione\nB) Categorie Merceologiche e relativa documentazione > cliccare sulla categoria di competenza \n• Richieste sblocco /chiarimenti e segnalazioni di problemi tecnici con i modelli dell'albo (es: Questionario «ESG» non compilabile) rimandiamo alla mail specifica di categoria:\nalla mail specifica di categoria specificata in hp cliccando:\n> Albo Fornitori > Accedi all'Albo Fornitori di Poste Italiane >  Categorie Merceologiche e relativa documentazione > devono cliccare sulla categoria di competenza e trovano a mail\n> X Elenco Professionisti: professionisti@posteprocurement.it \n> X Albo ICT: alboict@posteprocurement.it \n> X VIGILANZA:  sdm_postetutela@posteprocurement.it\nGARE\n• Procedura Supporto outbound riportata nel file \"Procedure Poste\" presente in sharepoint nella cartella del cliente. \n• Bandi Pubblici > non è previsto alcun tipo di supporto outbound a gara in corso\n• Richieste Riapertura Gare ce ne occupiamo noi: vedere sezione Buyer\n• POSTE TUTELA > l'area Poste Aggiudicazione e Contratti si chiama \"Affidamento Servizi\"\n•  Modelli generici relativi alle gare scaricabili da hp (es: doc subappalto, dichiarazioni sostitutive): \n> Bandi, Avvisi e Modulistica > Modulistica a supporto della fase esecutiva > \n> Accedi alla Modulistica a supporto della fase esecutiva \n** Modelli Fase Esecutiva aggiornati a LUG 25 e avvisati oe con mail da sistema **\nNOTE PARTICOLARI\n• Dettagli sullo SDA (Sistema Dinamico di Acquisizione) nel file \"SDA_Procedura qualificazione\" nel file Procedure Poste nella cartella del cliente su sharepoint\n• Nuove istruzioni per la compilazione dei casi x supporto outbound riportati nel file Procedure Poste nella cartella del cliente su sharepoint\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n• Recupero credenziali > NO PEC info@posteprocurement.it\nIntegrazione con SAP\n\nREGISTRAZIONI-ABILITAZIONI\n•  Modalità registrazione, criteri di abilitazione\n• Ricezione Report gestito da GCC Belgrado:\n>  Contratto di registrazione compilato e firmato digitalmente (7 pag)\n>  Doc identità del legale rappresentante obbligatorio solo per fornitori per i quali Poste ci autorizza ad accettare contratto senza firma digitale (richiesta da o con in cc: Fores, D'eustacchio, referenti albo)\n>  Compilare gli altri dati obbligatori (es: motivo della registrazione, autorizzazione privacy ecc)\n•  Gcc Belgrado invia da portale le mail per segnalare eventuali problemi per la mancata abilitazione\nREGISTRAZIONI-ABILITAZIONI\n• Casistiche particolari relative alle Abilitazioni (contratto, firma digitale)\n• Contratti senza firma digitale accettabili su richiesta di Poste: dettagli in Approfondimenti\n• Contratti di stranieri con verifica della firma digitale non chiara (non rientrano in questo caso gli oe dello SDA Trasporto Aereo internazionale che hanno una loro procedura) \n> se è una registrazione richiesta da Poste inoltriamo il contratto al buyer che lo ha richiesto chiedendo verifica\n> se è una registrazione NON richiesta da Poste inoltriamo ctr chiedendo verifica a s.deustacchio@posteitaliane.it; dariop.fores@posteitaliane.it  (non inviare email a Francesco Russo anche se è stato messo in copia dal fornitore).\n• Contratti senza firma digitale accettabili solo su richiesta esplicita di un buyer Poste che abbia messo in copia Fores e D'Eustacchio (o i referenti albo) \n> se non sono in copia rispondiamo al buyer, mettendo F e D in copia e chiedendo ulteriore conferma a procedere\n• NB:  Se nella voce “Account Principale” del ctr riportano i dati di una persona diversa dal legale firmatario lo accettiamo in quanto è specificato nel punto 2.4 del ctr stesso\nREGISTRAZIONI-ABILITAZIONI\n•Abilitazione fornitori X SDA Trasporto Aereo Internazionale\n• Fornitori X SDA Trasporto Aereo Internazionale (es. compagnie aeree straniere richiesta da Porrini, Fiorentini, Valentini, D'eustacchio):\n> x supporto outbound il buyer deve inviare file compilato coi dati (come tutte le richieste di registrazione)\n> se Poste specifica nella richiesta che deve essere abilitato per questo SDA > possiamo abilitare anche senza contratto, documento di identità, o firma digitale su ctr \n> se il buyer invia a noi il ctr del fornitore abilitiamo anche se non lo hanno caricato sul portale \n> se caricano ctr su portale barrando pagina 9 \"Trasporto aereo internazionale\" > GccBelgrado può accettare ctr non firmato digitalmente  (senza doc identità) (anche gli oe italiani)\nMODIFICHE\n• Modifica Ragione Sociale e/o Forma Giuridica\n• Variazione Ragione Sociale e forma giuridica di fornitore da abilitare\nseguiamo normale iter Docusign e facciamo modifica \n• Variazione Ragione Sociale e forma giuridica di fornitore Abilitato\n> procedura Docusign  + Camera di Commercio  + Atto notarile o verbale assemblea che attesti la modifica \n> ricevuta regolare mail con dettagli modifica + Camera comm e atto notarile (o verbale) \nA) chiedere autorizzazione \na :  ZEPPIER6@posteitaliane.it; \nCC:  manuela.ferracci@posteitaliane.it; michela.palombo@posteitaliane.it; martina.ribelli@posteitaliane.it; s.deustacchio@posteitaliane.it; dariop.fores@posteitaliane.it; \nB) Se è un'azienda di vigilanza/trasporto valori chiediamo autorizzazione a: a La Salvia  lasalvi6@posteitaliane.it e eventuali altri referenti di Postetutela che Fores ci indicherà. \n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato\nMODIFICHE\n• Richieste di Cancellazione\n• Cancellazione di fornitore da abilitare > seguiamo procedura Docusign\n• Cancellazione di fornitore Abilitato\n> inviamo all'oe primo template per avviare procedura docusign\n> inoltriamo richiesta dell'oe x avere autorizzazione a:\na :  ZEPPIER6@posteitaliane.it; \nCC:  manuela.ferracci@posteitaliane.it; michela.palombo@posteitaliane.it; martina.ribelli@posteitaliane.it; s.deustacchio@posteitaliane.it; dariop.fores@posteitaliane.it; \n> cancelliamo quando si è concluso iter docusign e il cliente ci ha autorizzato    \nB) Se è un'azienda di vigilanza/trasporto valori chiediamo autorizzazione a: a La Salvia  lasalvi6@posteitaliane.it e eventuali altri referenti di Postetutela che Fores ci indicherà.\nMODIFICHE\n• Richieste di Modifiche dati degli OE arrivate dai Buyer\n• RICHIESTE MODIFICHE GIUNTE DAI BUYER :   \n> se la richiesta viene dai Zeppieri, Fores, D'Eustacchio procediamo\n> se viene da altri buyer chiediamo conferma x procedere \nA:  ZEPPIER6@posteitaliane.it;   \nCC manuela.ferracci@posteitaliane.it;  michela.palombo@posteitaliane.it; martina.ribelli@posteitaliane.it; s.deustacchio@posteitaliane , "details": "• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}], "buyer_sections": [], "all_links": ["https://eprocurement.quirinale.it"], "text": "PDR (Presidenza della Repubblica)\nINFO GENERALI\n• Console: PDR\n• SF: SEGRETARIATO GENERALE DELLA PRESIDENZA DELLA REPUBBLICA\n• SITO: https://eprocurement.quirinale.it \n• TELEFONO: 02 124 121 303\n• Webform: \"Richiedi assistenza online\" (SI può allegare) \n• COMMERCIALI: frighi@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n•  AUTOMATICA (nessun documento richiesto ai fini dell’abilitazione, registrato=abilitato)\nMODIFICHE\n•  Si applica procedura Docusign\n• Contatti buyer x Docusign:\nIDM\n\nALBO\n• Inserimento categorie da Mie Categorie + Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > dettagli in\"Approfondimenti\"      \n• Per informazioni sui contenuti far inviare ai fn  un messaggio da portale, se hanno già l’istanza creata. \n• Domande Contenuti Albo x chi non ha l'istanza inoltriamo a : a.mangia@quirinale.it; v.zallocco@quirinale.it; m.fagiolari@quirinale.it; f.salciccia@quirinale.it con in copia i sales\nGARE\n\nNOTE PARTICOLARI\n\nBIDDING GROUP ATTIVO\n•  OFFLINE di default:\nNon possono selezionare opzione \"registrato\"\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n•  Recupero credenziali da portale> PEC eprocurement@pec.quirinale.it\nDa console> non pec: eprocurement@quirinale.it\nIntegrazione con SAP\n\nALBO\n• Dettagli sulla tipologia di albo\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.\n\n•\n•\n\n•\n•"}, "RAV": {"name": "R.A.V. e S.I.T.M.B.", "sheet": "RAV", "site": "https://rav-sitmb.bravosolution.com/web/login.html", "phone": "02 124 121 303", "console": "TLE", "webform": "\"Richiedi Asssistenza\" (Si può allegare)", "commercials": "dmesghali@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLE\n• SF: Rav - Raccordo Autostradale Valle D'Aosta Spa\n• SITO: https://rav-sitmb.bravosolution.com/web/login.html\n• TELEFONO: 02 124 121 303 (visibile dopo che cliccano su Richiedi Asssistenza)\n• Webform: \"Richiedi Asssistenza\" (Si può allegare)\n• COMMERCIALI: dmesghali@jaggaer.com", "links": ["https://rav-sitmb.bravosolution.com/web/login.html"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• AUTOMATICA", "links": []}, {"header": "MODIFICHE", "content": "• Modifica di base: Si applica procedura Docusign\n• Modifica Ragione Sociale e Richieste Cancellazione: \n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a contatti buye rindicati in fondo\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato               \n• Contatti buyer x Docusign:  acquistieappalti@tmb.autostrade.it; acquistieappalti@rav.autostrade.it", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi\n• No form associati da compilare", "links": []}, {"header": "GARE", "content": "• Per casistiche particolari inerenti le gare chiediamo conferma a Luisa se sono da inoltrare a: carla.segantini@tmb.autostrade.it; elena.poggioli@rav.autostrade.it; luigi.bagnato@rav.autostrade.it", "links": []}, {"header": "NOTE PARTICOLARI", "content": "", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "esempio:\nREGISTRAZIONI-ABILITAZIONI", "focal_point": "esempio\n• Richieste abilitazioni da buyer", "details": "•", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}], "buyer_sections": [], "all_links": ["https://rav-sitmb.bravosolution.com/web/login.html"], "text": "R.A.V. e S.I.T.M.B.\nINFO GENERALI\n• Console: TLE\n• SF: Rav - Raccordo Autostradale Valle D'Aosta Spa\n• SITO: https://rav-sitmb.bravosolution.com/web/login.html\n• TELEFONO: 02 124 121 303 (visibile dopo che cliccano su Richiedi Asssistenza)\n• Webform: \"Richiedi Asssistenza\" (Si può allegare)\n• COMMERCIALI: dmesghali@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• AUTOMATICA\nMODIFICHE\n• Modifica di base: Si applica procedura Docusign\n• Modifica Ragione Sociale e Richieste Cancellazione: \n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a contatti buye rindicati in fondo\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato               \n• Contatti buyer x Docusign:  acquistieappalti@tmb.autostrade.it; acquistieappalti@rav.autostrade.it\nIDM\n\nALBO\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi\n• No form associati da compilare\nGARE\n• Per casistiche particolari inerenti le gare chiediamo conferma a Luisa se sono da inoltrare a: carla.segantini@tmb.autostrade.it; elena.poggioli@rav.autostrade.it; luigi.bagnato@rav.autostrade.it\nNOTE PARTICOLARI\n\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n\nIntegrazione con SAP\n\nesempio:\nREGISTRAZIONI-ABILITAZIONI\nesempio\n• Richieste abilitazioni da buyer\n•\n\n•\n•\n\n•\n•"}, "RFI": {"name": "RFI - Rete Ferroviaria Italiana", "sheet": "RFI", "site": "https://www.acquistionlinerfi.it/web/login.html", "phone": "02 00 70 42 52", "console": "RFI", "webform": "\"Richiedi assistenza online\" (SI PU0' ALLEGARE)", "commercials": "slasala@jaggaer.com; frighi@jaggaer.com; ctrovalusci@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: RFI\n• SF: RETE FERROVIARIA ITALIANA SPA\n• SITO: https://www.acquistionlinerfi.it/web/login.html\n• TELEFONO:  02 00 70 42 52\n• Webform \"Richiedi assistenza online\" (SI PU0' ALLEGARE)  \n• COMMERCIALI: slasala@jaggaer.com; frighi@jaggaer.com; ctrovalusci@jaggaer.com", "links": ["https://www.acquistionlinerfi.it/web/login.html"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• Abilitazione a seguito di controlli:\n> Modulo di adesione firmato digitalmente \n> Pec obbligatoria \n> Invio mail richiesta integrazione da portale\n• Gestione problemi o assenza firma digitale in Approdondimenti\n• Se RFI ci chiede di abilitare un OE \"nelle more di quanto ha caricato\" > abilitamo anche senza modulo di adesione o se c'è qualsiasi altro problema relativo alla registrazione\n• Se gli OE chiedono di fare più registrazioni con stessa p.iva e c.f. (ad es Dipartimenti Universitari) > vedere Approfondimenti", "links": []}, {"header": "MODIFICHE", "content": "•  Si applica procedura Docusign\n• Per casistiche particolari (ad es: correzione p.iva/c.f.) \n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a contatti cliente in fondo\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato            \n• Contatti buyer x Docusign: fl.morelli@rfi.it; gu.scotti@rfi.it; f.innecco@rfi.it; s.fidanza@rfi.it", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "•  Sistema di qualificazione/Categorie Scelte > iter qualifica in Approfondimenti\n• Domande inerenti l'albo:\na) Quando non hanno Istanza > nella hp cliccare  Sistemi di Qualificazione > Contatti > compilare il Webform che arriva a RFI\nb) L’area messaggi della RDI va utilizzata solo  per domande o chiarimenti in merito all’iter cui la RDI si riferisce \nc) Per nuove eventuali richieste devono mandare un messaggio dalla Valutazione della Categoria relativa.\n> Sistemi di qualificazione/Valutazioni > Valutazioni di categoria > cliccano sulla categoria \n(NB se devono rinnovare l'iscrizione RFI li inviterà ad una nuova RDI dove aggiorneranno il questionario)", "links": []}, {"header": "GARE", "content": "• Rdo si chiamano Fasi di Offerta\n• Rdi si chiamano Fasi di Prequalifica\n•  Dimensioni massime file caricabili\n> rar: 300 MB  > zip: 300 MB \n> doc:200 MB  > docx:200 MB\n> pdf:200 MB  > xls:200 MB  > xlsx:200 MB\n> p7m:200 MB  > 7z:300 MB", "links": []}, {"header": "NOTE PARTICOLARI", "content": "", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "•  Recupero credenziali > PEC", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "REGISTRAZIONI-ABILITAZIONI", "focal_point": "• Modulo di adesione: gestione problemi o assenza firma digitale", "details": "A)  Se un fornitore che ha ricevuto da noi segnalazione che la firma d. non è valida insiste perché deve partecipare a gara:\n> far presente a Rfi il caso dell’oe: fl.morelli@rfi.it; gu.scotti@rfi.it; f.innecco@rfi.it; s.fidanza@rfi.it\nB)  Fornitori Stranieri con modulo con firma d. non valida per il nostro sistema:\n> inoltriamo il documento firmato e chiedendo se possiamo accettarlo a: fl.morelli@rfi.it; gu.scotti@rfi.it; f.innecco@rfi.it; s.fidanza@rfi.it", "links": []}, {"topic": "REGISTRAZIONI-ABILITAZIONI", "focal_point": "• Registrazione Dipartimenti Universitari e similari (se vogliono fare più registrazioni con stessi dati fiscali)", "details": "NON E' PIU' AMMESSO FARE DOPPIE REGISTRAZIONI INDICANDO UN VALORE ERRATO NEL C.F. E P.IVA\n• Se vogliono accedere al portale con più utenze devono creare sottutenze accedendo con l'Utente Principale", "links": []}, {"topic": "ALBO", "focal_point": "• Iter Qualifica", "details": "•  Sistema di qualificazione/Categorie Scelte > scegli categoria > espandi \n> il fornitore compila il form che presenta 2 domande, salva e attende da parte di RFI l’invito alla RDI per l’avvio dell’iter di qualificazione.\n> le due domande presente nei form sono: 1) Confermi di volerti iscrivere alla presente categoria? 2) caricare \"l'attestazione di versamento per la qualificazione\"\n> al completamento dei form di categoria si crea l'istanza nella sezione Valutazioni  (in automatico o manualmente in determinati casi)\n> poi RFI li invita a una rfi dove completare iscrizione al SQ (può essere riferito a una o più categorie)", "links": []}], "buyer_sections": [], "all_links": ["https://www.acquistionlinerfi.it/web/login.html"], "text": "RFI - Rete Ferroviaria Italiana\nINFO GENERALI\n• Console: RFI\n• SF: RETE FERROVIARIA ITALIANA SPA\n• SITO: https://www.acquistionlinerfi.it/web/login.html\n• TELEFONO:  02 00 70 42 52\n• Webform \"Richiedi assistenza online\" (SI PU0' ALLEGARE)  \n• COMMERCIALI: slasala@jaggaer.com; frighi@jaggaer.com; ctrovalusci@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\n• Abilitazione a seguito di controlli:\n> Modulo di adesione firmato digitalmente \n> Pec obbligatoria \n> Invio mail richiesta integrazione da portale\n• Gestione problemi o assenza firma digitale in Approdondimenti\n• Se RFI ci chiede di abilitare un OE \"nelle more di quanto ha caricato\" > abilitamo anche senza modulo di adesione o se c'è qualsiasi altro problema relativo alla registrazione\n• Se gli OE chiedono di fare più registrazioni con stessa p.iva e c.f. (ad es Dipartimenti Universitari) > vedere Approfondimenti\nMODIFICHE\n•  Si applica procedura Docusign\n• Per casistiche particolari (ad es: correzione p.iva/c.f.) \n> inviamo all'oe primo template per avviare procedura docusign\n> quando l'oe ci invia mail con dettaglio delle info da modificare la inoltriamo x autorizzazione a contatti cliente in fondo\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato            \n• Contatti buyer x Docusign: fl.morelli@rfi.it; gu.scotti@rfi.it; f.innecco@rfi.it; s.fidanza@rfi.it\nIDM\n\nALBO\n•  Sistema di qualificazione/Categorie Scelte > iter qualifica in Approfondimenti\n• Domande inerenti l'albo:\na) Quando non hanno Istanza > nella hp cliccare  Sistemi di Qualificazione > Contatti > compilare il Webform che arriva a RFI\nb) L’area messaggi della RDI va utilizzata solo  per domande o chiarimenti in merito all’iter cui la RDI si riferisce \nc) Per nuove eventuali richieste devono mandare un messaggio dalla Valutazione della Categoria relativa.\n> Sistemi di qualificazione/Valutazioni > Valutazioni di categoria > cliccano sulla categoria \n(NB se devono rinnovare l'iscrizione RFI li inviterà ad una nuova RDI dove aggiorneranno il questionario)\nGARE\n• Rdo si chiamano Fasi di Offerta\n• Rdi si chiamano Fasi di Prequalifica\n•  Dimensioni massime file caricabili\n> rar: 300 MB  > zip: 300 MB \n> doc:200 MB  > docx:200 MB\n> pdf:200 MB  > xls:200 MB  > xlsx:200 MB\n> p7m:200 MB  > 7z:300 MB\nNOTE PARTICOLARI\n\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n•  Recupero credenziali > PEC\nIntegrazione con SAP\n\nREGISTRAZIONI-ABILITAZIONI\n• Modulo di adesione: gestione problemi o assenza firma digitale\nA)  Se un fornitore che ha ricevuto da noi segnalazione che la firma d. non è valida insiste perché deve partecipare a gara:\n> far presente a Rfi il caso dell’oe: fl.morelli@rfi.it; gu.scotti@rfi.it; f.innecco@rfi.it; s.fidanza@rfi.it\nB)  Fornitori Stranieri con modulo con firma d. non valida per il nostro sistema:\n> inoltriamo il documento firmato e chiedendo se possiamo accettarlo a: fl.morelli@rfi.it; gu.scotti@rfi.it; f.innecco@rfi.it; s.fidanza@rfi.it\nREGISTRAZIONI-ABILITAZIONI\n• Registrazione Dipartimenti Universitari e similari (se vogliono fare più registrazioni con stessi dati fiscali)\nNON E' PIU' AMMESSO FARE DOPPIE REGISTRAZIONI INDICANDO UN VALORE ERRATO NEL C.F. E P.IVA\n• Se vogliono accedere al portale con più utenze devono creare sottutenze accedendo con l'Utente Principale\nALBO\n• Iter Qualifica\n•  Sistema di qualificazione/Categorie Scelte > scegli categoria > espandi \n> il fornitore compila il form che presenta 2 domande, salva e attende da parte di RFI l’invito alla RDI per l’avvio dell’iter di qualificazione.\n> le due domande presente nei form sono: 1) Confermi di volerti iscrivere alla presente categoria? 2) caricare \"l'attestazione di versamento per la qualificazione\"\n> al completamento dei form di categoria si crea l'istanza nella sezione Valutazioni  (in automatico o manualmente in determinati casi)\n> poi RFI li invita a una rfi dove completare iscrizione al SQ (può essere riferito a una o più categorie)"}, "Risanamento": {"name": "Risanamento", "sheet": "Risanamento", "site": "https://procurement.risanamentospa.com", "phone": "02 124 121 303", "console": "TLE", "webform": "\"Richiedi assistenza online\" (SI Può allegare)", "commercials": "sgalassi@jaggaer.com; emangini@jaggaer.com; c-mpetriccione@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLE\n• SF: RISANAMENTO SPA\n• SITO: https://procurement.risanamentospa.com\n• TELEFONO: 02 124 121 303\n• Webform: \"Richiedi assistenza online\" (SI Può allegare)\n• COMMERCIALI: sgalassi@jaggaer.com; emangini@jaggaer.com; c-mpetriccione@jaggaer.com", "links": ["https://procurement.risanamentospa.com"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "• ABILITAZIONE AUTOMATICA;\n> il fornitore deve accettare a video l’informativa privacy, compilare i dati di anagrafica società e utente \n> allegare il Modulo di adesione al portale sottoscritto digitalmente e copia carta d’identità. ati per bonifico sul portale > Homepage > Documenti >  'Albero delle categorie merceologiche'.\n• Per info su contenuti albo dare l'indirizzo mrimo@sacbo.it\nGARE\n• Modulo Contract attivo : Contratti >  click sul contratto > Gestione contenuti>  Informazioni aggiuntive\nNOTE PARTICOLARI\n• 150 oe circa abilitati massivamente con dati anagrafici inseriti da sacbo, se chiamano per registrarsi/modificare i dati, solita procedura per modifiche\n\n• Modulo Contract attivo : Contratti >  click sul contratto > Gestione contenuti>  Informazioni aggiuntive\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n•   Recupero credenziali > no pec\nacquistisacbo@bravosolution.com\nIntegrazione con SAP\n\nesempio:\nREGISTRAZIONI-ABILITAZIONI\nesempio\n• Richieste abilitazioni da buyer\n•\n\n•\n•\n\n•\n•"}, "Sardegnacat": {"name": "SardegnaCAT", "sheet": "Sardegnacat", "site": "https://www.sardegnacat.it/esop/ita-ras-host/public/web/login.jst", "phone": "800 212036", "console": "Sardegna", "webform": "clicare su Contatti > cliccare su tasti blu :", "commercials": "ccattaneo@jaggaer.com; sgalassi@jaggaer.com; cgaliano@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: Sardegna\n•  Console provvisoria: https://console-ras.app.jaggaer.com/esop/guest/login.do\n• SF: REGIONE AUTONOMA DELLA SARDEGNAREGIONE AUTONOMA DELLA SARDEGNA\n•  SITO: https://www.sardegnacat.it/esop/ita-ras-host/public/web/login.jst\n• TELEFONO: 800 212036\n• Webform : clicare su Contatti > cliccare su tasti blu :\n> x OE: \"Richieste di supporto e chiarimenti per le Imprese\" (SI può allegare)\n> x Buyer: \"Richieste di supporto e chiarimenti per la Pubblica Amministrazione e per gli Enti Locali\" (non si può allegare)     \n•  COMMERCIALI: ccattaneo@jaggaer.com; sgalassi@jaggaer.com; cgaliano@jaggaer.com", "links": ["https://console-ras.app.jaggaer.com/esop/guest/login.do", "https://www.sardegnacat.it/esop/ita-ras-host/public/web/login.jst"]}, {"header": "REGISTRAZIONI-ABILITAZIONI", "content": "NOVITA' DIC 24: Nuovo Portale (non gestito da noi)\n> Il link  \"Registrazione al nuovo Portale\" presente nella nostra hp è relativo al nuovo portale\n> Il link per registrarsi al nostro portale si trova cliccando su \"Servizi per le imprese\" > \"Registrazione al Portale e Iscrizione al Mercato elettronico\" \n\n• Se un azienda non riesce a registrarsi sul nostro portale perchè fa parte di un Gruppo già registrato inoltrare la segnalazione a: sardegnacat@regione.sardegna.it", "links": []}, {"header": "MODIFICHE", "content": "• Modifica mail nel campo \"Indirizzo di posta elettronica\"\n> se vogliono inserire mail già riportata nel campo \"E-mail amministrativa\" > basta che ci scrivano la richiesta nel corpo di una mail/form assistenza o in chat e facciamo la modifica\n> se chiedono di inserire mail NON riportata nel campo \"E-mail amministrativa\" > si applica procedura Docusign\n• Modifica altri campi anagrafica non modificabili dagli oe > si applica procedura Docusign\n• Richieste Cancellazione > conclusa procedura Docusign selezionare Stato > Modifica Stato > \"Disattiva\" \n• GRUPPO IVA: Se un azienda non riesce a registrarsi perchè fa parte di un Gruppo già registrato inoltrare la segnalazione a: sardegnacat@regione.sardegna.it \n• Contatti buyer x Docusign: sardegnacat@regione.sardegna.it", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• Mie Categorie > Aggiungi categoria > Espandi\n• No BLOCCO/SBLOCCO\n• x Domande sui Contenuti dell'albo > riferiamo di contattare i riferimenti (mail/telefono) della Centrale Regionale di Committenza presenti nella sezione \"Contatti\" nella homepage", "links": []}, {"header": "GARE", "content": "• Bandi PUBBLICI: \n> Gare in busta chiusa rdo > Gara in busta chiusa (RDO) per tutti > Esprimi interesse\n> RDI > Richiesta di Informazioni per tutti\n• se OE ha tasto Esprimi interesse, ci clicca e compare testo \"contattare MOC\"\n> verificare in \"Fornitori\" se quell'OE era stato invitato dalla SA e poi rimosso da loro\n> in tal caso dirgli di contattare la SA\n• Verbali relativi a RDO > devono cliccare sulla gara in questione> cliccare su \"dettagli rdo\" > su \"report\". Il verbale è allegato qui.\n• Dimensioni massime file (soggette a modifiche) \n> dire sempre di fare riferimento alle dimensioni specificate nei doc di gara perchè le varie s.a. esprimono preferenze diverse da gara a gara\n> Singolo upload - file generici : 100MB\n> Singolo Upload - file rar, zip e mp4 : 300MB\n> Spazio totale area generica - limite totale nell'area generica allegati : 3GB (non c’è limite al numero di file caricabili l’importante è non superare il limite totale di capienza)", "links": []}, {"header": "NOTE PARTICOLARI", "content": "• SPID: X  accesso al portale con SPID dettagli in Approfondimenti                                                                                                                                                                                                      \n• NB. Gli enti che chiamano per richieste sull'utilizzo del portale possono essere supportati da noi al telefono o mandare richiesta tramite form online (mail arriva a mocsardegna@bravosolution.com).", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  Mixed> \nLa capogruppo può scegliere se selezionare \"Offline\" o \"registrato/registrato\" per gli altri utenti del gruppo", "links": []}, {"header": "ALTRE AREE (Convenzioni ecc)", "content": "• Modulo Convenzioni non più attivo sul nostro portale\n> li rimandiamo al nuovo portale (c'è apposito template)", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "• Prima Password > NON PEC\n• Recupero credenziali > NON PEC ( catsardegna@regione.sardegna.it)\n• Inviti da gare per le quali scelgono opzione pec: sardegnacat@pec.regione.sardegna.it", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "SPID", "focal_point": "• Info generali per Accesso con SPID\n• Problemi di accesso con SPID", "details": "• Per poter effettuare l'accesso con SPID l'utente deve essere già registrato sul nostro portale e avere una username e password \n• Chi è dotato di SPID (lo spid è intestato alle persone) può usarlo per fare accesso al portale tramite il tasto \"Clicca qui per accedere con SPID o TS-CNS/ Accedi con SPID o LoginFVG\"\n> viene reindirizzato a un sistema di autenticazione esterno al nostro portale\n> al primo accesso dovrà inserire le normali credenziali di accesso al portale \n> in questo modo avviene l'associazione con l'utenza che hanno sul portale\n• i buyer possono associare il proprio spid a più profili che hanno su enti diversi (non sappiamo se possono gli oe)\n> \"Clicca qui per accedere con SPID o TS-CNS/ Accedi con SPID o LoginFVG\"\n> vedono eventuali profili che hanno già associato ma hanno comunque la sezione per inserire le credenziali del portale in modo da associare lo spid ad altri profili\n• PROBLEMI DI ACCESSO: se segnalano problemi di accesso con SPID o CNS > verifichiamo che l'oe sia registrato sul portale \n> se non lo è, deve fare normale registrazione prima di accedere con questi metodi\n> se è registrato consiglia di cercare supporto presente sui siti SPID e CNS o a chi gli ha fornito la chiavetta", "links": []}, {"topic": "SPID", "focal_point": "• Procedura per SGANCIARE SPID associato a una (o più) utenze", "details": "• se vogliono SGANCIARE un'utenza SPID dobbiamo avviare iter Docusign usando apposita bozza presente nel file Template \n>  gli oe dovranno indicare:  ragione sociale/p.iva azienda e a chi è intestato lo SPID da sganciare\n> i buyer dovranno indicare: nome e cognome, ente di appartenenza e a chi è intestato lo SPID da sganciare\n> ricevuta richiesta se ne occupa chi può aprire ticket all'IT", "links": []}, {"topic": "CONVENZIONI", "focal_point": "• FAQ Convenzioni", "details": "• FAQ Convenzioni:\n> Se un OE o buyer segnala problemi tecnici relativi alle Convenzioni del nostro portale (anche problemi di accesso alla sezione dedicata) chiediamo di mandarci segnalazione scritta (gestione team buyer)\n> se chiedono istruzioni su come fare una Convenzione rimandare al manuale > per eventuali problemi in merito farsi mandare mail (gestione team buyer)\n> se chiedono come visualizzare un ODF su nostro portale > farsi mandare mail (gestione team buyer)\n> X Info generiche sulle Convenzioni/domande sui contenuti di una specifica convenzione/istruzioni su come visualizzarle:  rimandare alla Regione\n> Fornitori che vogliono proporsi per il Catalogo  rimandare alla Regione", "links": []}], "buyer_sections": [], "all_links": ["https://console-ras.app.jaggaer.com/esop/guest/login.do", "https://www.sardegnacat.it/esop/ita-ras-host/public/web/login.jst"], "text": "SardegnaCAT\nINFO GENERALI\n• Console: Sardegna\n•  Console provvisoria: https://console-ras.app.jaggaer.com/esop/guest/login.do\n• SF: REGIONE AUTONOMA DELLA SARDEGNAREGIONE AUTONOMA DELLA SARDEGNA\n•  SITO: https://www.sardegnacat.it/esop/ita-ras-host/public/web/login.jst\n• TELEFONO: 800 212036\n• Webform : clicare su Contatti > cliccare su tasti blu :\n> x OE: \"Richieste di supporto e chiarimenti per le Imprese\" (SI può allegare)\n> x Buyer: \"Richieste di supporto e chiarimenti per la Pubblica Amministrazione e per gli Enti Locali\" (non si può allegare)     \n•  COMMERCIALI: ccattaneo@jaggaer.com; sgalassi@jaggaer.com; cgaliano@jaggaer.com\nREGISTRAZIONI-ABILITAZIONI\nNOVITA' DIC 24: Nuovo Portale (non gestito da noi)\n> Il link  \"Registrazione al nuovo Portale\" presente nella nostra hp è relativo al nuovo portale\n> Il link per registrarsi al nostro portale si trova cliccando su \"Servizi per le imprese\" > \"Registrazione al Portale e Iscrizione al Mercato elettronico\" \n\n• Se un azienda non riesce a registrarsi sul nostro portale perchè fa parte di un Gruppo già registrato inoltrare la segnalazione a: sardegnacat@regione.sardegna.it\nMODIFICHE\n• Modifica mail nel campo \"Indirizzo di posta elettronica\"\n> se vogliono inserire mail già riportata nel campo \"E-mail amministrativa\" > basta che ci scrivano la richiesta nel corpo di una mail/form assistenza o in chat e facciamo la modifica\n> se chiedono di inserire mail NON riportata nel campo \"E-mail amministrativa\" > si applica procedura Docusign\n• Modifica altri campi anagrafica non modificabili dagli oe > si applica procedura Docusign\n• Richieste Cancellazione > conclusa procedura Docusign selezionare Stato > Modifica Stato > \"Disattiva\" \n• GRUPPO IVA: Se un azienda non riesce a registrarsi perchè fa parte di un Gruppo già registrato inoltrare la segnalazione a: sardegnacat@regione.sardegna.it \n• Contatti buyer x Docusign: sardegnacat@regione.sardegna.it\nIDM\n\nALBO\n• Mie Categorie > Aggiungi categoria > Espandi\n• No BLOCCO/SBLOCCO\n• x Domande sui Contenuti dell'albo > riferiamo di contattare i riferimenti (mail/telefono) della Centrale Regionale di Committenza presenti nella sezione \"Contatti\" nella homepage\nGARE\n• Bandi PUBBLICI: \n> Gare in busta chiusa rdo > Gara in busta chiusa (RDO) per tutti > Esprimi interesse\n> RDI > Richiesta di Informazioni per tutti\n• se OE ha tasto Esprimi interesse, ci clicca e compare testo \"contattare MOC\"\n> verificare in \"Fornitori\" se quell'OE era stato invitato dalla SA e poi rimosso da loro\n> in tal caso dirgli di contattare la SA\n• Verbali relativi a RDO > devono cliccare sulla gara in questione> cliccare su \"dettagli rdo\" > su \"report\". Il verbale è allegato qui.\n• Dimensioni massime file (soggette a modifiche) \n> dire sempre di fare riferimento alle dimensioni specificate nei doc di gara perchè le varie s.a. esprimono preferenze diverse da gara a gara\n> Singolo upload - file generici : 100MB\n> Singolo Upload - file rar, zip e mp4 : 300MB\n> Spazio totale area generica - limite totale nell'area generica allegati : 3GB (non c’è limite al numero di file caricabili l’importante è non superare il limite totale di capienza)\nNOTE PARTICOLARI\n• SPID: X  accesso al portale con SPID dettagli in Approfondimenti                                                                                                                                                                                                      \n• NB. Gli enti che chiamano per richieste sull'utilizzo del portale possono essere supportati da noi al telefono o mandare richiesta tramite form online (mail arriva a mocsardegna@bravosolution.com).\nBIDDING GROUP ATTIVO\n•  Mixed> \nLa capogruppo può scegliere se selezionare \"Offline\" o \"registrato/registrato\" per gli altri utenti del gruppo\nALTRE AREE (Convenzioni ecc)\n• Modulo Convenzioni non più attivo sul nostro portale\n> li rimandiamo al nuovo portale (c'è apposito template)\nMAIL CHE PARTONO DA SISTEMA\n• Prima Password > NON PEC\n• Recupero credenziali > NON PEC ( catsardegna@regione.sardegna.it)\n• Inviti da gare per le quali scelgono opzione pec: sardegnacat@pec.regione.sardegna.it\nIntegrazione con SAP\n\nSPID\n• Info generali per Accesso con SPID\n• Problemi di accesso con SPID\n• Per poter effettuare l'accesso con SPID l'utente deve essere già registrato sul nostro portale e avere una username e password \n• Chi è dotato di SPID (lo spid è intestato alle persone) può usarlo per fare accesso al portale tramite il tasto \"Clicca qui per accedere con SPID o TS-CNS/ Accedi con SPID o LoginFVG\"\n> viene reindirizzato a un sistema di autenticazione esterno al nostro portale\n> al primo accesso dovrà inserire le normali credenziali di accesso al portale \n> in questo modo avviene l'associazione con l'utenza che hanno sul portale\n• i buyer possono associare il proprio spid a più profili che hanno su enti diversi (non sappiamo se possono gli oe)\n> \"Clicca qui per accedere con SPID o TS-CNS/ Accedi con SPID o LoginFVG\"\n> vedono eventuali profili che hanno già associato ma hanno comunque la sezione per inserire le credenziali del portale in modo da associare lo spid ad altri profili\n• PROBLEMI DI ACCESSO: se segnalano problemi di accesso con SPID o CNS > verifichiamo che l'oe sia registrato sul portale \n> se non lo è, deve fare normale registrazione prima di accedere con questi metodi\n> se è registrato consiglia di cercare supporto presente sui siti SPID e CNS o a chi gli ha fornito la chiavetta\nSPID\n• Procedura per SGANCIARE SPID associato a una (o più) utenze\n• se vogliono SGANCIARE un'utenza SPID dobbiamo avviare iter Docusign usando apposita bozza presente nel file Template \n>  gli oe dovranno indicare:  ragione sociale/p.iva azienda e a chi è intestato lo SPID da sganciare\n> i buyer dovranno indicare: nome e cognome, ente di appartenenza e a chi è intestato lo SPID da sganciare\n> ricevuta richiesta se ne occupa chi può aprire ticket all'IT\nCONVENZIONI\n• FAQ Convenzioni\n• FAQ Convenzioni:\n> Se un OE o buyer segnala problemi tecnici relativi alle Convenzioni del nostro portale (anche problemi di accesso alla sezione dedicata) chiediamo di mandarci segnalazione scritta (gestione team buyer)\n> se chiedono istruzioni su come fare una Convenzione rimandare al manuale > per eventuali problemi in merito farsi mandare mail (gestione team buyer)\n> se chiedono come visualizzare un ODF su nostro portale > farsi mandare mail (gestione team buyer)\n> X Info generiche sulle Convenzioni/domande sui contenuti di una specifica convenzione/istruzioni su come visualizzarle:  rimandare alla Regione\n> Fornitori che vogliono proporsi per il Catalogo  rimandare alla Regione"}, "SAT": {"name": "SAT-Società Autostrada Tirrenica", "sheet": "SAT", "site": "https://sat.bravosolution.com/web/login.html", "phone": "02 124 121 303", "console": "TLE", "webform": "\"Richiedi Assistenza\" (Si può allegare)", "commercials": "dmesghali@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLE\n• SF: Società Autostrada Tirrenica S.p.A.\n• SITO: ht ra la inoltriamo x autorizzazione a contatti in fondo\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato                         \n• Contatti buyer x Docusign: gbortolato@grupposave.com; spanato@aeroportoverona.it;amiele@grupposave.com", "links": []}, {"header": "IDM", "content": "", "links": []}, {"header": "ALBO", "content": "• Maggio 25_Hanno inviato comunicazione su nuovo Regolamento. Se chedono info in merito:\n> gli diciamo di prendere visione del Regolamento in HP \n> per dubbi lasciamo mail qualifica.portaleacquisti@grupposave.com  \n• Inserimento categorie da Mie Categorie + Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > dettagli in \"Approfondimenti\" \n> Valutazioni di Qualifica > x aggiornare i dati quando li hanno sbloccati\n> Valutazioni di Categoria > x inviare messaggi\n• Fattura Corrispettivo > dettagli in Approfondimento\n• Domande sui contenuti dell'albo  se non hanno istanza \n> possiamo lasciare l'indirizzo qualifica.portaleacquisti@grupposave.com \n> in alternativa  inoltrare a: gbortolato@grupposave.com; spanato@aeroportoverona.it; arenna@grupposave.com; carnoldo@grupposave.com;amiele@grupposave.com", "links": []}, {"header": "GARE", "content": "• Per casistiche particolari rivolgersi a: \n> x gare SAVE: gbortolato@grupposave.com \n> x gare Aeroporto di Verona: spanato@aeroportoverona.it", "links": []}, {"header": "NOTE PARTICOLARI", "content": "", "links": []}, {"header": "BIDDING GROUP ATTIVO", "content": "•  SI", "links": []}, {"header": "ALTRE AREE (Fatturazione, Convenzioni ecc)", "content": "", "links": []}, {"header": "MAIL CHE PARTONO DA SISTEMA", "content": "• Recupero credenziali > no pec", "links": []}, {"header": "Integrazione con SAP", "content": "", "links": []}], "approfondimenti": [{"topic": "ALBO", "focal_point": "• Dettagli sulla tipologia di albo", "details": "• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.", "links": []}, {"topic": "ALBO", "focal_point": "• Fattura Corrispettivo", "details": "• Fattura Corrispettivo:\n- SAVE allegherà a Portale nel Questionario Generale la fattura emessa per il pagamento da parte del Fornitore del corrispettivo di iscrizione all’Albo (vd. sezione \"Corrispettivo per l'iscrizione\" nel campo \"Corrispettivo per l’iscrizione - Fattura\").\n- Il fornitore quindi, potrà successivamente visualizzarla/scaricarla.", "links": []}, {"topic": "", "focal_point": "•", "details": "•", "links": []}], "buyer_sections": [], "all_links": ["https://save-procurement.bravosolution.com/web/login.html"], "text": "Save\nINFO GENERALI\n• Console: TLK\n• SF: SAVE SPA\n• SITO: https://save-procurement.bravosolution.com/web/login.html\n• TELEFONO: 800 125549\n• Webform: \"Richiedi assistenza online\"( SI PUO' ALLEGARE) \n• COMMERCIALI: ???????\nREGISTRAZIONI-ABILITAZIONI\n•  Ricezione Report sulla cassetta postale: \n- Contratto di registrazione firmato digitalmente  (nuovo contratto dal 15/06/2017: al primo punto c'è l'elenco delle società del gruppo)\n- Clausole vessatorie firmate digitalmente\n- pec obbligatoria\n- NON pec se manca abilito e mando mail per inserimento\nMODIFICHE\n• Nome e Cognome utente principale e contatti sono modificabili dagli oe (NO DOCUSIGN)\n> x modifica mail se non hanno credenziali di accesso > procedura Docusign\n• Modifica Ragione sociale:  certificato Camera di Commercio + procedura Docusign\n> inviamo all'oe primo template per avviare procedura docusign chiedendo anche Camera di Commercio\n> quando l'oe ci invia mail con dettaglio delle info da modificare + visura la inoltriamo x autorizzazione a contatti in fondo\n> facciamo modifica quando si è concluso iter docusign e il cliente ci ha autorizzato                         \n• Contatti buyer x Docusign: gbortolato@grupposave.com; spanato@aeroportoverona.it;amiele@grupposave.com\nIDM\n\nALBO\n• Maggio 25_Hanno inviato comunicazione su nuovo Regolamento. Se chedono info in merito:\n> gli diciamo di prendere visione del Regolamento in HP \n> per dubbi lasciamo mail qualifica.portaleacquisti@grupposave.com  \n• Inserimento categorie da Mie Categorie + Blocco/Sblocco in area Valutazioni (Modificabili/di Categoria) > dettagli in \"Approfondimenti\" \n> Valutazioni di Qualifica > x aggiornare i dati quando li hanno sbloccati\n> Valutazioni di Categoria > x inviare messaggi\n• Fattura Corrispettivo > dettagli in Approfondimento\n• Domande sui contenuti dell'albo  se non hanno istanza \n> possiamo lasciare l'indirizzo qualifica.portaleacquisti@grupposave.com \n> in alternativa  inoltrare a: gbortolato@grupposave.com; spanato@aeroportoverona.it; arenna@grupposave.com; carnoldo@grupposave.com;amiele@grupposave.com\nGARE\n• Per casistiche particolari rivolgersi a: \n> x gare SAVE: gbortolato@grupposave.com \n> x gare Aeroporto di Verona: spanato@aeroportoverona.it\nNOTE PARTICOLARI\n\nBIDDING GROUP ATTIVO\n•  SI\nALTRE AREE (Fatturazione, Convenzioni ecc)\n\nMAIL CHE PARTONO DA SISTEMA\n• Recupero credenziali > no pec\nIntegrazione con SAP\n\nALBO\n• Dettagli sulla tipologia di albo\n• Inserimento categorie da Mie Categorie > Aggiungi categoria > Espandi > selezionano le categorie di riferimento > Conferma selezione corrente\n• A seguito del completamento dei form, dalla mezzanotte, non è più possibile fare modifiche e nella sezione \"Valutazion\" >\"Valutazioni di categoria\" si crea l'istanza. \n• Passaggi per aggiornamento istanza albo quando l'Istanza è SBLOCCATA. Devono cliccare su:\n> su \"Valutazioni\" > su \"Valutazioni Modificabili\" \n> sotto la voce \"Azienda valutatrice\"\n> sulla riga della categoria \n> si apre il form e in alto a destra hanno la matita per rendere i form modificabili\n> apportano le modifiche \n> cliccano su \"Salva\" > su \"Invia form al valutatore\"\n• Se l'istanza è BLOCCATA (quindi non hanno la matita x fare modifiche in Mie Categorie e  non vedono l'istanza in \"Valutazioni Modificabili\") devono chiedere lo sblocco cliccando:\n> cliccano su \"Valutazioni\"> su \"Valutazioni di categoria\"\n> cliccano sotto la voce \"Azienda valutatrice\"\n> cliccano su 'Messaggi' > 'Crea Messaggio' e richiedono lo sblocco della categoria per poter apportare le modifiche.\nALBO\n• Fattura Corrispettivo\n• Fattura Corrispettivo:\n- SAVE allegherà a Portale nel Questionario Generale la fattura emessa per il pagamento da parte del Fornitore del corrispettivo di iscrizione all’Albo (vd. sezione \"Corrispettivo per l'iscrizione\" nel campo \"Corrispettivo per l’iscrizione - Fattura\").\n- Il fornitore quindi, potrà successivamente visualizzarla/scaricarla.\n\n•\n•"}, "SEA": {"name": "SEA", "sheet": "SEA", "site": "", "phone": "02 00 70 42 49", "console": "TLE", "webform": "> http://www.seamilano.eu/it/b2b/fornitori", "commercials": "ccattaneo@jaggaer.com; gpizzinga@jaggaer.com", "sections": [{"header": "INFO GENERALI", "content": "• Console: TLE\n• SF: SPA ESERCIZI AEROPORTUALI S.E.A.\n•  SITO JAGGA
